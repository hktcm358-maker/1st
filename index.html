<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>⚡ 英単語ハックマスター 1級⚡</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background-color: #0f172a;
            color: #f8fafc;
            -webkit-tap-highlight-color: transparent;
            user-select: none;
        }
        .progress-bar {
            transition: width 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .glass-card {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }
        .fade-in {
            animation: fadeIn 0.2s ease-out forwards;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(4px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body class="min-h-screen flex flex-col justify-between antialiased selection:bg-blue-500/30">

    <header class="w-full glass-card border-b border-slate-800 px-4 py-3 sticky top-0 z-50 flex items-center justify-between">
        <div class="flex items-center space-x-2">
            <span class="text-xl">⚡</span>
            <h1 class="text-base font-bold tracking-wider text-blue-400">WORD HACKER</h1>
        </div>
        <div id="header-combo" class="hidden bg-gradient-to-r from-amber-500 to-orange-500 text-slate-950 font-black px-2.5 py-0.5 rounded-full text-xs tracking-wider">
            🔥 <span id="header-combo-count">0</span> COMBO
        </div>
    </header>

    <main class="flex-1 w-full max-w-md mx-auto p-4 flex flex-col justify-start">

        <div id="screen-home" class="space-y-5 w-full fade-in">
            <div class="text-center py-2">
                <p class="text-xs text-slate-400 uppercase tracking-widest">Target Acquired</p>
                <h2 id="home-title" class="text-xl font-black text-slate-100 mt-1">英単語ハックマスター</h2>
                <p class="text-xs text-emerald-400 mt-1">🎯 隙間時間ハック ＆ コンプリート仕様</p>
            </div>

            <div class="glass-card rounded-2xl p-4 border border-blue-500/20 bg-gradient-to-br from-blue-950/30 to-slate-900/50">
                <div class="flex justify-between text-xs text-slate-400 mb-1">
                    <span>👑 総コンプリート率（覚えた単語）</span>
                    <span id="total-progress-percent" class="font-bold text-blue-400">0%</span>
                </div>
                <div class="w-full bg-slate-800 h-3 rounded-full overflow-hidden p-[1px]">
                    <div id="total-progress-bar" class="progress-bar bg-gradient-to-r from-emerald-400 via-teal-500 to-blue-500 h-full w-0 rounded-full"></div>
                </div>
                <div class="flex justify-between text-[10px] text-slate-500 mt-1.5 font-mono">
                    <span id="total-progress-count">マスター: 0 / 0 語</span>
                    <button id="btn-reset-all" class="text-rose-400/70 hover:text-rose-400 transition-colors">データ全消去</button>
                </div>
            </div>

            <div id="section-list" class="space-y-3 max-h-[55vh] overflow-y-auto pr-1">
                </div>
        </div>

        <div id="screen-quiz" class="hidden space-y-4 w-full flex-1 flex flex-col justify-between fade-in">
            
            <div class="flex items-center justify-between">
                <button id="btn-back" class="text-xs font-bold text-slate-400 hover:text-slate-200 flex items-center space-x-1 py-1 px-2.5 rounded-lg bg-slate-800/60 transition-colors">
                    <span>↩ ホームへ戻る</span>
                </button>
                <div class="text-xs font-mono tracking-wider bg-slate-800/80 px-3 py-1 rounded-md text-slate-300 border border-slate-700/50">
                    現在の残り: <span id="quiz-count" class="font-bold text-amber-400 text-sm">0</span> 問
                </div>
            </div>

            <div class="space-y-1">
                <div class="w-full bg-slate-800 h-1.5 rounded-full overflow-hidden">
                    <div id="quiz-progress-bar" class="progress-bar bg-gradient-to-r from-blue-500 to-indigo-500 h-full w-0"></div>
                </div>
                <div class="flex justify-between items-center px-0.5">
                    <span id="quiz-combo-badge" class="opacity-0 text-[10px] font-bold bg-amber-500/20 text-amber-400 px-2 py-0.5 rounded border border-amber-500/30 transition-all">
                        🔥 <span id="quiz-combo-count">0</span> COMBO
                    </span>
                    <span id="quiz-section-title" class="text-[10px] text-slate-500 uppercase tracking-wider font-bold"></span>
                </div>
            </div>

            <div class="glass-card rounded-2xl p-5 border border-slate-700/60 bg-gradient-to-b from-slate-800/40 to-slate-900/60 flex-1 flex flex-col justify-between shadow-xl min-h-[360px]">
                
                <div class="space-y-3">
                    <div class="space-y-1">
                        <span class="text-[10px] uppercase font-bold tracking-widest text-slate-500 block">日本語訳・ヒント</span>
                        <div class="text-slate-100 font-bold text-base leading-snug" id="quiz-hint-meaning"></div>
                    </div>

                    <div id="quiz-memory-booster" class="grid grid-cols-2 gap-2 pt-2 border-t border-slate-800/80 text-[11px]">
                        <div class="bg-slate-950/40 p-2 rounded-lg border border-slate-800/30">
                            <span class="text-[9px] font-bold text-blue-400 block">💡 語源・単語イメージ</span>
                            <span id="quiz-boost-etymology" class="text-slate-300 font-medium"></span>
                        </div>
                        <div class="bg-slate-950/40 p-2 rounded-lg border border-slate-800/30">
                            <span class="text-[9px] font-bold text-indigo-400 block">🔗 補足・コロケーション</span>
                            <span id="quiz-boost-preposition" class="text-slate-300 font-medium"></span>
                        </div>
                    </div>
                </div>

                <div class="py-4 my-auto text-center">
                    <p class="text-[10px] uppercase font-bold tracking-widest text-slate-500 mb-1.5">ENGLISH PHRASE</p>
                    <div id="quiz-phrase" class="text-lg md:text-xl font-bold text-slate-100 leading-relaxed tracking-wide transition-all"></div>
                </div>

                <div id="quiz-answer-zone" class="invisible py-3 text-center border-t border-slate-800/60 bg-slate-950/30 rounded-xl space-y-2">
                    <p class="text-[10px] uppercase font-bold tracking-widest text-emerald-400">CORRECT WORD</p>
                    <div id="quiz-correct-word" class="text-2xl font-black tracking-wider text-emerald-400 select-all"></div>
                    
                    <div class="flex justify-center space-x-2 pt-1">
                        <button id="btn-speak-word" class="bg-slate-800 hover:bg-slate-700 text-slate-200 text-xs px-3 py-1 rounded-lg border border-slate-700 flex items-center space-x-1 active:scale-95 transition-transform">
                            <span>🔊 単語</span>
                        </button>
                        <button id="btn-speak-phrase" class="bg-slate-800 hover:bg-slate-700 text-slate-200 text-xs px-3 py-1 rounded-lg border border-slate-700 flex items-center space-x-1 active:scale-95 transition-transform">
                            <span>🔊 フレーズ</span>
                        </button>
                    </div>
                </div>
            </div>

            <div class="w-full pt-2">
                <button id="btn-reveal" class="w-full bg-gradient-to-r from-blue-600 to-indigo-600 hover:from-blue-500 hover:to-indigo-500 text-white font-bold py-4 rounded-xl shadow-lg shadow-blue-500/20 active:scale-[0.99] transition-transform text-sm tracking-widest">
                    👁 答えを見る (TAP TO REVEAL)
                </button>

                <div id="quiz-choice-pad" class="hidden grid grid-cols-2 gap-3.5">
                    <button id="btn-wrong" class="bg-gradient-to-b from-rose-600 to-rose-700 hover:from-rose-500 hover:to-rose-600 text-white font-bold py-4 rounded-xl shadow-md active:scale-[0.97] transition-all flex flex-col items-center justify-center">
                        <span class="text-base flex items-center space-x-1">❌ <span>もう一度（復習）</span></span>
                        <span class="text-[9px] opacity-75 font-normal mt-0.5">列の最後尾へ自動ローテーション</span>
                    </button>
                    <button id="btn-correct" class="bg-gradient-to-b from-emerald-600 to-emerald-700 hover:from-emerald-500 hover:to-emerald-600 text-white font-bold py-4 rounded-xl shadow-md active:scale-[0.97] transition-all flex flex-col items-center justify-center">
                        <span class="text-base flex items-center space-x-1">⭕ <span>覚えた（クリア）</span></span>
                        <span class="text-[9px] opacity-75 font-normal mt-0.5">マスターリストへ完全保存 ✨</span>
                    </button>
                </div>
            </div>
        </div>
    </main>

    <footer class="w-full text-center py-2 text-[9px] text-slate-600 border-t border-slate-900 bg-slate-950/40">
        &copy; 2026 Word Hacker System. Optimized for Capricorn Gamers.
    </footer>

    <script>
        
        const MASTER_DATA = [{"id":1,"section":"Section 1 (1級)","word":"claim","phrase":"The scientist did not claim that the treatment was perfect, but she said the results were promising.","meaning":"主張する；要求する；奪う","note":"主張するだけでなく、権利として要求する、災害・事故が命を奪うという意味もある。\n\n【例文訳】\nその科学者はその治療法が完璧だと主張したわけではないが、結果は有望だと述べた。","etymology":"ラテン語 L.clamare「叫ぶ、呼ぶ」\n【補足】clamare「叫ぶ」から。強く声に出して要求・主張するイメージ。","preposition":""},{"id":2,"section":"Section 1 (1級)","word":"project","phrase":"Analysts project that demand for renewable energy will continue to rise over the next decade.","meaning":"見積もる 提示する","note":"企画・計画だけでなく、予測する、映し出す、突き出るという意味もある。\n\n【例文訳】\nアナリストは、再生可能エネルギーへの需要が今後10年間増え続けると見積もっている。","etymology":"pro（前に）+ ject（投げる）","preposition":""},{"id":3,"section":"Section 1 (1級)","word":"expand","phrase":"The university plans to expand its scholarship program for students from rural areas.","meaning":"拡大する","note":"【例文訳】\nその大学は地方出身の学生向け奨学金制度を拡大する予定だ。","etymology":"ex-（～の外へ）＋pando（広げる）","preposition":""},{"id":4,"section":"Section 1 (1級)","word":"address","phrase":"The mayor promised to address the housing shortage before the end of the year.","meaning":"(問題を）取り上げる 対処する 話しかける","note":"住所だけでなく、問題に取り組む、演説する、人に呼びかける意味が頻出。\n\n【例文訳】\n市長は年末までに住宅不足に対処すると約束した。","etymology":"a-（～へ）＋drecier（真っすぐにする）\n【補足】ad-「〜へ」+ directus「まっすぐにされた」系。相手や問題へまっすぐ向かう感覚。","preposition":""},{"id":5,"section":"Section 1 (1級)","word":"detect","phrase":"The new sensor can detect tiny changes in air quality within seconds.","meaning":"感知する 発見する","note":"【例文訳】\nその新しいセンサーは空気の質のわずかな変化を数秒で感知できる。","etymology":"de「否定」tect「覆う」\n【補足】de-はここでは「外へ／離れて」の感覚。detect＝覆いを外して見つける（de- + tegere「覆う」）。","preposition":""},{"id":6,"section":"Section 1 (1級)","word":"evolve","phrase":"Languages evolve as societies change and new technologies appear.","meaning":"（～から）進化する","note":"【例文訳】\n言語は社会が変化し新しい技術が現れるにつれて進化する。","etymology":"e「外へ」volve「回転する」","preposition":""},{"id":7,"section":"Section 1 (1級)","word":"guarantee","phrase":"No policy can guarantee success, but careful planning reduces the risk of failure.","meaning":"確約する","note":"【例文訳】\n成功を保証できる政策はないが、慎重な計画は失敗のリスクを減らす。","etymology":"garant（保護）→㋫㋗warjan（攻撃をかわす）\n→㋘warjana（守る）→㋑wer-（覆う）\n【補足】guarantee は保証・保護の語系。warranty と同系統の歴史を持つ。","preposition":""},{"id":8,"section":"Section 1 (1級)","word":"implement","phrase":"The school will implement a new curriculum focused on critical thinking.","meaning":"実施する","note":"【例文訳】\nその学校は批判的思考に重点を置いた新しいカリキュラムを実施する。","etymology":"im「中へ」ple「満たす」","preposition":""},{"id":9,"section":"Section 1 (1級)","word":"weather","phrase":"Small businesses struggled to weather the sharp rise in energy prices.","meaning":"切り抜ける","note":"名詞は天気。動詞では嵐や困難を『耐えて切り抜ける』意味。\n\n【例文訳】\n小企業はエネルギー価格の急上昇を切り抜けるのに苦労した。","etymology":"weder（空気、空、そよ風）\n【補足】動詞では「嵐・困難を耐えて切り抜ける」という比喩に発展。","preposition":""},{"id":10,"section":"Section 1 (1級)","word":"justify","phrase":"The company must justify the price increase to its customers.","meaning":"正当化する 正当性を示す","note":"【例文訳】\nその会社は顧客に対して値上げを正当化しなければならない。","etymology":"just(正しい）+fy","preposition":""},{"id":11,"section":"Section 1 (1級)","word":"convict","phrase":"The jury refused to convict the defendant without clear evidence.","meaning":"（～で）有罪判決を下す","note":"【例文訳】\n陪審は明確な証拠なしに被告に有罪判決を下すことを拒んだ。","etymology":"com(強調)とvincere(征服する)","preposition":""},{"id":12,"section":"Section 1 (1級)","word":"prioritize","phrase":"Hospitals must prioritize patients who need urgent care.","meaning":"優先する","note":"【例文訳】\n病院は緊急治療を必要とする患者を優先しなければならない。","etymology":"pri-（前の）＋-ior（もっと）＋ize(化）","preposition":""},{"id":13,"section":"Section 1 (1級)","word":"rebel","phrase":"Some citizens began to rebel against the unfair tax system.","meaning":"反逆する","note":"【例文訳】\n一部の市民は不公平な税制に反逆し始めた。","etymology":"「re-」と「戦争を行なう」を意味する「bellō」","preposition":""},{"id":14,"section":"Section 1 (1級)","word":"fuel","phrase":"Rumors on social media can fuel public anxiety during a crisis.","meaning":"あおる 燃料を補給する","note":"【例文訳】\n危機の際、SNS上の噂は人々の不安をあおることがある。","etymology":"feu（火）","preposition":""},{"id":15,"section":"Section 1 (1級)","word":"sustain","phrase":"A small charity cannot sustain its activities without stable funding.","meaning":"維持する 耐える","note":"【例文訳】\n小さな慈善団体は安定した資金なしには活動を維持できない。","etymology":"sus「下に」tain「つかんで離さない」","preposition":""},{"id":16,"section":"Section 1 (1級)","word":"portray","phrase":"The documentary portrays the artist as both brilliant and deeply vulnerable.","meaning":"描写する","note":"【例文訳】\nそのドキュメンタリーはその芸術家を、優秀であると同時に非常に傷つきやすい人物として描写している。","etymology":"por-（～を通って）＋traire（描く）\n→㋶traho（引く）","preposition":""},{"id":17,"section":"Section 1 (1級)","word":"manipulate","phrase":"Politicians sometimes manipulate statistics to support their arguments.","meaning":"操作する","note":"【例文訳】\n政治家は自分たちの主張を支えるために統計を操作することがある。","etymology":"mani「手」pul「満たす」ate「する」","preposition":""},{"id":18,"section":"Section 1 (1級)","word":"stimulate","phrase":"The tax cut was designed to stimulate consumer spending.","meaning":"刺激する","note":"【例文訳】\nその減税は消費支出を刺激するために設計された。","etymology":"stimulus（刺すこと）→sti(先端　突き刺す)","preposition":""},{"id":19,"section":"Section 1 (1級)","word":"integrate","phrase":"The program helps immigrants integrate into the local community.","meaning":"（～に）溶け込む （～に）統合する","note":"【例文訳】\nそのプログラムは移民が地域社会に溶け込むのを助ける。","etymology":"integer（完全な）＋-o（動詞）→㋶in-（否定）＋tango（触れる.\n【補足】integer「完全な・損なわれていない」から。in-は否定ではなく「完全性」の語史に関係。","preposition":""},{"id":20,"section":"Section 1 (1級)","word":"undergo","phrase":"The old railway station will undergo major repairs next spring.","meaning":"経験する","note":"【例文訳】\nその古い駅は来春、大規模な修繕を受ける。","etymology":"under-（～の下に）＋go（行く）","preposition":""},{"id":21,"section":"Section 1 (1級)","word":"diagnose","phrase":"Doctors used several tests to diagnose the cause of the patient's symptoms.","meaning":"診断する 原因を究明する","note":"【例文訳】\n医師たちは患者の症状の原因を診断する 原因を究明するためにいくつかの検査を用いた。","etymology":"dia「横切って」gno「知る」","preposition":""},{"id":22,"section":"Section 1 (1級)","word":"enforce","phrase":"The city finally began to enforce the parking rules after several complaints from residents.","meaning":"執行する","note":"【例文訳】\n住民から苦情が相次いだ後、市はようやく駐車規則を執行し始めた。","etymology":"en「その状態にする」fort「強い、かたい」","preposition":""},{"id":23,"section":"Section 1 (1級)","word":"abuse","phrase":"Some officials abused their power by giving contracts to their friends.","meaning":"悪用する 濫用する","note":"【例文訳】\n一部の役人は、友人に契約を与えることで権力を乱用した。","etymology":"ab「離れた」use「使う」","preposition":""},{"id":24,"section":"Section 1 (1級)","word":"dismiss","phrase":"The judge dismissed the case because the evidence was too weak.","meaning":"却下する 解雇する","note":"【例文訳】\n裁判官は証拠があまりに弱かったため、その訴訟を却下した。","etymology":"dis「離れて」miss「送る」が語源で、「いまの場から離れたところへ送る」","preposition":""},{"id":25,"section":"Section 1 (1級)","word":"migrate","phrase":"Many young people migrate to larger cities in search of better jobs and schools.","meaning":"（鳥・魚などが）渡る；人が移住する；データ・システムが移行する","note":"「鳥・魚が渡る」だけでなく、人が移住する、データ・制度が別環境へ移行する意味も重要。\n\n【例文訳】\n多くの若者は、より良い仕事や学校を求めて大都市へ移住する。","etymology":"migro（移住する）→mey-（変える）","preposition":""},{"id":26,"section":"Section 1 (1級)","word":"contradict","phrase":"His actions seemed to contradict everything he had promised during the campaign.","meaning":"反論する 矛盾する","note":"【例文訳】\n彼の行動は、選挙運動中に約束したことすべてと矛盾しているように見えた。","etymology":"contra「反対に」dict「話す」","preposition":""},{"id":27,"section":"Section 1 (1級)","word":"plague","phrase":"A lack of clean water continues to plague many villages after the flood.","meaning":"～を絶えず苦しめる・疫病","note":"【例文訳】\n洪水の後も、清潔な水の不足が多くの村を絶えず苦しめている。","etymology":"大打撃（plaga）","preposition":""},{"id":28,"section":"Section 1 (1級)","word":"complex","phrase":"The family learned about complex only after moving to the coast.","meaning":"集合体 強迫観念","note":"【例文訳】\nその家族は海岸沿いに引っ越して初めて集合体 強迫観念について知った。","etymology":"com「共に」plex「折る」\n【補足】complex は com-「共に」+ plectere「編む・折り重ねる」。複数要素が絡み合うイメージ。","preposition":""},{"id":29,"section":"Section 1 (1級)","word":"congress","phrase":"The mayor avoided mentioning congress until reporters pressed him for details.","meaning":"米国議会","note":"【例文訳】\n記者たちが詳細を問い詰めるまで、市長は米国議会に触れるのを避けた。","etymology":"「con: 共に」+「gress: 進む」","preposition":""},{"id":30,"section":"Section 1 (1級)","word":"antibiotic","phrase":"The doctor prescribed an antibiotic but warned him not to stop taking it early.","meaning":"抗生物質","note":"【例文訳】\n医師は抗生物質を処方したが、途中で服用をやめないよう彼に注意した。","etymology":"anti「反する」bio「命」ic「性質」＝「生物に対抗する性質」","preposition":""},{"id":31,"section":"Section 1 (1級)","word":"amendment","phrase":"Even a amendment change in tone can affect how people receive criticism.","meaning":"修正 改正","note":"【例文訳】\n口調の修正 改正変化でさえ、人々が批判をどう受け取るかに影響する。","etymology":"ex-（～の外へ）＋menda（傷）","preposition":""},{"id":32,"section":"Section 1 (1級)","word":"diversity","phrase":"For the workers, diversity became a symbol of broken promises.","meaning":"多様性","note":"【例文訳】\n労働者たちにとって、多様性は破られた約束の象徴となった。","etymology":"異なる別々の（dis-）方向を向いた（versus）","preposition":""},{"id":33,"section":"Section 1 (1級)","word":"plot","phrase":"The article made plot feel immediate rather than remote.","meaning":"陰謀 構想 平面図","note":"【例文訳】\nその記事は陰謀 構想 平面図を遠い話ではなく差し迫ったものに感じさせた。","etymology":"？","preposition":""},{"id":34,"section":"Section 1 (1級)","word":"advocate","phrase":"Several families said advocate had changed their plans for the future.","meaning":"支持者 擁護者","note":"【例文訳】\nいくつかの家族は、支持者 擁護者が将来の計画を変えたと述べた。","etymology":"ad「その方向へ」voc「呼ぶ」ate「する」=「弁護のために呼ばれる」","preposition":""},{"id":35,"section":"Section 1 (1級)","word":"trait","phrase":"The exhibit placed trait beside letters written by ordinary people.","meaning":"資質","note":"【例文訳】\nその展示は普通の人々が書いた手紙のそばに資質を置いていた。","etymology":"㋠㋫trait（一筆の動き）","preposition":""},{"id":36,"section":"Section 1 (1級)","word":"perspective","phrase":"Her research focuses on perspective in rapidly changing communities.","meaning":"観点 遠近法 展望","note":"【例文訳】\n彼女の研究は、急速に変化する地域社会における観点 遠近法 展望に焦点を当てている。","etymology":"見（specio）通し（per-）ている（-ivus）こと、空間や全体を見通すこと","preposition":""},{"id":37,"section":"Section 1 (1級)","word":"stem","phrase" mology":"persequi(追い詰める)（per(通じて)とsequi(続く)）","preposition":""},{"id":1057,"section":"Section 11 (1級)","word":"basin","phrase":"The report mentioned basin only briefly, but the detail stayed with me.","meaning":"盆地","note":"【例文訳】\nその報告書は盆地にほんの少し触れただけだったが、その細部が私の記憶に残った。","etymology":"baca（ぶどう酒を入れる壺）","preposition":""},{"id":1058,"section":"Section 11 (1級)","word":"chaos","phrase":"The teacher connected chaos to a story from her own childhood.","meaning":"無秩序　大混乱","note":"【例文訳】\n教師は無秩序 大混乱を自分の子ども時代の話に結びつけた。","etymology":"khaos（底知れぬ深い穴）","preposition":""},{"id":1059,"section":"Section 11 (1級)","word":"formula","phrase":"A single example of formula changed the tone of the discussion.","meaning":"公式","note":"【例文訳】\n公式の一つの例が議論の雰囲気を変えた。","etymology":"forma（形）＋-ulus（小さい）","preposition":""},{"id":1060,"section":"Section 11 (1級)","word":"holder","phrase":"The committee asked for more data before making a judgment about holder.","meaning":"所有者","note":"【例文訳】\n委員会は所有者について判断する前に、さらなるデータを求めた。","etymology":"hold（保持する）＋-er（～するもの）","preposition":""},{"id":1061,"section":"Section 11 (1級)","word":"liberty","phrase":"In the village, liberty was not an abstract issue but part of daily life.","meaning":"自由","note":"【例文訳】\nその村では、自由は抽象的な問題ではなく日常生活の一部だった。","etymology":"liber（自由な；束縛を受けていない）＋-tas（こと）⇒ louberos（子供）","preposition":""},{"id":1062,"section":"Section 11 (1級)","word":"mankind","phrase":"The journalist used mankind to explain why the policy had failed.","meaning":"人類","note":"【例文訳】\nその記者は政策が失敗した理由を説明するために人類を用いた。","etymology":"man「人」kind「種」","preposition":""},{"id":1063,"section":"Section 11 (1級)","word":"modernization","phrase":"Children first encountered modernization in a picture book at school.","meaning":"近代化　現代化","note":"【例文訳】\n子どもたちは学校の絵本で初めて近代化 現代化に出会った。","etymology":"modern　（現代的な）ize （〜化する）ation（名詞語尾）","preposition":""},{"id":1064,"section":"Section 11 (1級)","word":"questionnaire","phrase":"The discovery gave researchers a new way to think about questionnaire.","meaning":"アン position":""},{"id":1088,"section":"Section 11 (1級)","word":"adjunct","phrase":"The student chose adjunct as the topic of her final paper.","meaning":"非常勤の 補助の","note":"【例文訳】\nその学生は卒業論文のテーマに非常勤の 補助のを選んだ。","etymology":"ad(方向)とiungare(結合)","preposition":""},{"id":1089,"section":"Section 11 (1級)","word":"frigid","phrase":"At first the task seemed frigid, but practice made it manageable.","meaning":"酷寒の　冷淡な","note":"【例文訳】\n最初その作業は酷寒の 冷淡なように思えたが、練習によってこなせるようになった。","etymology":"frigus (寒さ, 霜)","preposition":""},{"id":1090,"section":"Section 11 (1級)","word":"cynical","phrase":"Reporters described the mayor’s apology as cynical.","meaning":"冷笑的な","note":"【例文訳】\n記者たちは市長の謝罪を冷笑的なものだと表現した。","etymology":"cynic（皮肉屋）＋-al（～の）kynikos（犬のような）kyōn（犬）","preposition":""},{"id":1091,"section":"Section 11 (1級)","word":"insufficient","phrase":"The child gave a insufficient smile when the music started.","meaning":"十分でない","note":"【例文訳】\n音楽が始まると、その子は十分でない笑みを浮かべた。","etymology":"in「否定」sub「~まで」fic「つくる」ent「のような」","preposition":""},{"id":1092,"section":"Section 11 (1級)","word":"swift","phrase":"The evidence was too swift to ignore.","meaning":"速やかな","note":"【例文訳】\nその証拠は無視するにはあまりに速やかなものだった。","etymology":"おそらくswip（素早く回転する）","preposition":""},{"id":1093,"section":"Section 11 (1級)","word":"tolerant","phrase":"Their plan looked tolerant on paper but failed in practice.","meaning":"寛容な","note":"【例文訳】\n彼らの計画は書面上は寛容なように見えたが、実際には失敗した。","etymology":"tolero（重さに耐える）","preposition":""},{"id":1094,"section":"Section 11 (1級)","word":"menial","phrase":"The teacher chose a menial example from everyday life.","meaning":"単純で退屈な 卑しい","note":"【例文訳】\n教師は日常生活から単純で退屈な 卑しい例を選んだ。","etymology":"古フランス語 meinee 「家事」","preposition":""},{"id":1095,"section":"Section 11 (1級)","word":"lethargic","phrase":"A lethargic smell came from the abandoned building.","meaning":"けだるい 昏睡状態の","note":"【例文訳】\nその廃墟からけだるい 昏睡状態のにおいが漂ってきた。","etymology":"冥界にある忘却の川（lethe）","preposition":""},{"id":1096,"section":"Section 11 (1級)","word":"momentous","ph 」+「打つ（fendere）」","preposition":""},{"id":1670,"section":"Section 17 (1級)","word":"tantamount","phrase":"The teacher chose a tantamount example from everyday life.","meaning":"等しい","note":"【例文訳】\n教師は日常生活から等しい例を選んだ。","etymology":"「tant（等しい）」と「amount（量）」","preposition":""},{"id":1671,"section":"Section 17 (1級)","word":"impervious","phrase":"A impervious smell came from the abandoned building.","meaning":"影響されない 水を通さない","note":"【例文訳】\nその廃墟から影響されない 水を通さないにおいが漂ってきた。","etymology":"(L im否定+pervious通す）","preposition":""},{"id":1672,"section":"Section 17 (1級)","word":"inept","phrase":"The company faced inept pressure from investors.","meaning":"不適切な","note":"【例文訳】\nその会社は投資家から不適切な圧力を受けた。","etymology":"in(否定)+ apt(適応した)","preposition":""},{"id":1673,"section":"Section 17 (1級)","word":"meticulous","phrase":"She gave him a meticulous look and closed the door.","meaning":"細かいことに気を遣う","note":"【例文訳】\n彼女は彼に細かいことに気を遣う視線を向け、ドアを閉めた。","etymology":"㋶metus（不安）＋-culosus（多い）","preposition":""},{"id":1674,"section":"Section 17 (1級)","word":"impeccable","phrase":"The film presents a impeccable portrait of family life.","meaning":"申し分のない","note":"【例文訳】\nその映画は家族生活の申し分のない描写を示している。","etymology":"im＝否定 peccare=罪を犯す","preposition":""},{"id":1675,"section":"Section 17 (1級)","word":"intangible","phrase":"The medicine produced a intangible reaction in a few patients.","meaning":"不可解な","note":"【例文訳】\nその薬は一部の患者に不可解な反応を引き起こした。","etymology":"in「否定」tange「触れる」ible「できる、しうる」","preposition":""},{"id":1676,"section":"Section 17 (1級)","word":"inquisitive","phrase":"His argument became more inquisitive after he added concrete examples.","meaning":"好奇心が強い","note":"【例文訳】\n具体例を加えた後、彼の主張はより好奇心が強いものになった。","etymology":"in- \"中に\" quisit \"尋ねる 求める\"","preposition":""},{"id":1677,"section":"Section 17 (1級)","word":"resplendent","phrase":"The town developed a resplendent economy around tourism.","meaning":"光り輝くばかりの まばゆい","note":"【例文訳】\nその町は観光を中心とした光り輝くばかりの まばゆい経済を発展させた。","etymology":"re=強意+splendere（輝く）","preposition":""},{"id":1678,"section":"Section 17 (1級)","word":"tenacious","phrase":"The result was tenacious enough to change the policy.","meaning":"粘り強い","note":"【例文訳】\nその結果は政策を変えるのに十分粘り強いものだった。","etymology":"tenāx (“固執する”)","preposition":""},{"id":1679,"section":"Section 17 (1級)","word":"morbid","phrase":"The warning sounded morbid, but people ignored it at first.","meaning":"病的な","note":"【例文訳】\nその警告は病的なように聞こえたが、人々は最初それを無視した。","etymology":"morbus(病気)","preposition":""},{"id":1680,"section":"Section 17 (1級)","word":"tepid","phrase":"The new evidence forced officials to tepid the original decision.","meaning":"生ぬるい","note":"【例文訳】\n新しい証拠により、当局は最初の決定を生ぬるいせざるを得なくなった。","etymology":"tep-＝熱くなる（？あたたかくなる？）","preposition":""},{"id":1681,"section":"Section 17 (1級)","word":"hygienic","phrase":"Her hygienic response helped the group avoid a larger conflict.","meaning":"衛生的な","note":"【例文訳】\n彼女の衛生的な対応により、その集団はより大きな対立を避けられた。","etymology":"Hygeia（ハイジア。 ギリシャ神話「健康の女神」）","preposition":""},{"id":1682,"section":"Section 17 (1級)","word":"palatable","phrase":"They needed a palatable solution, not another temporary excuse.","meaning":"美味な 口に合う 好ましい","note":"【例文訳】\n彼らに必要だったのは美味な 口に合う 好ましい解決策であり、また別の一時的な言い訳ではなかった。","etymology":"palatum=「口蓋」の他に「味覚, 好み」","preposition":""},{"id":1683,"section":"Section 17 (1級)","word":"innocuous","phrase":"The director made a innocuous decision that surprised even his supporters.","meaning":"無害な","note":"【例文訳】\nその責任者は、支持者さえ驚かせる無害な決定を下した。","etymology":"in- \"否定\" + nocuus \"傷つけるような\"","preposition":""},{"id":1684,"section":"Section 17 (1級)","word":"insular","phrase":"A insular silence filled the room after the announcement.","meaning":"偏狭な （島のように）孤立した","note":"【例文訳】\n発表の後、部屋は偏狭な （島のように）孤立した沈黙に包まれた。","etymology":"L.insula =(島)","preposition":""},{"id":1685,"section":"Section 17 (1級)","word":"uncouth","phrase":"The proposal sounded uncouth, but the numbers did not support it.","meaning":"粗野な ぎこちない","note":"【例文訳】\nその提案は粗野な ぎこちないように聞こえたが、数字はそれを裏づけていなかった。","etymology":"un- \"否定\" + cuð \"知られた,よく知られた\"","preposition":""},{"id":1686,"section":"Section 17 (1級)","word":"somber","phrase":"The novel captures the somber mood of a town after the factory closes.","meaning":"重苦しい 薄暗い","note":"【例文訳】\nその小説は、工場閉鎖後の町の重苦しい 薄暗い雰囲気を捉えている。","etymology":"sub(下)とumbra(影)","preposition":""},{"id":1687,"section":"Section 17 (1級)","word":"sedentary","phrase":"Even a sedentary change in tone can affect how people receive criticism.","meaning":"座りがちの ほとんど体を動かさない","note":"【例文訳】\n口調の座りがちの ほとんど体を動かさない変化でさえ、人々が批判をどう受け取るかに影響する。","etymology":"sedere(座る)","preposition":""},{"id":1688,"section":"Section 17 (1級)","word":"nonchalant","phrase":"The principal decided to nonchalant the rule after listening to parents.","meaning":"平然としている","note":"【例文訳】\n校長は保護者の意見を聞いた後、その規則を平然としていることにした。","etymology":"non「否定」+chaloir「関心を持つ」←calere ( 熱い )","preposition":""},{"id":1689,"section":"Section 17 (1級)","word":"stagnant","phrase":"At first the task seemed stagnant, but practice made it manageable.","meaning":"よどんだ 停滞した 不景気の","note":"【例文訳】\n最初その作業はよどんだ 停滞した 不景気のように思えたが、練習によってこなせるようになった。","etymology":"㋶stagnans（水がよどむ）","preposition":""},{"id":1690,"section":"Section 17 (1級)","word":"propitious","phrase":"Reporters described the mayor’s apology as propitious.","meaning":"好都合の","note":"【例文訳】\n記者たちは市長の謝罪を好都合のものだと表現した。","etymology":"「pro」（前）＋「piti」（求めていく）＋「ous」＝「（～するのに）都合の良い」","preposition":""},{"id":1691,"section":"Section 17 (1級)","word":"placid","phrase":"The child gave a placid smile when the music started.","meaning":"穏やかな","note":"【例文訳】\n音楽が始まると、その子は穏やかな笑みを浮かべた。","etymology":"placare(喜ばせる)","preposition":""},{"id":1692,"section":"Section 17 (1級)","word":"gallant","phrase":"The evidence was too gallant to ignore.","meaning":"勇敢な　堂々とした","note":"【例文訳】\nその証拠は無視するにはあまりに勇敢な 堂々としたものだった。","etymology":"galer（浮かれ騒ぐ）","preposition":""},{"id":1693,"section":"Section 17 (1級)","word":"extraterrestrial","phrase":"Their plan looked extraterrestrial on paper but failed in practice.","meaning":"地球外の","note":"【例文訳】\n彼らの計画は書面上は地球外のように見えたが、実際には失敗した。","etymology":"extra(超える)とterra(大地)","preposition":""},{"id":1694,"section":"Section 17 (1級)","word":"incongruous","phrase":"The scandal could incongruous public confidence for years.","meaning":"場違いである","note":"【例文訳】\nその不祥事は何年にもわたって国民の信頼を場違いであるおそれがある。","etymology":"in -(否定)+congruent（一致した（com（一緒）+gruere（落ちる 急ぐ）））","preposition":""},{"id":1695,"section":"Section 17 (1級)","word":"insipid","phrase":"A insipid smell came from the abandoned building.","meaning":"退屈な 味のない","note":"【例文訳】\nその廃墟から退屈な 味のないにおいが漂ってきた。","etymology":"in- \"否定\"+sapidus \"味わいのある\"","preposition":""},{"id":1696,"section":"Section 17 (1級)","word":"indelible","phrase":"The company faced indelible pressure from investors.","meaning":"消すことのできない","note":"【例文訳】\nその会社は投資家から消すことのできない圧力を受けた。","etymology":"in（否定）+deleo（消す）+ible（できる）","preposition":""},{"id":1697,"section":"Section 17 (1級)","word":"heinous","phrase":"She gave him a heinous look and closed the door.","meaning":"極悪非道の","note":"【例文訳】\n彼女は彼に極悪非道の視線を向け、ドアを閉めた。","etymology":"haine \"憎しみ 嫌悪\"","preposition":""},{"id":1698,"section":"Section 17 (1級)","word":"indignant","phrase":"The film presents a indignant portrait of family life.","meaning":"（～に）憤慨して","note":"【例文訳】\nその映画は家族生活の（～に）憤慨して描写を示している。","etymology":"in(否定)+dignant(価値がある)","preposition":""},{"id":1699,"section":"Section 17 (1級)","word":"furtive","phrase":"The medicine produced a furtive reaction in a few patients.","meaning":"人目を盗んでの　","note":"【例文訳】\nその薬は一部の患者に人目を盗んでの反応を引き起こした。","etymology":"fur（泥棒、こそ泥）","preposition":""},{"id":1700,"section":"Section 17 (1級)","word":"haphazardly","phrase":"The judge spoke haphazardly and left no room for misunderstanding.","meaning":"無計画に","note":"【例文訳】\n裁判官は無計画に話し、誤解の余地を残さなかった。","etymology":"hap （偶然・運） + hazard（偶然・危険）","preposition":""},{"id":1701,"section":"Section 18 (1級)","word":"pulverize","phrase":"The committee voted to pulverize the outdated procedure.","meaning":"粉砕する","note":"【例文訳】\n委員会は時代遅れの手続きを粉砕することを投票で section":"Section 20 (1級)","word":"encrypt","phrase":"The community worked together to encrypt the damage after the fire.","meaning":"暗号化する","note":"【例文訳】\n地域社会は火災後の被害を暗号化するために協力した。","etymology":"en(中）+crypt「地下聖堂」←kryptos(隠れた)","preposition":""},{"id":1914,"section":"Section 20 (1級)","word":"fetter","phrase":"The teacher asked students to fetter the passage in their own words.","meaning":"拘束する","note":"【例文訳】\n教師は学生にその一節を自分の言葉で拘束するよう求めた。","etymology":"レース、ひも→ped（足）","preposition":""},{"id":1915,"section":"Section 20 (1級)","word":"teeter","phrase":"The crisis forced the agency to teeter its priorities overnight.","meaning":"ぐらつく・シーソーに乗る","note":"【例文訳】\nその危機により、その機関は一夜にして優先事項をぐらつく・シーソーに乗るせざるを得なかった。","etymology":"震えるという意味の古ノルド語（titra）","preposition":""},{"id":1916,"section":"Section 20 (1級)","word":"concoct","phrase":"He tried to concoct the rumor before it spread further.","meaning":"でっちあげる","note":"【例文訳】\n彼はそのうわさがさらに広がる前にでっちあげるしようとした。","etymology":"ラテン語のcon（共に）とcoct（料理する）","preposition":""},{"id":1917,"section":"Section 20 (1級)","word":"delve","phrase":"The committee voted to delve the outdated procedure.","meaning":"調査する","note":"【例文訳】\n委員会は時代遅れの手続きを調査することを投票で決めた。","etymology":"古期英語 delfan（掘る）","preposition":""},{"id":1918,"section":"Section 20 (1級)","word":"tarnish","phrase":"The result was tarnish enough to change the policy.","meaning":"損なわせる","note":"【例文訳】\nその結果は政策を変えるのに十分損なわせるものだった。","etymology":"ゲルマン語で「曇った、ぼんやりした」という意義のある terne","preposition":""},{"id":1919,"section":"Section 20 (1級)","word":"spurn","phrase":"The coach warned players not to spurn their opponents.","meaning":"きっぱりと拒絶する","note":"【例文訳】\nコーチは選手たちに相手をきっぱりと拒絶するしないよう警告した。","etymology":"spurnan=蹴る 軽蔑するspere-＝足首","preposition":""},{"id":1920,"section":"Section 20 (1級)","word":"improvise","phrase":"The new evidence forced officials to improvise the original decision.","meaning":"即興で演奏する 即席で作る","note":"【例文訳】\n新しい証拠により、当局は最初の決定を即興で演奏する 即席で作るせざるを得なくなった。","etymology":"in(否定)とprovidere(予測する（pro(前)vide(見る)）","preposition":""},{"id":1921,"section":"Section 20 (1級)","word":"mesmerize","phrase":"She refused to mesmerize the data just to make the project look successful.","meaning":"魅了する 催眠術をかける","note":"【例文訳】\n彼女は、その計画を成功しているように見せるためだけにデータを魅了する 催眠術をかけることを拒んだ。","etymology":"催眠状態にする物質の存在を主張したMesmer という医者の名前","preposition":""},{"id":1922,"section":"Section 20 (1級)","word":"remit","phrase":"The group plans to remit the proposal before the deadline.","meaning":"送金する 免じる","note":"【例文訳】\nその団体は締め切り前にその提案を送金する 免じる予定である。","etymology":"re（後ろ）とmittere（送る）","preposition":""},{"id":1923,"section":"Section 20 (1級)","word":"redeem","phrase":"If we redeem the problem too quickly, we may miss the real cause.","meaning":"兌換する 買い戻す （名誉など）を回復する","note":"【例文訳】\nもし私たちがその問題を急いで兌換する 買い戻す （名誉など）を回復すると、本当の原因を見逃すかもしれない。","etymology":"re(後ろ)とemere(取る)","preposition":""},{"id":1924,"section":"Section 20 (1級)","word":"congregate","phrase":"The mayor promised to congregate the system after repeated complaints.","meaning":"集まる","note":"【例文訳】\n市長は度重なる苦情の後、その制度を集まると約束した。","etymology":"con「共に」gregate「集まり、群れ」（grex(群れ）","preposition":""},{"id":1925,"section":"Section 20 (1級)","word":"censure","phrase":"Several families said censure had changed their plans for the future.","meaning":"（～のことで）非難する","note":"【例文訳】\nいくつかの家族は、（～のことで）非難するが将来の計画を変えたと述べた。","etymology":"censura（判決 考え）kens- \"ものものしく話す 宣言する\"","preposition":""},{"id":1926,"section":"Section 20 (1級)","word":"coax","phrase":"The novel captures the coax mood of a town after the factory closes.","meaning":"なだめて～させる","note":"【例文訳】\nその小説は、工場閉鎖後の町のなだめて～させる雰囲気を捉えている。","etymology":"おそらく「ばか、まぬけ、アホ」という意味から","preposition":""},{"id":1927,"section":"Section 20 (1級)","word":"astound","phrase":"The storm threatened to astound the rescue effort.","meaning":"びっくり仰天させる","note":"【例文訳】\nその嵐は救助活動をびっくり仰天させるおそれがあった。","etymology":"*extonare(ex (外) + tonare （雷が鳴る）","preposition":""},{"id":1928,"section":"Section 20 (1級)","word":"absolve","phrase":"The principal decided to absolve th per but failed in practice.","meaning":"大喜びの","note":"【例文訳】\n彼らの計画は書面上は大喜びのように見えたが、実際には失敗した。","etymology":"iubilantem （歓喜の声をあげる）","preposition":""},{"id":2078,"section":"Section 21 (1級)","word":"devout","phrase":"The teacher chose a devout example from everyday life.","meaning":"敬虔な 熱心な","note":"【例文訳】\n教師は日常生活から敬虔な 熱心な例を選んだ。","etymology":"de \"下 離\" + vovere \"誓う\"","preposition":""},{"id":2079,"section":"Section 21 (1級)","word":"optimum","phrase":"Newspapers treated optimum as the central issue in the election.","meaning":"最高の 最適の","note":"【例文訳】\n新聞各紙は最高の 最適のをその選挙の中心的争点として扱った。","etymology":"bonus（良い）＋-imus（最も>-tmmo-）","preposition":""},{"id":2080,"section":"Section 21 (1級)","word":"ingenious","phrase":"The company faced ingenious pressure from investors.","meaning":"巧妙な 器用な（独創的な）","note":"【例文訳】\nその会社は投資家から巧妙な 器用な（独創的な）圧力を受けた。","etymology":"in-（中に）＋gigno（産む）","preposition":""},{"id":2081,"section":"Section 21 (1級)","word":"unruly","phrase":"The error was unruly small, but it changed the final result.","meaning":"手に負えない","note":"【例文訳】\nその誤差は手に負えない小さかったが、最終結果を変えた。","etymology":"un（否定）+ruly（規則的な）rule(規則)","preposition":""},{"id":2082,"section":"Section 21 (1級)","word":"malevolent","phrase":"The film presents a malevolent portrait of family life.","meaning":"悪意のある","note":"【例文訳】\nその映画は家族生活の悪意のある描写を示している。","etymology":"male（悪い）+velle=（願う）","preposition":""},{"id":2083,"section":"Section 21 (1級)","word":"haughty","phrase":"The medicine produced a haughty reaction in a few patients.","meaning":"傲慢な","note":"【例文訳】\nその薬は一部の患者に傲慢な反応を引き起こした。","etymology":"haut, \"すごい、高い\"","preposition":""},{"id":2084,"section":"Section 21 (1級)","word":"arcane","phrase":"His argument became more arcane after he added concrete examples.","meaning":"秘密の 難解な","note":"【例文訳】\n具体例を加えた後、彼の主張はより秘密の 難解なものになった。","etymology":"arcere 「黙る」 ← arca 「大箱」.","preposition":""},{"id":2085,"section":"Section 21 (1級)","word":"fallible","phrase":"The town developed a fallible economy around tourism.","meaning":"誤りやすい　当てにならない","note":"【例文訳】\nその町は観光を中心とした誤りやすい 当てにならない経済を発展させた。","etymology":"fallere (騙す) + -ibilis (～られる).","preposition":""},{"id":2086,"section":"Section 21 (1級)","word":"trite","phrase":"The result was trite enough to change the policy.","meaning":"陳腐な","note":"【例文訳】\nその結果は政策を変えるのに十分陳腐なものだった。","etymology":"ラテン語の tritus 、 terere 「擦り切れる」の過去分詞。","preposition":""},{"id":2087,"section":"Section 21 (1級)","word":"devoid","phrase":"The coach warned players not to devoid their opponents.","meaning":"（～を）欠いている","note":"【例文訳】\nコーチは選手たちに相手を（～を）欠いているしないよう警告した。","etymology":"des- \"外 離\" + voider \"空になる”","preposition":""},{"id":2088,"section":"Section 21 (1級)","word":"dreary","phrase":"The old bridge looked dreary, so engineers closed it before the storm.","meaning":"陰うつな わびしい もの寂しい 退屈な","note":"【例文訳】\nその古い橋は陰うつな わびしい もの寂しい 退屈なように見えたため、技師たちは嵐の前に閉鎖した。","etymology":"dreor 「血の、血だらけの」から dreorig 「悲しげな」に発展。","preposition":""},{"id":2089,"section":"Section 21 (1級)","word":"lax","phrase":"Her lax response helped the group avoid a larger conflict.","meaning":"しまりのない だらしない","note":"【例文訳】\n彼女のしまりのない だらしない対応により、その集団はより大きな対立を避けられた。","etymology":"laxus（広い、ゆとりのある）","preposition":""},{"id":2090,"section":"Section 21 (1級)","word":"disheveled","phrase":"They needed a disheveled solution, not another temporary excuse.","meaning":"身なりのだらしない （髪・服が）乱れた","note":"【例文訳】\n彼らに必要だったのは身なりのだらしない （髪・服が）乱れた解決策であり、また別の一時的な言い訳ではなかった。","etymology":"dis(否定)+shevel(髪）","preposition":""},{"id":2091,"section":"Section 21 (1級)","word":"rudimentary","phrase":"The director made a rudimentary decision that surprised even his supporters.","meaning":"基礎的な 原始的な","note":"【例文訳】\nその責任者は、支持者さえ驚かせる基礎的な 原始的な決定を下した。","etymology":"rudis（粗い）+ment(状態？）","preposition":""},{"id":2092,"section":"Section 21 (1級)","word":"impulsive","phrase":"A impulsive silence filled the room after the announcement.","meaning":"直感的な 衝動的な","note":"【例文訳】\n発表の後、部屋は直感的な 衝動的な沈黙に包まれた。","etymology":"im-（中に）＋pello（駆り立てる）","preposition":""},{"id":2093,"section":"Section 21 (1級)","word":"reticent","phrase":"The proposal sounded reticent, but the numbers did not support it.","meaning":"無口な","note":"【例文訳】\nその提案は無口なように聞こえたが、数字はそれを裏づけていなかった。","etymology":"re- (後ろ、再び) + tacere （沈黙した）","preposition":""},{"id":2094,"section":"Section 21 (1級)","word":"lanky","phrase":"Students learned how to lanky evidence instead of simply memorizing it.","meaning":"背が高くて細い","note":"【例文訳】\n学生たちは証拠をただ暗記するのではなく、どのように背が高くて細いかを学んだ。","etymology":"hlanka（曲げる）","preposition":""},{"id":2095,"section":"Section 21 (1級)","word":"succulent","phrase":"Even a succulent change in tone can affect how people receive criticism.","meaning":"多汁質の","note":"【例文訳】\n口調の多汁質の変化でさえ、人々が批判をどう受け取るかに影響する。","etymology":"succus（ジュース・樹液）+ulentus（豊富な）","preposition":""},{"id":2096,"section":"Section 21 (1級)","word":"paltry","phrase":"The committee rejected the paltry explanation and asked for evidence.","meaning":"ごくわずかな 価値のない 卑劣な","note":"【例文訳】\n委員会はそのごくわずかな 価値のない 卑劣な説明を退け、証拠を求めた。","etymology":"方言のpalt, pelt \"ゴミ\"と関連","preposition":""},{"id":2097,"section":"Section 21 (1級)","word":"bucolic","phrase":"At first the task seemed bucolic, but practice made it manageable.","meaning":"牧歌的な 田舎の","note":"【例文訳】\n最初その作業は牧歌的な 田舎のように思えたが、練習によってこなせるようになった。","etymology":"βουκóλος「牛飼い」(βου（牛)+κóλος(紳士/美しい人）)","preposition":""},{"id":2098,"section":"Section 21 (1級)","word":"lavish","phrase":"Reporters described the mayor’s apology as lavish.","meaning":"ぜいたくな","note":"【例文訳】\n記者たちは市長の謝罪をぜいたくなものだと表現した。","etymology":"おそらく古フランス語 lavasse (“土砂降り”)\n又は中英語 laven (“溢れ出す”)より","preposition":""},{"id":2099,"section":"Section 21 (1級)","word":"exponential","phrase":"The child gave a exponential smile when the music started.","meaning":"急激な 幾何級数的な","note":"【例文訳】\n音楽が始まると、その子は急激な 幾何級数的な笑みを浮かべた。","etymology":"基数の外側に（ex-）置い（pono）てある（-ens）","preposition":""},{"id":2100,"section":"Section 21 (1級)","word":"irreparably","phrase":"Irreparably, the team found a cheaper way to solve the problem.","meaning":"修復できないほど","note":"【例文訳】\n修復できないほど、チームはその問題を解決するより安い方法を見つけた。","etymology":"in=否定 repair=修理する able=できる repair（ re再びparare準備する）","preposition":""},{"id":2101,"section":"Section 22 (1級)","word":"abide by","phrase":"All employees must abide by the safety rules in the laboratory.","meaning":"規則などに従う","note":"【例文訳】\nすべての従業員は実験室の安全規則に従わなければならない。","etymology":"【語源補足】熟語・句動詞。中心動詞と前置詞・副詞のイメージを組み合わせて覚える。","preposition":"by は『そば』から『手段・行為者・期限』へ広がる。"},{"id":2102,"section":"Section 22 (1級)","word":"act up","phrase":"My old laptop always starts to act up right before an important deadline.","meaning":"興奮して暴れる,機械などが異常に作動する","note":"【例文訳】\n私の古いノートパソコンは、大事な締め切りの直前になるといつも調子が悪くなる。","etymology":"【語源補足】熟語・句動詞。中心動詞と前置詞・副詞のイメージを組み合わせて覚える。","preposition":"up は『上へ』から『増加・完成・出現』へ広がる。"},{"id":2103,"section":"Section 22 (1級)","word":"add up to","phrase":"A few small delays added up to a major problem by the end of the week.","meaning":"結局〜になる、〜につながる","note":"【例文訳】\nいくつかの小さな遅れが積み重なり、週末には大きな問題になった。","etymology":"【語源補足】熟語・句動詞。中心動詞と前置詞・副詞のイメージを組み合わせて覚える。","preposition":"to は『到達点へ向かう』。方向だけでなく、結果・相手への到達も表す。 / up は『上へ』から『増加・完成・出現』へ広がる。"},{"id":2104,"section":"Section 22 (1級)","word":"adhere to","phrase":"The hospital must adhere to strict rules when handling patient data.","meaning":"〜に従う、〜に固執する","note":"【例文訳】\nその病院は患者データを扱う際、厳格な規則に従わなければならない。","etymology":"【語源補足】熟語・句動詞。中心動詞と前置詞・副詞のイメージを組み合わせて覚える。","preposition":"to は『到達点へ向かう』。方向だけでなく、結果・相手への到達も表す。"},{"id":2105,"section":"Section 22 (1級)","word":"atone for","phrase":"He spent years trying to atone for the harm he had caused.","meaning":"償う","note":"【例文訳】\n彼は自分が引き起こした害を償おうとして何年も過ごした。","etymology":"【語源補足】熟語・句動詞。中心動詞と前置詞・副詞のイメージを組み合わせて覚える。","preposition":"for は『向かう先・目的・交換』。何のために向いているかを見る。"},{"id":2106,"section":"Section 22 (1級)","word":"attribute A to B","phrase":"Researchers attributed the rise in asthma to air pollution.","meaning":"AはBに起因すると考える","note":"【例文訳】\n研究者たちは喘息の増加を大気汚染に起因すると考えた。","etymology":"【語源補足】熟語・句動詞。中心動詞と前置詞・副詞のイメージを組み合わせて覚える。","preposition":"熟語は『動詞の核』＋『前置詞/副詞の空間イメージ』で覚えると、丸暗記より崩れにくい。"},{"id":2107,"section":"Section 22 (1級)","word":"bail out","phrase":"The government agreed to bail out the bank to prevent a wider crisis.","meaning":"企業などを救済する,保釈する","note":"【例文訳】\n政府はより大きな危機を防ぐため、その銀行を救済することに同意した。","etymology":"【語源補足】熟語・句動詞。中心動詞と前置詞・副詞のイメージを組み合わせて覚える。","preposition":"out は『外へ』。隠れたものが外に出て見える/尽きる/実行される。"},{"id":2108,"section":"Section 22 (1級)","word":"bank on","phrase":"You cannot bank on good weather in the mountains.","meaning":"当てにする","note":"【例文訳】\n山では好天を当てにすることはできない。","etymology":"【語源補足】熟語・句動詞。中心動詞と前置詞・副詞のイメージを組み合わせて覚える。","preposition":"on は『上』より『くっついている/接触/継続』。依存・継続・作動中の感覚に広がる。"},{"id":2109,"section":"Section 22 (1級)","word":"barge into","phrase":"He barged into the room without knocking.","meaning":"どかどか入り込む,会話などに割り込む","note":"【例文訳】\n彼はノックもせずに部屋へどかどか入り込んだ。","etymology":"【語源補足】熟語・句動詞。中心動詞と前置詞・副詞のイメージを組み合わせて覚える。","preposition":"into は『中へ入り込む/変化して〜になる』。"},{"id":2110,"section":"Section 22 (1級)","word":"bawl out","phrase":"The coach bawled out the players for arriving late.","meaning":"厳しく叱りとばす","note":"【例文訳】\nコーチは遅れて来た選手たちを厳しく叱り飛ばした。","etymology":"【語源補足】熟語・句動詞。中心動詞と前置詞・副詞のイメージを組み合わせて覚える。","preposition":"out は『外へ』。隠れたものが外に出て見える/尽きる/実行される。"},{"id":2111,"section":"Section 22 (1級)","word":"be bogged down in","phrase":"The team was bogged down in paperwork for most of the afternoon.","meaning":"行き詰まる","note":"【例文訳】\nそのチームは午後の大半を事務作業に追われて行き詰まっていた。","etymology":"【語源補足】熟語・句動詞。中心動詞と前置詞・副詞のイメージを組み合わせて覚える。","preposition":"in は『広い』ではなく『中に入っている/範囲内』。時間・状態・言語も容器のように捉える。 / down は『下へ』から『低下・記録・鎮静・故障』へ広がる。"},{"id":2112,"section":"Section 22 (1級)","word":"be cut out for","phrase":"She realized she was not cut out for a job that required constant travel.","meaning":"〜に向いている","note":"【例文訳】\n彼女は絶えず出張が必要な仕事には向いていないと気づいた。","etymology":"【語源補足】熟語・句動詞。中心動詞と前置詞・副詞のイメージを組み合わせて覚える。","preposition":"for は『向かう先・目的・交換』。何のために向いているかを見る。 / out は『外へ』。隠れたものが外に出て見える/尽きる/実行される。"},{"id":2113,"section":"Section 22 (1級)","word":"be geared up for","phrase":"The staff were geared up for the opening day of the festival.","meaning":"準備をする","note":"【例文訳】\n職員たちは祭りの初日に向けて準備を整えていた。","etymology":"【語源補足】熟語・句動詞。中心動詞と前置詞・副詞のイメージを組み合わせて覚える。","preposition":"for は『向かう先・目的・交換』。何のために向いているかを見る。 / up は『上へ』から『増加・完成・出現』へ広がる。"},{"id":2114,"section":"Section 22 (1級)","word":"be keyed up","phrase":"The children were keyed up before their first stage performance.","meaning":"興奮している,緊張している","note":"【例文訳】\n子どもたちは初めての舞台公演の前で興奮していた。","etymology":"【語源補足】熟語・句動詞。中心動詞と前置詞・副詞のイメージを組み合わせて覚える。","preposition":"up は『上へ』から『増加・完成・出現』へ広がる。"},{"id":2115,"section":"Section 22 (1級)","word":"bear down on","phrase":"Investigators began to bear down on the company after the leak.","meaning":"真剣に対処する","note":"【例文訳】\n情報漏えいの後、捜査官たちはその会社に本格的に圧力をかけ始めた。","etymology":"【語源補足】熟語・句動詞。中心動詞と前置詞・副詞のイメージを組み合わせて覚える。","preposition":"on は『上』より『くっついている/接触/継続』。依存・継続・作動中の感覚に広がる。 / down は『下へ』から『低下・記録・鎮静・故障』へ広がる。"},{"id":2116,"section":"Section 22 (1級)","word":"bear out","phrase":"The later results bore out her original hypothesis.","meaning":"仮説などを証明する","note":"【例文訳】\n後の結果は彼女の最初の仮説を裏づけた。","etymology":"【語源補足】熟語・句動詞。中心動詞と前置詞・副詞のイメージを組み合わせて覚える。","preposition":"out は『外へ』。隠れたものが外に出て見える/尽きる/実行される。"},{"id":2117,"section":"Section 22 (1級)","word":"bear the brunt of","phrase":"Small shops bore the brunt of the sudden tax increase.","meaning":"矢面に立つ","note":"【例文訳】\n小さな商店が突然の増税の矢面に立たされた。","etymology":"【語源補足】熟語・句動詞。中心動詞と前置詞・副詞のイメージを組み合わせて覚える。","preposition":"of は『切り離して取り出す/所属』。全体から一部を取り出す感覚。"},{"id":2118,"section":"Section 22 (1級)","word":"beat up","phrase":"A group of men beat up the journalist outside the station.","meaning":"さんざん殴る","note":"【例文訳】\n男たちの一団が駅の外でその記者をさんざん殴った。","etymology":"【語源補足】熟語・句動詞。中心動詞と前置詞・副詞のイメージを組み合わせて覚える。","preposition":"up は『上へ』から『増加・完成・出現』へ広がる。"},{"id":2119,"section":"Section 22 (1級)","word":"beef about","phrase":"Passengers beefed about the long delay at the airport.","meaning":"文句を言う","note":"【例文訳】\n乗客たちは空港での長い遅延に文句を言った。","etymology":"【語源補足】熟語・句動詞。中心動詞と前置詞・副詞のイメージを組み合わせて覚える。","preposition":"about は『周辺』。話題の周りを扱うので『〜について』になる。"},{"id":2120,"section":"Section 22 (1級)","word":"beef up","phrase":"The school beefed up security after several break-ins.","meaning":"強化する","note":"【例文訳】\nその学校は数件の侵入事件の後、警備を強化した。","etymology":"【語源補足】熟語・句動詞。中心動詞と前置詞・副詞のイメージを組み合わせて覚える。","preposition":"up は『上へ』から『増加・完成・出現』へ広がる。"},{"id":2121,"section":"Section 22 (1級)","word":"belt out","phrase":"She belted out the final song and brought the audience to its feet.","meaning":"大声で歌う","note":"【例文訳】\n彼女は最後の歌を大声で歌い上げ、観客を総立ちにさせた。","etymology":"【語源補足】熟語・句動詞。中心動詞と前置詞・副詞のイメージを組み合わせて覚える。","preposition":"out は『外へ』。隠れたものが外に出て見える/尽きる/実行される。"},{"id":2122,"section":"Section 22 (1級)","word":"black out","phrase":"He blacked out after standing in the heat for too long.","meaning":"発表などを抑える,一時的に意識を失う","note":"【例文訳】\n彼は暑さの中で長く立ちすぎて一時的に意識を失った。","etymology":"【語源補足】熟語・句動詞。中心動詞と前置詞・副詞のイメージを組み合わせて覚える。","preposition":"out は『外へ』。隠れたものが外に出て見える/尽きる/実行される。"},{"id":2123,"section":"Section 22 (1級)","word":"blare out","phrase":"Music blared out from the speakers until midnight.","meaning":"鳴り響く","note":"【例文訳】\n真夜中までスピーカーから音楽が鳴り響いた。","etymology":"【語源補足】熟語・句動詞。中心動詞と前置詞・副詞のイメージを組み合わせて覚える。","preposition":"out は『外へ』。隠れたものが外に出て見える/尽きる/実行される。"},{"id":2124,"section":"Section 22 (1級)","word":"blot out","phrase":"Clouds blotted out the moon as we walked home.","meaning":"消し去る","note":"【例文訳】\n私たちが歩いて帰る間、雲が月を覆い隠した。","etymology":"【語源補足】熟語・句動詞。中心動詞と前置詞・副詞のイメージを組み合わせて覚える。","preposition":"out は『外へ』。隠れたものが外に出て見える/尽きる/実行される。"},{"id":2125,"section":"Section 22 (1級)","word":"blow over","phrase":"The scandal did not blow over as quickly as the minister had hoped.","meaning":"嵐、困難などが過ぎ去る,うわさが忘れ去られる","note":"【例文訳】\nその不祥事は大臣が期待したほど早く忘れ去られなかった。","etymology":"【語源補足】熟語・句動詞。中心動詞と前置詞・副詞のイメージを組み合わせて覚える。","preposition":"over は『上を覆う/越える』。支配・終了・過剰にもつながる。"},{"id":2126,"section":"Section 22 (1級)","word":"boil down to","phrase":"The problem boils down to a lack of trust.","meaning":"帰着する","note":"【例文訳】\nその問題は結局、信頼の欠如に帰着する。","etym         // --- タイトルの自動動的セット設定 ---
        const pageTitle = document.title || "英単語ハックマスター";
        document.getElementById('home-title').textContent = pageTitle.replace(/⚡/g, "").trim();

        // --- ストレージ & ステート管理 ---
        const storageKey = "HACK_MASTER_" + encodeURIComponent(pageTitle) + "_CLEARED_IDS";
        let clearedList = JSON.parse(localStorage.getItem(storageKey)) || [];

        let currentDeck = [];      
        let initialUniqueCount = 0;
        let currentIndex = 0;      
        let comboCount = 0;

        // DOMの取得
        const domScreenHome = document.getElementById('screen-home');
        const domScreenQuiz = document.getElementById('screen-quiz');
        const domSectionList = document.getElementById('section-list');
        const domTotalProgressPercent = document.getElementById('total-progress-percent');
        const domTotalProgressBar = document.getElementById('total-progress-bar');
        const domTotalProgressCount = document.getElementById('total-progress-count');
        const domQuizCount = document.getElementById('quiz-count');
        const domQuizProgressBar = document.getElementById('quiz-progress-bar');
        const domQuizComboBadge = document.getElementById('quiz-combo-badge');
        const domQuizComboCount = document.getElementById('quiz-combo-count');
        const domHeaderCombo = document.getElementById('header-combo');
        const domHeaderComboCount = document.getElementById('header-combo-count');
        const domQuizSectionTitle = document.getElementById('quiz-section-title');
        const domQuizHintMeaning = document.getElementById('quiz-hint-meaning');
        const domQuizBoostEtymology = document.getElementById('quiz-boost-etymology');
        const domQuizBoostPreposition = document.getElementById('quiz-boost-preposition');
        const domQuizPhrase = document.getElementById('quiz-phrase');
        const domQuizAnswerZone = document.getElementById('quiz-answer-zone');
        const domQuizCorrectWord = document.getElementById('quiz-correct-word');
        const domBtnReveal = document.getElementById('btn-reveal');
        const domQuizChoicePad = document.getElementById('quiz-choice-pad');
        const domBtnCorrect = document.getElementById('btn-correct');
        const domBtnWrong = document.getElementById('btn-wrong');
        const domBtnBack = document.getElementById('btn-back');
        const domBtnResetAll = document.getElementById('btn-reset-all');
        const domBtnSpeakWord = document.getElementById('btn-speak-word');
        const domBtnSpeakPhrase = document.getElementById('btn-speak-phrase');

        // --- ホーム画面の描画 ---
        function renderHome() {
            domScreenQuiz.classList.add('hidden');
            domScreenHome.classList.remove('hidden');

            const totalWords = MASTER_DATA.length;
            const clearedWords = clearedList.filter(id => MASTER_DATA.some(m => m.id === id)).length;
            const totalPercent = totalWords > 0 ? Math.round((clearedWords / totalWords) * 100) : 0;
            
            domTotalProgressPercent.textContent = `${totalPercent}%`;
            domTotalProgressBar.style.width = `${totalPercent}%`;
            domTotalProgressCount.textContent = `完遂済み: ${clearedWords} / ${totalWords} 語`;

            const sections = [...new Set(MASTER_DATA.map(item => item.section))];
            domSectionList.innerHTML = '';

            sections.forEach(secName => {
                const secItems = MASTER_DATA.filter(item => item.section === secName);
                const secCleared = secItems.filter(item => clearedList.includes(item.id)).length;
                const secPercent = Math.round((secCleared / secItems.length) * 100);
                const isCompleted = secCleared === secItems.length;

                const div = document.createElement('div');
                div.className = `glass-card p-3.5 rounded-xl border flex flex-col justify-between items-stretch space-y-2 transition-all ${isCompleted ? 'border-emerald-500/30 bg-emerald-950/10' : 'border-slate-800 hover:border-slate-700'}`;
                
                div.innerHTML = `
                    <div class="flex justify-between items-center">
                        <div>
                            <h3 class="text-sm font-bold text-slate-200">${secName}</h3>
                            <p class="text-[11px] text-slate-400 font-mono mt-0.5">進捗: ${secCleared} / ${secItems.length} 語</p>
                        </div>
                        <div class="text-right">
                            <span class="text-xs font-black ${isCompleted ? 'text-emerald-400' : 'text-blue-400'} font-mono">${secPercent}%</span>
                        </div>
                    </div>
                    <div class="w-full bg-slate-900 h-1.5 rounded-full overflow-hidden">
                        <div class="progress-bar ${isCompleted ? 'bg-emerald-500' : 'bg-blue-500'} h-full" style="width: ${secPercent}%"></div>
                    </div>
                    <div class="flex space-x-2 pt-1">
                        <button onclick="startSession('${secName}')" class="flex-1 bg-slate-800 hover:bg-slate-700 text-xs font-bold py-2 rounded-lg transition-colors border border-slate-700/50">
                            ${isCompleted ? '🔄 復習スタート' : '⚡ 攻略開始'}
                        </button>
                        ${secCleared > 0 ? `
                            <button onclick="resetSectionProgress('${secName}')" class="text-[10px] text-slate-500 hover:text-rose-400 px-2 transition-colors">
                                ↺ リセット
                            </button>
                        ` : ''}
                    </div>
                `;
                domSectionList.appendChild(div);
            });
        }

        // --- クイズセッションの開始 ---
        function startSession(sectionName) {
            let targetItems = MASTER_DATA.filter(item => item.section === sectionName);
            currentDeck = targetItems.filter(item => !clearedList.includes(item.id));

            if (currentDeck.length === 0) {
                currentDeck = [...targetItems];
            }

            // ランダムシャッフル
            currentDeck.sort(() => Math.random() - 0.5);

            initialUniqueCount = currentDeck.length; 
            currentIndex = 0;
            comboCount = 0;

            updateComboUI();
            
            domScreenHome.classList.add('hidden');
            domScreenQuiz.classList.remove('hidden');
            
            showQuestion();
        }

        // --- 問題の提示 ---

        // --- 穴あき表示ヘルパー（熟語・be動詞・過去形・doing/～などの可変部分にも対応） ---
        function escapeRegExp(str) {
            return String(str).replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
        }

        function escapeHtml(str) {
            return String(str)
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;')
                .replace(/'/g, '&#39;');
        }

        function normalizeTargetExpression(targetWord) {
            return String(targetWord || "")
                .replace(/[（）]/g, " ")
                .replace(/\([^)]*\)/g, " ")
                .replace(/\[[^\]]*\]/g, " ")
                .replace(/[･・]/g, " ")
                .replace(/[〜]/g, "~")
                .replace(/…/g, " ")
                .replace(/\s+/g, " ")
                .trim();
        }

        function getVerbForms(base) {
            const irregulars = {
                "be": ["be", "am", "are", "is", "was", "were", "been", "being"],
                "take": ["take", "takes", "took", "taken", "taking"],
                "make": ["make", "makes", "made", "making"],
                "come": ["come", "comes", "came", "coming"],
                "go": ["go", "goes", "went", "gone", "going"],
                "get": ["get", "gets", "got", "gotten", "getting"],
                "give": ["give", "gives", "gave", "given", "giving"],
                "do": ["do", "does", "did", "done", "doing"],
                "have": ["have", "has", "had", "having"],
                "run": ["run", "runs", "ran", "running"],
                "write": ["write", "writes", "wrote", "written", "writing"],
                "speak": ["speak", "speaks", "spoke", "spoken", "speaking"],
                "break": ["break", "breaks", "broke", "broken", "breaking"],
                "bring": ["bring", "brings", "brought", "bringing"],
                "buy": ["buy", "buys", "bought", "buying"],
                "catch": ["catch", "catches", "caught", "catching"],
                "choose": ["choose", "chooses", "chose", "chosen", "choosing"],
                "feel": ["feel", "feels", "felt", "feeling"],
                "find": ["find", "finds", "found", "finding"],
                "keep": ["keep", "keeps", "kept", "keeping"],
                "know": ["know", "knows", "knew", "known", "knowing"],
                "leave": ["leave", "leaves", "left", "leaving"],
                "lose": ["lose", "loses", "lost", "losing"],
                "pay": ["pay", "pays", "paid", "paying"],
                "put": ["put", "puts", "putting"],
                "read": ["read", "reads", "reading"],
                "see": ["see", "sees", "saw", "seen", "seeing"],
                "send": ["send", "sends", "sent", "sending"],
                "set": ["set", "sets", "setting"],
                "sit": ["sit", "sits", "sat", "sitting"],
                "stand": ["stand", "stands", "stood", "standing"],
                "teach": ["teach", "teaches", "taught", "teaching"],
                "tell": ["tell", "tells", "told", "telling"],
                "think": ["think", "thinks", "thought", "thinking"],
                "understand": ["understand", "understands", "understood", "understanding"]
            };

            const b = String(base || "").toLowerCase();
            if (irregulars[b]) return irregulars[b];

            const forms = new Set([b]);
            if (b.endsWith("e")) {
                forms.add(b + "s");
                forms.add(b.slice(0, -1) + "ed");
                forms.add(b.slice(0, -1) + "ing");
            } else if (b.endsWith("y") && !/[aeiou]y$/.test(b)) {
                forms.add(b.slice(0, -1) + "ies");
                forms.add(b.slice(0, -1) + "ied");
                forms.add(b + "ing");
            } else {
                forms.add(b + "s");
                forms.add(b + "ed");
                forms.add(b + "ing");
            }
            return Array.from(forms);
        }

        function variableNounPhrasePattern(maxWords = 4) {
            // 前置詞や接続詞の手前で止める。例: wash away the problem during... → wash away the problem
            const stop = "in|inside|on|at|by|for|with|during|before|after|to|from|of|as|if|when|while|because|since|until|unless|under|over|through|into|onto|about|within|without|than|that|which|who|where";
            return `(?:[A-Za-z][A-Za-z'’.-]*(?:\\s+(?!${stop}\\b)[A-Za-z][A-Za-z'’.-]*){0,${maxWords - 1}})`;
        }

        function gerundPhrasePattern() {
            // doing の部分を taking photos / solving the issue などに対応させる
            const stop = "in|inside|on|at|by|for|with|during|before|after|to|from|of|as|if|when|while|because|since|until|unless|under|over|through|into|onto|about|within|without|than|that|which|who|where";
            return `(?:[A-Za-z][A-Za-z'’.-]*ing(?:\\s+(?!${stop}\\b)[A-Za-z][A-Za-z'’.-]*){0,3})`;
        }

        function bareVerbPhrasePattern() {
            return `(?:[A-Za-z][A-Za-z'’.-]*(?:\\s+[A-Za-z][A-Za-z'’.-]*){0,3})`;
        }

        function tokenToPattern(token, index, tokens) {
            const t = String(token || "").toLowerCase();
            const prev = index > 0 ? String(tokens[index - 1]).toLowerCase() : "";

            if (["~", "...", "someone", "somebody", "something", "one", "one's", "ones", "oneself", "it"].includes(t)) {
                return variableNounPhrasePattern(4);
            }
            if (["a", "b", "o", "c"].includes(t)) {
                return variableNounPhrasePattern(3);
            }
            if (t === "doing") {
                return gerundPhrasePattern();
            }
            if (t === "do" && prev === "to") {
                return bareVerbPhrasePattern();
            }
            if (t === "be") {
                return `(?:${getVerbForms("be").map(escapeRegExp).join("|")})`;
            }

            const forms = getVerbForms(t).map(escapeRegExp).join("|");
            return `(?:${forms})`;
        }

        function buildPatternFromTokens(tokens) {
            const filtered = [];
            for (let i = 0; i < tokens.length; i++) {
                // doing ~ は doing 側で目的語まで吸収するので、直後の ~ は飛ばす
                if (tokens[i] === "~" && i > 0 && String(tokens[i - 1]).toLowerCase() === "doing") continue;
                filtered.push(tokens[i]);
            }
            if (filtered.length === 0) return null;

            const parts = filtered.map((tok, idx) => tokenToPattern(tok, idx, filtered));
            return `\\b${parts.join("\\s+")}\\b`;
        }

        function buildTargetRegex(targetWord) {
            const normalized = normalizeTargetExpression(targetWord);
            if (!normalized) return null;

            const candidates = new Set([normalized]);

            // be interested in ~ → interested in ~ でも拾えるようにする
            if (/^be\s+/i.test(normalized)) {
                candidates.add(normalized.replace(/^be\s+/i, ""));
            }

            // 「A to B」「A into B」等の記号を緩めるための掃除版
            const cleaned = normalized
                .replace(/[（）()[\]]/g, " ")
                .replace(/[･・]/g, " ")
                .replace(/\s+/g, " ")
                .trim();
            if (cleaned) candidates.add(cleaned);

            const patterns = [];

            candidates.forEach(candidate => {
                const tokens = candidate.split(/\s+/).filter(Boolean);
                const pattern = buildPatternFromTokens(tokens);
                if (pattern) patterns.push(pattern);

                // trailing ~ を持つ熟語は、~なし版でも拾う
                if (tokens[tokens.length - 1] === "~") {
                    const withoutTilde = tokens.slice(0, -1);
                    const p2 = buildPatternFromTokens(withoutTilde);
                    if (p2) patterns.push(p2);
                }
            });

            const uniquePatterns = Array.from(new Set(patterns)).sort((a, b) => b.length - a.length);
            if (uniquePatterns.length === 0) return null;
            return new RegExp(uniquePatterns.join("|"), "gi");
        }

        function renderMaskedPhrase(rawPhrase, targetWord, reveal = false) {
            const phrase = String(rawPhrase || "");
            const regex = buildTargetRegex(targetWord);
            if (!regex) return escapeHtml(phrase);

            let matched = false;
            let lastIndex = 0;
            let html = "";

            phrase.replace(regex, (match, ...args) => {
                const offset = args[args.length - 2];
                matched = true;
                html += escapeHtml(phrase.slice(lastIndex, offset));
                html += reveal
                    ? `<span class="text-rose-500 underline font-black font-mono">${escapeHtml(match)}</span>`
                    : "_____";
                lastIndex = offset + match.length;
                return match;
            });

            if (matched) {
                html += escapeHtml(phrase.slice(lastIndex));
                return html;
            }

            // 最終フォールバック：完全一致だけでも拾う
            const simpleTarget = normalizeTargetExpression(targetWord).replace(/\s*~\s*$/g, "");
            if (simpleTarget) {
                const simpleRegex = new RegExp(escapeRegExp(simpleTarget), "gi");
                lastIndex = 0;
                html = "";
                phrase.replace(simpleRegex, (match, ...args) => {
                    const offset = args[args.length - 2];
                    matched = true;
                    html += escapeHtml(phrase.slice(lastIndex, offset));
                    html += reveal
                        ? `<span class="text-rose-500 underline font-black font-mono">${escapeHtml(match)}</span>`
                        : "_____";
                    lastIndex = offset + match.length;
                    return match;
                });
                if (matched) {
                    html += escapeHtml(phrase.slice(lastIndex));
                    return html;
                }
            }

            return escapeHtml(phrase);
        }


        function showQuestion() {
            if (currentDeck.length === 0 || currentIndex >= currentDeck.length) {
                alert("🎉 セクション内のすべての問題をクリアしました！完璧なコンプリートです！");
                exitQuiz();
                return;
            }

            domQuizAnswerZone.classList.add('invisible');
            domQuizChoicePad.classList.add('hidden');
            domBtnReveal.classList.remove('hidden');

            const currentQuestion = currentDeck[currentIndex];

            // 画面上の残り問題数カウンターをリアルタイム動的表示
            domQuizCount.textContent = currentDeck.length - currentIndex;
            
            const progressPercent = initialUniqueCount > 0 ? (currentIndex / currentDeck.length) * 100 : 0;
            domQuizProgressBar.style.width = `${progressPercent}%`;
            domQuizSectionTitle.textContent = currentQuestion.section;

            domQuizHintMeaning.textContent = currentQuestion.meaning;
            domQuizBoostEtymology.textContent = currentQuestion.etymology || "語源データ最適化済";
            domQuizBoostPreposition.textContent = currentQuestion.note || "（補足なし）";
            domQuizCorrectWord.textContent = currentQuestion.word;

            // ターゲット単語・熟語を隠して「_____」に変える
            // take up ~ → take/takes/took/taken/taking up、be tired of → is/was/are tired of などにも対応
            domQuizPhrase.innerHTML = renderMaskedPhrase(currentQuestion.phrase, currentQuestion.word, false);
        }

        // --- 答えを見る ---
        function revealAnswer() {
            domBtnReveal.classList.add('hidden');
            domQuizChoicePad.classList.remove('hidden');
            domQuizAnswerZone.classList.remove('invisible');

            const currentQuestion = currentDeck[currentIndex];
            domQuizPhrase.innerHTML = renderMaskedPhrase(currentQuestion.phrase, currentQuestion.word, true);

            // ネイティブ発音を即座に自動再生
            speak(currentQuestion.word, 1.0);
        }

        // --- 仕分けシステム（ゲーム作成プロのオートローテーション） ---
        function handleUserJudgment(isCorrect) {
            const currentQuestion = currentDeck[currentIndex];

            if (isCorrect) {
                // 覚えた（クリア）なら保存してリストから除外していく
                if (!clearedList.includes(currentQuestion.id)) {
                    clearedList.push(currentQuestion.id);
                    localStorage.setItem(storageKey, JSON.stringify(clearedList));
                }
                comboCount++;
                updateComboUI();
                currentIndex++;
            } else {
                // もう一度（復習）なら、現在のデッキの最後尾にガサッと回す（無限ローテーション）
                comboCount = 0; 
                updateComboUI();

                currentDeck.push(currentQuestion);
                currentIndex++;
            }

            showQuestion();
        }

        function updateComboUI() {
            if (comboCount >= 3) {
                domQuizComboBadge.classList.remove('opacity-0');
                domQuizComboCount.textContent = comboCount;
                domHeaderCombo.classList.remove('hidden');
                domHeaderComboCount.textContent = comboCount;
            } else {
                domQuizComboBadge.classList.add('opacity-0');
                domHeaderCombo.classList.add('hidden');
            }
        }

        function exitQuiz() {
            renderHome();
        }

        function resetSectionProgress(sectionName) {
            if (confirm(`${sectionName} のクリア記録をリセットして未着手に戻しますか？`)) {
                const targetIds = MASTER_DATA.filter(item => item.section === sectionName).map(item => item.id);
                clearedList = clearedList.filter(id => !targetIds.includes(id));
                localStorage.setItem(storageKey, JSON.stringify(clearedList));
                renderHome();
            }
        }

        domBtnResetAll.addEventListener('click', () => {
            if (confirm("すべての進捗データを完全に消去し、初期状態に戻しますか？")) {
                clearedList = [];
                localStorage.removeItem(storageKey);
                renderHome();
            }
        });

        function speak(text, speed = 1.0) {
            if ('speechSynthesis' in window) {
                window.speechSynthesis.cancel();
                let cleanText = text.replace(/_____/g, "blank");
                const utterance = new SpeechSynthesisUtterance(cleanText);
                utterance.lang = 'en-US';
                utterance.rate = speed;
                window.speechSynthesis.speak(utterance);
            }
        }

        // イベントリスナー
        domBtnReveal.addEventListener('click', revealAnswer);
        domBtnCorrect.addEventListener('click', () => handleUserJudgment(true));
        domBtnWrong.addEventListener('click', () => handleUserJudgment(false));
        domBtnBack.addEventListener('click', () => {
            if (confirm("ホームに戻りますか？現在のセッション状態は一度リセットされます。")) { exitQuiz(); }
        });
        domBtnSpeakWord.addEventListener('click', () => { speak(currentDeck[currentIndex - 1]?.word || currentDeck[currentIndex].word, 1.0); });
        domBtnSpeakPhrase.addEventListener('click', () => { speak(currentDeck[currentIndex - 1]?.phrase || currentDeck[currentIndex].phrase, 0.95); });

        // 初期実行
        renderHome();
    </script>
</body>
</html>
