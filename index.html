<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>⚡ 英単語ハックマスター 1級⚡</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {

            background-color: #0f172a;
            color: #f8fafc;
            -webkit-tap-highlight-color: transparent;
            user-select: none;
        }
        .progress-bar {
            transition: width 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .glass-card {
            background: rgba(30, 41, 59, 0.7);

            border: 1px solid rgba(255, 255, 255, 0.05);
        }
        .fade-in {
            animation: fadeIn 0.2s ease-out forwards;
        }

            from { opacity: 0; transform: translateY(4px); }
            to { opacity: 1; transform: translateY(0); }

</head>
<body class="min-h-screen flex flex-col justify-between antialiased selection:bg-blue-500/30">

    <header class="w-full glass-card border-b border-slate-800 px-4 py-3 sticky top-0 z-50 flex items-center justify-between">
        <div class="flex items-center space-x-2">
            <span class="text-xl">⚡</span>
            <h1 class="text-base font-bold tracking-wider text-blue-400">WORD HACKER</h1>
        </div>
        <div id="header-combo" class="hidden bg-gradient-to-r from-amber-500 to-orange-500 text-slate-950 font-black px-2.5 py-0.5 rounded-full text-xs tracking-wider">

        </div>
    </header>

    <main class="flex-1 w-full max-w-md mx-auto p-4 flex flex-col justify-start">

                    <span>👑 総コンプリート率（覚えた単語）</span>
                    <span id="total-progress-percent" class="font-bold text-blue-400">0%</span>

                <div class="w-full bg-slate-800 h-3 rounded-full overflow-hidden p-[1px]">
                    <div id="total-progress-bar" class="progress-bar bg-gradient-to-r from-emerald-400 via-teal-500 to-blue-500 h-full w-0 rounded-full"></div>
                </div>
                <div class="flex justify-between text-[10px] text-slate-500 mt-1.5 font-mono">
                    <span id="total-progress-count">マスター: 0 / 0 語</span>
                    <button id="btn-reset-all" class="text-rose-400/70 hover:text-rose-400 transition-colors">データ全消去</button>
                </div>
            </div>

            <div id="section-list" class="space-y-3 max-h-[55vh] overflow-y-auto pr-1">
                </div>
        </div>

        <div id="screen-quiz" class="hidden space-y-4 w-full flex-1 flex flex-col justify-between fade-in">
            
            <div class="flex items-center justify-between">

                </button>
                <div class="text-xs font-mono tracking-wider bg-slate-800/80 px-3 py-1 rounded-md text-slate-300 border border-slate-700/50">

            </div>

            <div class="space-y-1">
                <div class="w-full bg-slate-800 h-1.5 rounded-full overflow-hidden">

                </div>
                <div class="flex justify-between items-center px-0.5">

            <div class="glass-card rounded-2xl p-5 border border-slate-700/60 bg-gradient-to-b from-slate-800/40 to-slate-900/60 flex-1 flex flex-col justify-between shadow-xl min-h-[360px]">
                
                <div class="space-y-3">

                        <div class="bg-slate-950/40 p-2 rounded-lg border border-slate-800/30">
                            <span class="text-[9px] font-bold text-blue-400 block">💡 語源・単語イメージ</span>
                            <span id="quiz-boost-etymology" class="text-slate-300 font-medium"></span>
                        </div>
                        <div class="bg-slate-950/40 p-2 rounded-lg border border-slate-800/30">
                            <span class="text-[9px] font-bold text-indigo-400 block">🔗 補足・コロケーション</span>
                            <span id="quiz-boost-preposition" class="text-slate-300 font-medium"></span>
                        </div>
                    </div>
                </div>

                <div class="py-4 my-auto text-center">
                    <p class="text-[10px] uppercase font-bold tracking-widest text-slate-500 mb-1.5">ENGLISH PHRASE</p>
                    <div id="quiz-phrase" class="text-lg md:text-xl font-bold text-slate-100 leading-relaxed tracking-wide transition-all"></div>
                </div>

                <div id="quiz-answer-zone" class="invisible py-3 text-center border-t border-slate-800/60 bg-slate-950/30 rounded-xl space-y-2">
                    <p class="text-[10px] uppercase font-bold tracking-widest text-emerald-400">CORRECT WORD</p>
                    <div id="quiz-correct-word" class="text-2xl font-black tracking-wider text-emerald-400 select-all"></div>
                    
                    <div class="flex justify-center space-x-2 pt-1">

                            <span>🔊 単語</span>
                        </button>
                        <button id="btn-speak-phrase" class="bg-slate-800 hover:bg-slate-700 text-slate-200 text-xs px-3 py-1 rounded-lg border border-slate-700 flex items-center space-x-1 active:scale-95 transition-transform">
                            <span>🔊 フレーズ</span>
                        </button>
                    </div>
                </div>
            </div>

            <div class="w-full pt-2">

                        <span class="text-[9px] opacity-75 font-normal mt-0.5">列の最後尾へ自動ローテーション</span>
                    </button>
                    <button id="btn-correct" class="bg-gradient-to-b from-emerald-600 to-emerald-700 hover:from-emerald-500 hover:to-emerald-600 text-white font-bold py-4 rounded-xl shadow-md active:scale-[0.97] transition-all flex flex-col items-center justify-center">
                        <span class="text-base flex items-center space-x-1">⭕ <span>覚えた（クリア）</span></span>
                        <span class="text-[9px] opacity-75 font-normal mt-0.5">マスターリストへ完全保存 ✨</span>
                    </button>
                </div>
            </div>
        </div>
    </main>

    <footer class="w-full text-center py-2 text-[9px] text-slate-600 border-t border-slate-900 bg-slate-950/40">
        &copy; 2026 Word Hacker System. Optimized for Capricorn Gamers.
    </footer>

        const MASTER_DATA = [{"id":1,"section":"Section 1 (1級)","word":"claim","phrase":"The scientist claimed that the new data supported her theory.","meaning":"主張する；要求する；奪う","note":"【例文訳】その科学者は新しいデータが自分の理論を支持すると主張した。","etymology":"【語源イメージ】claim：叫び声を“要求する”","preposition":""},{"id":2,"section":"Section 1 (1級)","word":"project","phrase":"The government plans to project future energy demand more accurately.","meaning":"見積もる 提示する","note":"【例文訳】政府は将来のエネルギー需要をより正確に予測する計画を立てている。","etymology":"【語源イメージ】project：前へ“投げる”→予測","preposition":""},{"id":3,"section":"Section 1 (1級)","word":"expand","phrase":"Tech companies continue to expand their global influence.","meaning":"拡大する","note":"【例文訳】テック企業は世界的な影響力を拡大し続けている。","etymology":"【語源イメージ】expand：外へ“広げる”","preposition":""},{"id":4,"section":"Section 1 (1級)","word":"address","phrase":"The report addresses several critical issues in public health.","meaning":"(問題を）取り上げる 対処する 話しかける","note":"【例文訳】その報告書は公衆衛生の重要な問題をいくつか扱っている。","etymology":"【語源イメージ】address：問題に“向き合う”","preposition":""},{"id":5,"section":"Section 1 (1級)","word":"detect","phrase":"The device can detect even the slightest temperature changes.","meaning":"感知する 発見する","note":"【例文訳】その装置はわずかな温度変化さえ検出できる。","etymology":"【語源イメージ】detect：下から“覆いを取る”→見つける","preposition":""},{"id":6,"section":"Section 1 (1級)","word":"evolve","phrase":"Human languages evolve over long periods of time.","meaning":"（～から）進化する","note":"【例文訳】人間の言語は長い年月をかけて進化する。","etymology":"【語源イメージ】evolve：外へ“巻き出す”→進化","preposition":""},{"id":7,"section":"Section 1 (1級)","word":"guarantee","phrase":"The contract guarantees full compensation for damages.","meaning":"確約する","note":"【例文訳】その契約は損害に対する完全な補償を保証している。","etymology":"【語源イメージ】guarantee：確固たる“保証”","preposition":""},{"id":8,"section":"Section 1 (1級)","word":"implement","phrase":"The organization implemented new safety guidelines.","meaning":"実施する","note":"【例文訳】その組織は新しい安全ガイドラインを導入した。","etymology":"【語源イメージ】implement：道具を“使う”→実行","preposition":""},{"id":9,"section":"Section 1 (1級)","word":"weather","phrase":"Farmers must weather harsh conditions during winter.","meaning":"切り抜ける","note":"【例文訳】農家は冬の厳しい環境を乗り越えなければならない。","etymology":"【語源イメージ】weather：天候を“耐える”","preposition":""},{"id":10,"section":"Section 1 (1級)","word":"justify","phrase":"He tried to justify his controversial decision.","meaning":"正当化する 正当性を示す","note":"【例文訳】彼は物議を醸す決定を正当化しようとした。","etymology":"【語源イメージ】justify：正しいと“する”","preposition":""},{"id":11,"section":"Section 1 (1級)","word":"convict","phrase":"The jury convicted the suspect after reviewing the evidence.","meaning":"（～で）有罪判決を下す","note":"【例文訳】陪審員は証拠を検討した後、容疑者を有罪とした。","etymology":"【語源イメージ】convict：共に“勝つ”→有罪判決","preposition":""},{"id":12,"section":"Section 1 (1級)","word":"prioritize","phrase":"We need to prioritize urgent tasks first.","meaning":"優先する","note":"【例文訳】緊急の作業を優先する必要がある。","etymology":"【語源イメージ】prioritize：優先順位を“前に置く”","preposition":""},{"id":13,"section":"Section 1 (1級)","word":"rebel","phrase":"Citizens began to rebel against the unfair policy.","meaning":"反逆する","note":"【例文訳】市民は不公平な政策に反抗し始めた。","etymology":"【語源イメージ】rebel：再び“戦う”","preposition":""},{"id":14,"section":"Section 1 (1級)","word":"fuel","phrase":"Rising prices fueled public frustration.","meaning":"あおる 燃料を補給する","note":"【例文訳】物価上昇は国民の不満をあおった。","etymology":"【語源イメージ】fuel：燃料を“与える”","preposition":""},{"id":15,"section":"Section 1 (1級)","word":"sustain","phrase":"Sustainable farming practices help sustain local ecosystems.","meaning":"維持する 耐える","note":"【例文訳】持続可能な農業は地域の生態系を維持するのに役立つ。","etymology":"【語源イメージ】sustain：下で“支える”","preposition":""},{"id":16,"section":"Section 1 (1級)","word":"portray","phrase":"The novel portrays the struggles of immigrant families.","meaning":"描写する","note":"【例文訳】その小説は移民家族の苦悩を描いている。","etymology":"【語源イメージ】portray：前に“引き出す”→描写","preposition":""},{"id":17,"section":"Section 1 (1級)","word":"manipulate","phrase":"The politician manipulated public opinion through targeted messaging.","meaning":"操作する","note":"【例文訳】その政治家はターゲット広告で世論を操作した。","etymology":"【語源イメージ】manipulate：手で“操作する”","preposition":""},{"id":18,"section":"Section 1 (1級)","word":"stimulate","phrase":"The new policy aims to stimulate economic growth.","meaning":"刺激する","note":"【例文訳】新しい政策は経済成長を促進することを目的としている。","etymology":"【語源イメージ】stimulate：刺激を“突き刺す”","preposition":""},{"id":19,"section":"Section 1 (1級)","word":"integrate","phrase":"The program integrates technology into traditional classrooms.","meaning":"（～に）溶け込む （～に）統合する","note":"【例文訳】そのプログラムは伝統的な教室に技術を統合している。","etymology":"【語源イメージ】integrate：中へ“まとめる”","preposition":""},{"id":20,"section":"Section 1 (1級)","word":"undergo","phrase":"Patients often undergo several tests before diagnosis.","meaning":"経験する","note":"【例文訳】患者は診断前にいくつかの検査を受けることが多い。","etymology":"【語源イメージ】undergo：下を“通る”→経験する","preposition":""},{"id":21,"section":"Section 1 (1級)","word":"diagnose","phrase":"Doctors must diagnose the illness quickly to begin treatment.","meaning":"診断する 原因を究明する","note":"【例文訳】医師は治療を始めるために病気を迅速に診断しなければならない。","etymology":"【語源イメージ】diagnose：知識を“深く調べる”","preposition":""},{"id":22,"section":"Section 1 (1級)","word":"enforce","phrase":"The government must enforce stricter safety regulations.","meaning":"執行する","note":"【例文訳】政府はより厳しい安全規制を施行する必要がある。","etymology":"【語源イメージ】enforce：力を“中へ入れる”→施行","preposition":""},{"id":23,"section":"Section 1 (1級)","word":"abuse","phrase":"The report revealed widespread abuse of the system.","meaning":"悪用する 濫用する","note":"【例文訳】その報告書は制度の広範な乱用を明らかにした。","etymology":"【語源イメージ】abuse：離れて“誤って使う”","preposition":""},{"id":24,"section":"Section 1 (1級)","word":"dismiss","phrase":"The manager dismissed the proposal due to budget limits.","meaning":"却下する 解雇する","note":"【例文訳】マネージャーは予算の都合でその提案を却下した。","etymology":"【語源イメージ】dismiss：離して“送る”→却下","preposition":""},{"id":25,"section":"Section 1 (1級)","word":"migrate","phrase":"Many birds migrate thousands of kilometers each year.","meaning":"（鳥・魚などが）渡る；人が移住する；データ・システムが移行する","note":"【例文訳】多くの鳥は毎年数千キロを移動する。","etymology":"【語源イメージ】migrate：移動して“変わる”","preposition":""},{"id":26,"sec されている。","etymology":"【語源イメージ】robotic：機械のように“動く”","preposition":""},{"id":95,"section":"Section 1 (1級)","word":"toxic","phrase":"The chemical was found to be highly toxic.","meaning":"有毒な","note":"【例文訳】その化学物質は非常に有毒であることが判明した。","etymology":"【語源イメージ】toxic：毒を“含む”","preposition":""},{"id":96,"section":"Section 1 (1級)","word":"domesticated","phrase":"Domesticated animals rely on humans for survival.","meaning":"家畜化された","note":"【例文訳】家畜化された動物は生存のために人間に依存している。","etymology":"【語源イメージ】domesticated：家の“中に入れられた”","preposition":""},{"id":97,"section":"Section 1 (1級)","word":"left-wing","phrase":"The left-wing party proposed major social reforms.","meaning":"左翼の","note":"【例文訳】左派政党は大規模な社会改革を提案した。","etymology":"【語源イメージ】left-wing：左側の“陣営”","preposition":""},{"id":98,"section":"Section 1 (1級)","word":"ultimately","phrase":"Ultimately, the decision rests with the board.","meaning":"最終的には","note":"【例文訳】最終的に、その決定は取締役会に委ねられている。","etymology":"【語源イメージ】ultimately：最終の“地点”","preposition":""},{"id":99,"section":"Section 1 (1級)","word":"initially","phrase":"Initially, the plan seemed unrealistic.","meaning":"最初は","note":"【例文訳】当初、その計画は非現実的に思えた。","etymology":"【語源イメージ】initially：始まりの“位置”","preposition":""},{"id":100,"section":"Section 1 (1級)","word":"genetically","phrase":"The trait is genetically passed from parents to offspring.","meaning":"遺伝的に","note":"【例文訳】その形質は遺伝的に親から子へ受け継がれる。","etymology":"【語源イメージ】genetically：遺伝の“仕組み”","preposition":""},{"id":101,"section":"Section 2 (1級)","word":"cast","phrase":"The director cast her in the lead role.","meaning":"（疑惑などを）投げかける","note":"【例文訳】監督は彼女を主演に配役した。","etymology":"【語源イメージ】cast：投げて“配る”→配役","preposition":""},{"id":102,"section":"Section 2 (1級)","word":"supplement","phrase":"Many people take vitamins to supplement their diet.","meaning":"補う 付録を付ける","note":"【例文訳】多くの人が食事を補うためにビタミンを摂取している。","etymology":"【語源イメージ】supplement：下に“満たす”→補う","preposition":""},{"id":103,"section":"Section 2 (1級)","word":"outweigh","phrase":"The benefits outweigh the potential risks.","mea 練されたデザインだ。","etymology":"【語源イメージ】sleek：滑らかに“整った”","preposition":""},{"id":1595,"section":"Section 16 (1級)","word":"exuberant","phrase":"Her exuberant personality brightened the room.","meaning":"熱狂的な あふれるばかりの 豊富な","note":"【例文訳】彼女の活気に満ちた性格は部屋を明るくした。","etymology":"【語源イメージ】exuberant：エネルギーが“あふれる”","preposition":""},{"id":1596,"section":"Section 16 (1級)","word":"frenetic","phrase":"The crowd moved with frenetic energy.","meaning":"熱狂した","note":"【例文訳】群衆は狂乱したような勢いで動いた。","etymology":"【語源イメージ】frenetic：心が“乱れる”","preposition":""},{"id":1597,"section":"Section 16 (1級)","word":"fraudulent","phrase":"They uncovered a fraudulent scheme.","meaning":"詐欺的な","note":"【例文訳】彼らは詐欺的な計画を暴いた。","etymology":"【語源イメージ】fraudulent：偽って“だます”","preposition":""},{"id":1598,"section":"Section 16 (1級)","word":"full-fledged","phrase":"He became a full-fledged member of the team.","meaning":"本格的な　一人前の","note":"【例文訳】彼はチームの正規メンバーになった。","etymology":"【語源イメージ】full-fledged：羽が“完全に生えた”","preposition":""},{"id":1599,"section":"Section 16 (1級)","word":"drastically","phrase":"The plan changed drastically after the meeting.","meaning":"思い切って 徹底的に","note":"【例文訳】その計画は会議後、大幅に変更された。","etymology":"【語源イメージ】drastically：劇的に“変わる”","preposition":""},{"id":1600,"section":"Section 16 (1級)","word":"disproportionately","phrase":"The policy disproportionately affected low-income families.","meaning":"過度に 非常に","note":"【例文訳】その政策は低所得層に不釣り合いな影響を与えた。","etymology":"【語源イメージ】disproportionately：比率が“偏る”","preposition":""},{"id":1601,"section":"Section 17 (1級)","word":"inaugurate","phrase":"The city plans to inaugurate the new museum next month.","meaning":"（正式に）開始する","note":"【例文訳】市は来月新しい博物館を正式に開始する予定だ。","etymology":"【語源イメージ】inaugurate：儀式で“始める”","preposition":""},{"id":1602,"section":"Section 17 (1級)","word":"rectify","phrase":"They worked to rectify the errors in the report.","meaning":"修正する","note":"【例文訳】彼らは報告書の誤りを修正しようとした。","etymology":"【語源イメージ】rectify：まっすぐに“正す”","preposition":""},{"id":1603,"section":"Section 17 (1級)","word":"implore","phrase":"She implored him to reconsider the decision.","meaning":"に（～するように）懇願する","note":"【例文訳】彼女は彼にその決定を再考するよう懇願した。","etymology":"【語源イメージ】implore：涙ながらに“頼む”","preposition":""},{"id":1604,"section":"Section 17 (1級)","word":"muster","phrase":"He tried to muster enough courage to speak.","meaning":"を集める","note":"【例文訳】彼は話すための十分な勇気を奮い起こそうとした。","etymology":"【語源イメージ】muster：力を“集める”","preposition":""},{"id":1605,"section":"Section 17 (1級)","word":"recuperate","phrase":"It took weeks for him to recuperate after the surgery.","meaning":"（病気・怪我）（から）回復する","note":"【例文訳】彼は手術後、回復に数週間を要した。","etymology":"【語源イメージ】recuperate：健康を“取り戻す”","preposition":""},{"id":1606,"section":"Section 17 (1級)","word":"validate","phrase":"The results helped validate the theory.","meaning":"認可する 認証する","note":"【例文訳】その結果は理論を裏付けるのに役立った。","etymology":"【語源イメージ】validate：価値を“確かめる”","preposition":""},{"id":1607,"section":"Section 17 (1級)","word":"mollify","phrase":"He attempted to mollify the angry crowd.","meaning":"（怒りを）和らげる","note":"【例文訳】彼は怒った群衆をなだめようとした。","etymology":"【語源イメージ】mollify：怒りを“柔らかくする”","preposition":""},{"id":1608,"section":"Section 17 (1級)","word":"modulate","phrase":"The device can modulate the signal strength.","meaning":"調節する（変える）","note":"【例文訳】その装置は信号強度を調整できる。","etymology":"【語源イメージ】modulate：形を“変えて調整する”","preposition":""},{"id":1609,"section":"Section 17 (1級)","word":"subjugate","phrase":"The dictator sought to subjugate the entire region.","meaning":"征服する（人をやっつけて服従させる）","note":"【例文訳】その独裁者は地域全体を支配下に置こうとした。","etymology":"【語源イメージ】subjugate：下に“従わせる”","preposition":""},{"id":1610,"section":"Section 17 (1級)","word":"torment","phrase":"Loud noises tend to torment the animals.","meaning":"ひどく苦しめる 悩ます","note":"【例文訳】大きな騒音は動物を苦しめる傾向がある。","etymology":"【語源イメージ】torment：心身を“ねじるほど苦しめる”","preposition":""},{"id":1611,"section":"Section 17 (1級)","word":"rebuff","phrase":"She tried to rebuff his unwanted advances.","meaning":"(好意的提供・援助の申し出に対して)拒絶する","note":"【例文訳】彼女は彼の望まない接近を拒もうとした。","etymology":"【語源イメージ】rebuff：強く“はねつ :1621,"section":"Section 17 (1級)","word":"procure","phrase":"They managed to procure rare materials for the project.","meaning":"入手する","note":"【例文訳】彼らはそのプロジェクトのために希少な材料を入手した。","etymology":"【語源イメージ】procure：前へ“取り寄せる”","preposition":""},{"id":1622,"section":"Section 17 (1級)","word":"scrawl","phrase":"He scrawled his name on the paper in a hurry.","meaning":"ぞんざいに書く","note":"【例文訳】彼は急いで紙に名前を走り書きした。","etymology":"【語源イメージ】scrawl：雑に“引っかくように書く”","preposition":""},{"id":1623,"section":"Section 17 (1級)","word":"predominate","phrase":"One culture tends to predominate in the region.","meaning":"優位を占める","note":"【例文訳】その地域では一つの文化が優勢になる傾向がある。","etymology":"【語源イメージ】predominate：前に“支配的に立つ”","preposition":""},{"id":1624,"section":"Section 17 (1級)","word":"suffocate","phrase":"Thick smoke threatened to suffocate the residents.","meaning":"窒息（死）する","note":"【例文訳】濃い煙は住民を窒息させる恐れがあった。","etymology":"【語源イメージ】suffocate：息を“塞ぐ”","preposition":""},{"id":1625,"section":"Section 17 (1級)","word":"smother","phrase":"She tried to smother the flames with a blanket.","meaning":"（火）を（～で）覆って消す 窒息（死）させる","note":"【例文訳】彼女は毛布で炎を覆い消そうとした。","etymology":"【語源イメージ】smother：覆って“消す”","preposition":""},{"id":1626,"section":"Section 17 (1級)","word":"smuggle","phrase":"They attempted to smuggle goods across the border.","meaning":"密猟する","note":"【例文訳】彼らは国境を越えて品物を密輸しようとした。","etymology":"【語源イメージ】smuggle：こっそり“運ぶ”","preposition":""},{"id":1627,"section":"Section 17 (1級)","word":"hibernate","phrase":"Bears hibernate during the winter months.","meaning":"冬眠する","note":"【例文訳】クマは冬の間冬眠する。","etymology":"【語源イメージ】hibernate：冬に“眠る”","preposition":""},{"id":1628,"section":"Section 17 (1級)","word":"loom","phrase":"A dark figure seemed to loom in the distance.","meaning":"ぼんやり現れる","note":"【例文訳】遠くに黒い影が不気味に迫っているように見えた。","etymology":"【語源イメージ】loom：ぼんやり“迫る”","preposition":""},{"id":1629,"section":"Section 17 (1級)","word":"rumble","phrase":"Thunder began to rumble across the sky.","meaning":"ごろごろと鳴る","note":"【例文訳】雷が空一面にゴロゴロと鳴り始めた。","etymology":"【 :"【語源イメージ】foment：火を“起こす”","preposition":""},{"id":1639,"section":"Section 17 (1級)","word":"gist","phrase":"He summarized the gist of the article.","meaning":"要点　主旨","note":"【例文訳】彼は記事の要点をまとめた。","etymology":"【語源イメージ】gist：中心の“要点”","preposition":""},{"id":1640,"section":"Section 17 (1級)","word":"viability","phrase":"They questioned the viability of the long-term plan.","meaning":"実現可能性","note":"【例文訳】彼らはその長期計画の実行可能性を疑問視した。","etymology":"【語源イメージ】viability：生きて“続けられる力”","preposition":""},{"id":1641,"section":"Section 17 (1級)","word":"requisite","phrase":"Experience is a requisite for this position.","meaning":"必要条件","note":"【例文訳】この職には経験が必須だ。","etymology":"【語源イメージ】requisite：必要として“求められる”","preposition":""},{"id":1642,"section":"Section 17 (1級)","word":"prerequisite","phrase":"A degree is a prerequisite for enrollment in the program.","meaning":"前提条件","note":"【例文訳】そのプログラムへの登録には学位が前提条件だ。","etymology":"【語源イメージ】prerequisite：前もって“必要なもの”","preposition":""},{"id":1643,"section":"Section 17 (1級)","word":"pundit","phrase":"The pundit commented on the political situation.","meaning":"専門家","note":"【例文訳】その評論家は政治状況についてコメントした。","etymology":"【語源イメージ】pundit：知識を“語る人”","preposition":""},{"id":1644,"section":"Section 17 (1級)","word":"recluse","phrase":"He lived as a recluse in the mountains.","meaning":"隠遁者","note":"【例文訳】彼は山中で隠遁者として暮らした。","etymology":"【語源イメージ】recluse：外界から“閉じこもる”","preposition":""},{"id":1645,"section":"Section 17 (1級)","word":"prodigy","phrase":"The child was considered a musical prodigy.","meaning":"神童","note":"【例文訳】その子供は音楽の天才と見なされた。","etymology":"【語源イメージ】prodigy：才能が“前に飛び出す”","preposition":""},{"id":1646,"section":"Section 17 (1級)","word":"offshoot","phrase":"The new branch is an offshoot of the main company.","meaning":"派生物・子会社 枝","note":"【例文訳】その新しい支社は本社の派生組織だ。","etymology":"【語源イメージ】offshoot：幹から“伸びた枝”","preposition":""},{"id":1647,"section":"Section 17 (1級)","word":"perk","phrase":"One perk of the job is flexible hours.","meaning":"諸手当・元気づける","note":"【例文訳】その仕事の特典の一つは柔軟な勤務時間だ。  17 (1級)","word":"pendulum","phrase":"The pendulum swung slowly from side to side.","meaning":"（時計の）振り子","note":"【例文訳】振り子はゆっくり左右に揺れた。","etymology":"【語源イメージ】pendulum：ぶら下がって“揺れる”","preposition":""},{"id":1666,"section":"Section 17 (1級)","word":"rendition","phrase":"The singer gave a powerful rendition of the song.","meaning":"演奏 翻訳","note":"【例文訳】その歌手は力強い演奏を披露した。","etymology":"【語源イメージ】rendition：表現を“差し出す”","preposition":""},{"id":1667,"section":"Section 17 (1級)","word":"milestone","phrase":"Finishing the project marked a major milestone.","meaning":"画期的な出来事","note":"【例文訳】そのプロジェクトの完了は大きな節目となった。","etymology":"【語源イメージ】milestone：道の“石＝節目”","preposition":""},{"id":1668,"section":"Section 17 (1級)","word":"insurrection","phrase":"The rebels planned an insurrection against the government.","meaning":"暴動 反乱","note":"【例文訳】反乱者たちは政府への蜂起を計画した。","etymology":"【語源イメージ】insurrection：上へ“立ち上がる”","preposition":""},{"id":1669,"section":"Section 17 (1級)","word":"manifest","phrase":"Her emotions began to manifest in her behavior.","meaning":"明らかな 声明文","note":"【例文訳】彼女の感情は行動に表れ始めた。","etymology":"【語源イメージ】manifest：手に“見えるほど明らか”","preposition":""},{"id":1670,"section":"Section 17 (1級)","word":"tantamount","phrase":"His silence was tantamount to an admission of guilt.","meaning":"等しい","note":"【例文訳】彼の沈黙は罪の認めと同等だった。","etymology":"【語源イメージ】tantamount：価値が“同じ”","preposition":""},{"id":1671,"section":"Section 17 (1級)","word":"impervious","phrase":"The material is impervious to water.","meaning":"影響されない 水を通さない","note":"【例文訳】その素材は水を通さない。","etymology":"【語源イメージ】impervious：通り“抜けない”","preposition":""},{"id":1672,"section":"Section 17 (1級)","word":"inept","phrase":"He made an inept attempt to fix the machine.","meaning":"不適切な","note":"【例文訳】彼は機械を直そうとして不器用な試みをした。","etymology":"【語源イメージ】inept：適性が“欠ける”","preposition":""},{"id":1673,"section":"Section 17 (1級)","word":"meticulous","phrase":"She completed the task with meticulous attention to detail.","meaning":"細かいことに気を遣う","note":"【例文訳】彼女は細心の注意を払ってその作業を完了した。","etymology": 1691,"section":"Section 17 (1級)","word":"placid","phrase":"The lake remained placid even during the storm.","meaning":"穏やかな","note":"【例文訳】その湖は嵐の間でも穏やかなままだった。","etymology":"【語源イメージ】placid：波が“立たない”","preposition":""},{"id":1692,"section":"Section 17 (1級)","word":"gallant","phrase":"He made a gallant effort to save the injured dog.","meaning":"勇敢な　堂々とした","note":"【例文訳】彼は負傷した犬を救おうと勇敢な努力をした。","etymology":"【語源イメージ】gallant：勇気が“前に出る”","preposition":""},{"id":1693,"section":"Section 17 (1級)","word":"extraterrestrial","phrase":"Scientists search for extraterrestrial life.","meaning":"地球外の","note":"【例文訳】科学者たちは地球外生命を探している。","etymology":"【語源イメージ】extraterrestrial：地球の“外”","preposition":""},{"id":1694,"section":"Section 17 (1級)","word":"incongruous","phrase":"His joke felt incongruous in the serious meeting.","meaning":"場違いである","note":"【例文訳】彼の冗談はその真剣な会議では場違いだった。","etymology":"【語源イメージ】incongruous：調和が“取れない”","preposition":""},{"id":1695,"section":"Section 17 (1級)","word":"insipid","phrase":"The soup tasted insipid and lacked seasoning.","meaning":"退屈な 味のない","note":"【例文訳】そのスープは味気なく、調味が不足していた。","etymology":"【語源イメージ】insipid：味が“抜けている”","preposition":""},{"id":1696,"section":"Section 17 (1級)","word":"indelible","phrase":"The experience left an indelible impression on her.","meaning":"消すことのできない","note":"【例文訳】その経験は彼女に消えない印象を残した。","etymology":"【語源イメージ】indelible：消しても“残る”","preposition":""},{"id":1697,"section":"Section 17 (1級)","word":"heinous","phrase":"The criminal committed a heinous act.","meaning":"極悪非道の","note":"【例文訳】その犯罪者は凶悪な行為を犯した。","etymology":"【語源イメージ】heinous：罪が“極めて悪い”","preposition":""},{"id":1698,"section":"Section 17 (1級)","word":"indignant","phrase":"She felt indignant after being unfairly accused.","meaning":"（～に）憤慨して","note":"【例文訳】彼女は不当に非難されて憤慨した。","etymology":"【語源イメージ】indignant：心が“怒りで膨らむ”","preposition":""},{"id":1699,"section":"Section 17 (1級)","word":"furtive","phrase":"He cast a furtive glance at the hidden note.","meaning":"人目を盗んでの　","note":"【例文訳】彼は隠されたメモに素早く目を走らせた。","etymology":"【語源イメージ】furtive：盗人のように“こっそり”","preposition":""},{"id":1700,"section":"Section 17 (1級)","word":"haphazardly","phrase":"Books were stacked haphazardly across the table.","meaning":"無計画に","note":"【例文訳】本が机の上に雑然と積み重ねられていた。","etymology":"【語源イメージ】haphazardly：計画なく“散らばる”","preposition":""},{"id":1701,"section":"Section 18 (1級)","word":"pulverize","phrase":"The machine can pulverize rocks into fine powder.","meaning":"粉砕する","note":"【例文訳】その機械は岩を細かい粉に粉砕できる。","etymology":"【語源イメージ】pulverize：粉（pulvis）に“する”","preposition":""},{"id":1702,"section":"Section 18 (1級)","word":"reprieve","phrase":"The court granted a temporary reprieve.","meaning":"一時的に救う 刑の執行を猶予する","note":"【例文訳】裁判所は一時的な猶予を与えた。","etymology":"【語源イメージ】reprieve：刑を“取り上げて延期”","preposition":""},{"id":1703,"section":"Section 18 (1級)","word":"rescind","phrase":"The company decided to rescind the offer.","meaning":"撤回する 無効にする","note":"【例文訳】会社はその提案を撤回することを決めた。","etymology":"【語源イメージ】rescind：決定を“切り戻す”","preposition":""},{"id":1704,"section":"Section 18 (1級)","word":"scour","phrase":"They began to scour the area for clues.","meaning":"（場所を）探し回る （～を探して）駆け巡る","note":"【例文訳】彼らは手がかりを求めてその地域を徹底的に探し始めた。","etymology":"【語源イメージ】scour：こすって“徹底的に探す”","preposition":""},{"id":1705,"section":"Section 18 (1級)","word":"pervade","phrase":"A sense of fear began to pervade the room.","meaning":"隅々に広がる 蔓延する","note":"【例文訳】恐怖の感覚が部屋全体に広がり始めた。","etymology":"【語源イメージ】pervade：中に“広く行き渡る”","preposition":""},{"id":1706,"section":"Section 18 (1級)","word":"prod","phrase":"She tried to prod him into making a decision.","meaning":"（～するように）駆り立てる","note":"【例文訳】彼女は彼に決断を促そうとした。","etymology":"【語源イメージ】prod：棒で“つついて促す”","preposition":""},{"id":1707,"section":"Section 18 (1級)","word":"sojourn","phrase":"He enjoyed a brief sojourn in the countryside.","meaning":"滞在する","note":"【例文訳】彼は田舎で短い滞在を楽しんだ。","etymology":"【語源イメージ】sojourn：短く“滞在する”","preposition":""},{"id":1708,"section":"Section 18 (1級)","word":"parry","phrase":"The fighter managed to parry the opponent’s strike.","meaning":"（攻撃・質問などを）かわす","note":"【例文訳】その戦士は相手の攻撃を受け流すことに成功した。","etymology":"【語源イメージ】parry：攻撃を“そらす”","preposition":""},{"id":1709,"section":"Section 18 (1級)","word":"procrastinate","phrase":"Students often procrastinate before deadlines.","meaning":"先延ばしにする","note":"【例文訳】学生は締め切り前に先延ばしをしがちだ。","etymology":"【語源イメージ】procrastinate：前に“明日へ押しやる”","preposition":""},{"id":1710,"section":"Section 18 (1級)","word":"inundate","phrase":"Heavy rain began to inundate the streets.","meaning":"水浸しにする","note":"【例文訳】大雨が通りを水浸しにし始めた。","etymology":"【語源イメージ】inundate：水が“押し寄せる”","preposition":""},{"id":1711,"section":"Section 18 (1級)","word":"chuckle","phrase":"He couldn’t help but chuckle at the joke.","meaning":"くすくす笑う","note":"【例文訳】彼はその冗談に思わずくすっと笑った。","etymology":"【語源イメージ】chuckle：喉の奥で“くすっと笑う”","preposition":""},{"id":1712,"section":"Section 18 (1級)","word":"nurture","phrase":"Parents should nurture their children’s curiosity.","meaning":"育てる","note":"【例文訳】親は子どもの好奇心を育むべきだ。","etymology":"【語源イメージ】nurture：育てて“養う”","preposition":""},{"id":1713,"section":"Section 18 (1級)","word":"orient","phrase":"The map helped orient the lost hikers.","meaning":"（関心などを）向ける","note":"【例文訳】地図は迷ったハイカーの方向感覚を取り戻す助けになった。","etymology":"【語源イメージ】orient：東（orient）で“方向を定める”","preposition":""},{"id":1714,"section":"Section 18 (1級)","word":"propel","phrase":"Strong winds can propel the boat forward.","meaning":"進ませる　","note":"【例文訳】強い風は船を前へ押し進めることができる。","etymology":"【語源イメージ】propel：前へ“押し進める”","preposition":""},{"id":1715,"section":"Section 18 (1級)","word":"stitch","phrase":"She learned how to stitch the fabric neatly.","meaning":"縫い合わせる","note":"【例文訳】彼女は布をきれいに縫う方法を学んだ。","etymology":"【語源イメージ】stitch：糸で“つなぐ”","preposition":""},{"id":1716,"section":"Section 18 (1級)","word":"tilt","phrase":"The painting began to tilt to one side.","meaning":"傾く　傾ける","note":"【例文訳】その絵は片側に傾き始めた。","etymology":"【語源イメージ】tilt：角度を“変える”","preposition":""},{"id":1717,"section":"Section 18 (1級)","word":"tumble","phrase":"The box slipped and tumbled down the stairs.","meaning":"転がり落ちる","note":"【例文訳】箱は滑って階段を転げ落ちた。","etymology":"【語源イメージ】tumble：転がって“落ちる”","preposition":""},{"id":1718,"section":"Section 18 (1級)","word":"abduct","phrase":"The criminal attempted to abduct the child.","meaning":"誘拐する","note":"【例文訳】その犯罪者は子どもを誘拐しようとした。","etymology":"【語源イメージ】abduct：離れて“連れ去る”","preposition":""},{"id":1719,"section":"Section 18 (1級)","word":"despise","phrase":"He openly despised dishonesty.","meaning":"軽蔑する　ひどく嫌う","note":"【例文訳】彼は不誠実さを公然と軽蔑した。","etymology":"【語源イメージ】despise：下に“見て軽蔑する”","preposition":""},{"id":1720,"section":"Section 18 (1級)","word":"falter","phrase":"His voice began to falter during the speech.","meaning":"弱る","note":"【例文訳】彼の声はスピーチの途中で弱まり始めた。","etymology":"【語源イメージ】falter：力が“弱まる”","preposition":""},{"id":1721,"section":"Section 18 (1級)","word":"salvage","phrase":"They tried to salvage what remained after the fire.","meaning":"（貴重なものを）救う","note":"【例文訳】彼らは火事の後に残ったものを救い出そうとした。","etymology":"【語源イメージ】salvage：救い出して“安全に戻す”","preposition":""},{"id":1722,"section":"Section 18 (1級)","word":"wade","phrase":"He had to wade through the muddy river.","meaning":"（水の中を）歩く","note":"【例文訳】彼は泥だらけの川を歩いて渡らなければならなかった。","etymology":"【語源イメージ】wade：水の中を“足で進む”","preposition":""},{"id":1723,"section":"Section 18 (1級)","word":"whine","phrase":"The child began to whine when he was tired.","meaning":"泣き言をいう","note":"【例文訳】その子供は疲れると泣き言を言い始めた。","etymology":"【語源イメージ】whine：鼻にかかった“弱い泣き声”","preposition":""},{"id":1724,"section":"Section 18 (1級)","word":"flinch","phrase":"She didn’t flinch even when the noise was loud.","meaning":"びくっとする","note":"【例文訳】彼女は大きな音がしてもひるまなかった。","etymology":"【語源イメージ】flinch：刺激に“身をすくめる”","preposition":""},{"id":1725,"section":"Section 18 (1級)","word":"fray","phrase":"Tensions began to fray between the two groups.","meaning":"いら立つ","note":"【例文訳】2つの集団の間で緊張がほころび始めた。","etymology":"【語源イメージ】fray：布が“ほつれる”→関係が擦り切れる","preposition":""},{"id":1726,"section":"Section 18 (1級)","word":"trudge","phrase":"They had to trudge through the snow for hours.","meaning":"重い足取りで歩く","note":"【例文訳】彼らは何時間も雪の中を重い足取りで歩かなければならなかった。","etymology":"【語源イメージ】trudge：重い足取りで“進む”","preposition":""},{"id":1727,"section":"Section 18 (1級)","word":"twitch","phrase":"His eye began to twitch from exhaustion.","meaning":"ひきつる","note":"【例文訳】彼の目は疲労でぴくぴくと痙攣し始めた。","etymology":"【語源イメージ】twitch：筋肉が“急に動く”","preposition":""},{"id":1728,"section":"Section 18 (1級)","word":"delude","phrase":"He managed to delude himself into believing the lie.","meaning":"あざむく","note":"【例文訳】彼はその嘘を信じ込むよう自分を欺いた。","etymology":"【語源イメージ】delude：心を“だまして迷わせる”","preposition":""},{"id":1729,"section":"Section 18 (1級)","word":"demoralize","phrase":"The defeat seemed to demoralize the entire team.","meaning":"士気をくじく","note":"【例文訳】その敗北はチーム全体の士気をくじいた。","etymology":"【語源イメージ】demoralize：士気を“下げる”","preposition":""},{"id":1730,"section":"Section 18 (1級)","word":"eavesdrop","phrase":"She hid behind the door to eavesdrop on the conversation.","meaning":"盗み聞きする","note":"【例文訳】彼女は会話を盗み聞きするためドアの後ろに隠れた。","etymology":"【語源イメージ】eavesdrop：軒下（eaves）で“聞く”","preposition":""},{"id":1731,"section":"Section 18 (1級)","word":"embellish","phrase":"He tried to embellish the story to make it more exciting.","meaning":"潤色する　粉飾する","note":"【例文訳】彼は話をもっと面白くするために脚色しようとした。","etymology":"【語源イメージ】embellish：美しさを“加える”","preposition":""},{"id":1732,"section":"Section 18 (1級)","word":"imbue","phrase":"The speech aimed to imbue the audience with hope.","meaning":"吹き込む","note":"【例文訳】その演説は聴衆に希望を吹き込むことを目的としていた。","etymology":"【語源イメージ】imbue：色や感情を“染み込ませる”","preposition":""},{"id":1733,"section":"Section 18 (1級)","word":"paucity","phrase":"There was a paucity of reliable data.","meaning":"不足 欠乏","note":"【例文訳】信頼できるデータが極めて不足していた。","etymology":"【語源イメージ】paucity：量が“極めて少ない”","preposition":""},{"id":1734,"section":"Section 18 (1級)","word":"rapport","phrase":"They developed a strong rapport over time.","meaning":"（調和した）関係","note":"【例文訳】彼らは時間をかけて強い信頼関係を築いた。","etymology":"【語源イメージ】rapport：心が“通じ合う”","preposition":""},{"id":1735,"section":"Secti ently, ready to pounce.","meaning":"ここぞとばかりに攻撃する　急襲する","note":"【例文訳】猫は飛びかかる準備をして静かに待っていた。","etymology":"【語源イメージ】pounce：勢いよく“飛びかかる”","preposition":""},{"id":1806,"section":"Section 19 (1級)","word":"retaliate","phrase":"They vowed to retaliate after the attack.","meaning":"報復する","note":"【例文訳】彼らは攻撃の後、報復を誓った。","etymology":"【語源イメージ】retaliate：同じ力で“やり返す”","preposition":""},{"id":1807,"section":"Section 19 (1級)","word":"rummage","phrase":"She began to rummage through her bag for the ticket.","meaning":"かき回して捜す","note":"【例文訳】彼女はチケットを探してバッグの中をあさり始めた。","etymology":"【語源イメージ】rummage：中を“かき回す”","preposition":""},{"id":1808,"section":"Section 19 (1級)","word":"spearhead","phrase":"He helped spearhead the new environmental campaign.","meaning":"（運動などの）先頭に立つ","note":"【例文訳】彼は新しい環境キャンペーンを主導するのを助けた。","etymology":"【語源イメージ】spearhead：槍の“先端＝先導する”","preposition":""},{"id":1809,"section":"Section 19 (1級)","word":"typify","phrase":"These traditions typify the region’s culture.","meaning":"象徴する　典型である","note":"【例文訳】これらの伝統はその地域の文化を典型化している。","etymology":"【語源イメージ】typify：型として“示す”","preposition":""},{"id":1810,"section":"Section 19 (1級)","word":"prowl","phrase":"A tiger may prowl at night in search of prey.","meaning":"うろつく","note":"【例文訳】トラは夜に獲物を求めてうろつくことがある。","etymology":"【語源イメージ】prowl：静かに“うろつく”","preposition":""},{"id":1811,"section":"Section 19 (1級)","word":"retract","phrase":"He decided to retract his earlier statement.","meaning":"撤回する","note":"【例文訳】彼は以前の発言を撤回することにした。","etymology":"【語源イメージ】retract：言葉を“引き戻す”","preposition":""},{"id":1812,"section":"Section 19 (1級)","word":"ruffle","phrase":"The wind began to ruffle the pages of the book.","meaning":"動揺させる","note":"【例文訳】風が本のページを乱し始めた。","etymology":"【語源イメージ】ruffle：表面を“乱す”","preposition":""},{"id":1813,"section":"Section 19 (1級)","word":"detest","phrase":"She openly detests dishonesty.","meaning":"ひどく嫌う","note":"【例文訳】彼女は不誠実さを公然と嫌悪している。","etymology":"【語源イメージ】detest：強く“嫌う”","preposition":""},{"id":1814,"section":"Section 19 (1級)","word":"feign","phrase":"He tried to feign interest during the meeting.","meaning":"ふりをする","note":"【例文訳】彼は会議中、興味があるふりをしようとした。","etymology":"【語源イメージ】feign：偽って“装う”","preposition":""},{"id":1815,"section":"Section 19 (1級)","word":"fluctuate","phrase":"Prices tend to fluctuate throughout the year.","meaning":"変動する","note":"【例文訳】価格は一年を通して変動する傾向がある。","etymology":"【語源イメージ】fluctuate：波のように“揺れ動く”","preposition":""},{"id":1816,"section":"Section 19 (1級)","word":"meddle","phrase":"He warned them not to meddle in his affairs.","meaning":"干渉する","note":"【例文訳】彼は自分の問題に干渉しないよう警告した。","etymology":"【語源イメージ】meddle：他人の領域に“入り込む”","preposition":""},{"id":1817,"section":"Section 19 (1級)","word":"pamper","phrase":"She pampered the guests with excellent service.","meaning":"甘やかす","note":"【例文訳】彼女は素晴らしいサービスで客を甘やかした。","etymology":"【語源イメージ】pamper：過度に“甘やかす”","preposition":""},{"id":1818,"section":"Section 19 (1級)","word":"peruse","phrase":"He sat down to peruse the lengthy report.","meaning":"～を熟読する","note":"【例文訳】彼は長い報告書を熟読するために腰を下ろした。","etymology":"【語源イメージ】peruse：徹底的に“読む”","preposition":""},{"id":1819,"section":"Section 19 (1級)","word":"pique","phrase":"Her remark piqued his curiosity.","meaning":"立腹させる","note":"【例文訳】彼女の発言は彼の好奇心を刺激した。","etymology":"【語源イメージ】pique：感情を“刺激する”","preposition":""},{"id":1820,"section":"Section 19 (1級)","word":"indoctrinate","phrase":"The group tried to indoctrinate new members with extreme ideas.","meaning":"教え込む","note":"【例文訳】その集団は新しいメンバーに過激な思想を吹き込もうとした。","etymology":"【語源イメージ】indoctrinate：教義を“中に入れる”","preposition":""},{"id":1821,"section":"Section 19 (1級)","word":"orchestrate","phrase":"They worked together to orchestrate the event smoothly.","meaning":"画策する","note":"【例文訳】彼らは協力してイベントを円滑に仕切った。","etymology":"【語源イメージ】orchestrate：楽団を“まとめる”→全体を仕切る","preposition":""},{"id":1822,"section":"Section 19 (1級)","word":"fortify","phrase":"The soldiers fortified the camp before nightfall.","meaning":"強化する","note":"【例文訳】兵士たちは夜になる前に野営地を強化した。","etymology":"【語源イメージ】fortify：強さを“築く”","preposition":""},{"id":1823,"section":"Section 19 (1級)","word":"bolster","phrase":"The new evidence helped bolster their argument.","meaning":"強化する（質的に） 長まくら","note":"【例文訳】新しい証拠は彼らの主張を強める助けとなった。","etymology":"【語源イメージ】bolster：支えて“強める”","preposition":""},{"id":1824,"section":"Section 19 (1級)","word":"exhort","phrase":"She tried to exhort the team to keep trying.","meaning":"を熱心に勧める","note":"【例文訳】彼女はチームに挑戦を続けるよう強く促した。","etymology":"【語源イメージ】exhort：強く“呼びかける”","preposition":""},{"id":1825,"section":"Section 19 (1級)","word":"coerce","phrase":"He attempted to coerce them into signing the contract.","meaning":"に（～を）強いる","note":"【例文訳】彼は彼らに契約書へ署名するよう強制しようとした。","etymology":"【語源イメージ】coerce：力で“押しつける”","preposition":""},{"id":1826,"section":"Section 19 (1級)","word":"dazzle","phrase":"The performance dazzled the audience.","meaning":"を幻惑する","note":"【例文訳】その演技は観客を魅了した。","etymology":"【語源イメージ】dazzle：光で“目をくらませる”","preposition":""},{"id":1827,"section":"Section 19 (1級)","word":"debunk","phrase":"The scientist debunked the false claim.","meaning":"×を暴露する×（→考えなどが間違いであると示す）","note":"【例文訳】科学者はその誤った主張を暴いた。","etymology":"【語源イメージ】debunk：嘘を“外す”","preposition":""},{"id":1828,"section":"Section 19 (1級)","word":"surmise","phrase":"From the clues, we can only surmise what happened.","meaning":"（何かが本当だと）推測する","note":"【例文訳】手がかりから何が起きたか推測するしかない。","etymology":"【語源イメージ】surmise：心で“推し量る”","preposition":""},{"id":1829,"section":"Section 19 (1級)","word":"reiterate","phrase":"He reiterated his request to make sure they understood.","meaning":"（できるだけはっきりさせようと）（意見や主張を）繰り返す","note":"【例文訳】彼は理解してもらうために要望を繰り返した。","etymology":"【語源イメージ】reiterate：再び“繰り返す”","preposition":""},{"id":1830,"section":"Section 19 (1級)","word":"enunciate","phrase":"She enunciated each word clearly during the speech.","meaning":"を発表する（明確に発音する）","note":"【例文訳】彼女はスピーチで一語一語を明瞭に発音した。","etymology":"【語源イメージ】enunciate：はっきり“言う”","preposition":""},{"id":1831,"section":"Section 19 (1級)","word":"defuse","phrase":"The negotiator helped defuse the tense situation.","meaning":"信管を取り除く","note":"【例文訳】交渉人は緊張した状況を和らげる助けをした。","etymology":"【語源イメージ】defuse：導火線を“抜く”","preposition":""},{"id":1832,"section":"Section 19 (1級)","word":"berate","phrase":"The coach berated the players for their lack of effort.","meaning":"を（のことで）責め立てる","note":"【例文訳】コーチは努力不足について選手たちを叱責した。","etymology":"【語源イメージ】berate：強く“叱りつける”","preposition":""},{"id":1833,"section":"Section 19 (1級)","word":"abscond","phrase":"The thief tried to abscond with the stolen goods.","meaning":"逃亡する","note":"【例文訳】泥棒は盗品を持って逃亡しようとした。","etymology":"【語源イメージ】abscond：隠れて“逃げる”","preposition":""},{"id":1834,"section":"Section 19 (1級)","word":"broach","phrase":"He decided to broach the sensitive topic carefully.","meaning":"(話題を)切り出す","note":"【例文訳】彼は慎重にそのデリケートな話題を切り出した。","etymology":"【語源イメージ】broach：樽を“開ける”→話題を切り出す","preposition":""},{"id":1835,"section":"Section 19 (1級)","word":"bask","phrase":"They basked in the warm afternoon sun.","meaning":"日光浴をする","note":"【例文訳】彼らは暖かい午後の日差しを浴びて楽しんだ。","etymology":"【語源イメージ】bask：暖かさに“浸る”","preposition":""},{"id":1836,"section":"Section 19 (1級)","word":"wrath","phrase":"The king’s wrath frightened his enemies.","meaning":"激怒","note":"【例文訳】王の激しい怒りは敵を恐れさせた。","etymology":"【語源イメージ】wrath：激しい“怒り”","preposition":""},{"id":1837,"section":"Section 19 (1級)","word":"antiseptic","phrase":"The nurse cleaned the wound with an antiseptic solution.","meaning":"消毒剤","note":"【例文訳】看護師は傷を消毒液で清潔にした。","etymology":"【語源イメージ】antiseptic：腐敗を“止める”","preposition":""},{"id":1838,"section":"Section 19 (1級)","word":"attrition","phrase":"The company suffered heavy attrition during the crisis.","meaning":"消耗　摩滅","note":"【例文訳】その会社は危機の間、大きな人員減少に見舞われた。","etymology":"【語源イメージ】attrition：すり減って“減少する”","preposition":""},{"id":1839,"section":"Section 19 (1級)","word":"bombardment","phrase":"The city endured a long bombardment during the war.","meaning":"爆撃　砲撃","note":"【例文訳】その都市は戦争中、長い砲撃に耐えた。","etymology":"【語源イメージ】bombardment：爆弾を“浴びせる”","preposition":""},{"id":1840,"section":"Section 19 (1級)","word":"euphoria","phrase":"A wave of euphoria spread through the crowd after the victory.","meaning":"幸福感　多幸感","note":"【例文訳】勝利後、群衆に歓喜の波が広がった。","etymology":"【語源イメージ】euphoria：良い（eu）＋気分（phoria）","preposition":""},{"id":1841,"section":"Section 19 (1級)","word":"futility","phrase":"He felt a deep sense of futility after repeated failures.","meaning":"無益","note":"【例文訳】彼は繰り返し失敗した後、深い無力感を覚えた。","etymology":"【語源イメージ】futility：役に立たず“空しい”","preposition":""},{"id":1842,"section":"Section 19 (1級)","word":"infatuation","phrase":"Her infatuation with the singer faded over time.","meaning":"夢中になること","note":"【例文訳】彼女の歌手への夢中は時間とともに薄れた。","etymology":"【語源イメージ】infatuation：心が“愚かになるほど夢中”","preposition":""},{"id":1843,"section":"Section 19 (1級)","word":"inhalation","phrase":"The doctor monitored the patient’s inhalation closely.","meaning":"吸入","note":"【例文訳】医師は患者の吸入を慎重に監視した。","etymology":"【語源イメージ】inhalation：息を“中に入れる”","preposition":""},{"id":1844,"section":"Section 19 (1級)","word":"labyrinth","phrase":"The old castle contained a labyrinth of hidden passages.","meaning":"迷路","note":"【例文訳】その古城には隠された通路の迷宮があった。","etymology":"【語源イメージ】labyrinth：複雑に“絡み合う道”","preposition":""},{"id":1845,"section":"Section 19 (1級)","word":"reconnaissance","phrase":"The team conducted reconnaissance before the mission.","meaning":"偵察","note":"【例文訳】チームは任務前に偵察を行った。","etymology":"【語源イメージ】reconnaissance：前もって“知るための偵察”","preposition":""},{"id":1846,"section":"Section 19 (1級)","word":"remittance","phrase":"The remittance was sent to support his family overseas.","meaning":"送金","note":"【例文訳】送金は海外の家族を支援するために送られた。","etymology":"【語源イメージ】remittance：金を“送り渡す”","preposition":""},{"id":1847,"section":"Section 19 (1級)","word":"rendezvous","phrase":"They arranged a quiet rendezvous at the café.","meaning":"待ち合わせ","note":"【例文訳】彼らは静かなカフェで会う約束をした。","etymology":"【語源イメージ】rendezvous：再び“会う”","preposition":""},{"id":1848,"section":"Section 19 (1級)","word":"restitution","phrase":"The company offered restitution for the damage.","meaning":"（盗難品などの）返還","note":"【例文訳】会社は損害に対して補償を提供した。","etymology":"【語源イメージ】restitution：元に“戻す補償”","preposition":""},{"id":1849,"section":"Section 19 (1級)","word":"slur","phrase":"He made a careless slur that offended many people.","meaning":"中傷","note":"【例文訳】彼は不注意な中傷をして多くの人を怒らせた。","etymology":"【語源イメージ】slur：言葉を“濁らせる”","preposition":""},{"id":1850,"section":"Section 19 (1級)","word":"strife","phrase":"Political strife continued throughout the region.","meaning":"争い","note":"【例文訳】政治的な争いは地域全体で続いた。","etymology":"【語源イメージ】strife：争いが“続く”","preposition":""},{"id":1851,"section":"Section 19 (1級)","word":"suitor","phrase":"The suitor brought flowers to express his affection.","meaning":"（女性への）求婚者","note":"【例文訳】求婚者は愛情を示すために花を持ってきた。","etymology":"【語源イメージ】suitor：求婚のため“追う人”","preposition":""},{"id":1852,"section":"Section 19 (1級)","word":"versatility","phrase":"Her versatility allows her to adapt to any situation.","meaning":"多才　多芸","note":"【例文訳】彼女の多才さはどんな状況にも適応することを可能にしている。","etymology":"【語源イメージ】versatility：多方面に“曲がる柔軟さ”","preposition":""},{"id":1853,"section":"Section 19 (1級)","word":"interlude","phrase":"The play included a short musical interlude.","meaning":"合間　幕あい","note":"【例文訳】その劇には短い音楽の幕間があった。","etymology":"【語源イメージ】interlude：間の“休止”","preposition":""},{"id":1854,"section":"Section 19 (1級)","word":"layman","phrase":"To a layman, the explanation sounded complicated.","meaning":"素人　門外漢","note":"【例文訳】一般人にはその説明は複雑に聞こえた。","etymology":"【語源イメージ】layman：専門外の“一般人”","preposition":""},{"id":1855,"section":"Section 19 (1級)","word":"stampede","phrase":"A sudden stampede broke out among the frightened animals.","meaning":"どっと逃げ出すこと　集団暴走","note":"【例文訳】怯えた動物たちの間で突然の暴走が起きた。","etymology":"【語源イメージ】stampede：群れが“押し寄せる”","preposition":""},{"id":1856,"section":"Section 19 (1級)","word":"repercussion","phrase":"The decision had serious repercussions for the community.","meaning":"影響 （音の）反響","note":"【例文訳】その決定は地域社会に重大な影響をもたらした。","etymology":"【語源イメージ】repercussion：後ろに“跳ね返る影響”","preposition":""},{"id":1857,"section":"Section 19 (1級)","word":"concession ,{"id":1866,"section":"Section 19 (1級)","word":"ascension","phrase":"His sudden ascension to power surprised everyone.","meaning":"上昇","note":"【例文訳】彼の突然の権力上昇は皆を驚かせた。","etymology":"【語源イメージ】ascension：上へ“昇る”","preposition":""},{"id":1867,"section":"Section 19 (1級)","word":"bout","phrase":"He had a brief bout of illness last week.","meaning":"発作","note":"【例文訳】彼は先週、短い病気の発作に見舞われた。","etymology":"【語源イメージ】bout：短い“発作・一時的な期間”","preposition":""},{"id":1868,"section":"Section 19 (1級)","word":"animosity","phrase":"There was lingering animosity between the two rivals.","meaning":"憎悪・敵意","note":"【例文訳】その2人のライバルの間には根深い敵意があった。","etymology":"【語源イメージ】animosity：心が“敵意で満ちる”","preposition":""},{"id":1869,"section":"Section 19 (1級)","word":"affront","phrase":"He took her remark as a personal affront.","meaning":"（公然の）侮辱","note":"【例文訳】彼は彼女の発言を個人的侮辱と受け取った。","etymology":"【語源イメージ】affront：顔の前で“侮辱する”","preposition":""},{"id":1870,"section":"Section 19 (1級)","word":"barrage","phrase":"The soldiers faced a barrage of enemy fire.","meaning":"集中砲火","note":"【例文訳】兵士たちは敵の集中砲火に直面した。","etymology":"【語源イメージ】barrage：大量の“連続攻撃”","preposition":""},{"id":1871,"section":"Section 19 (1級)","word":"brunt","phrase":"The small town bore the brunt of the storm.","meaning":"矢面・攻撃の矛先","note":"【例文訳】その小さな町が嵐の被害の大部分を受けた。","etymology":"【語源イメージ】brunt：攻撃の“主な衝撃”","preposition":""},{"id":1872,"section":"Section 19 (1級)","word":"audacious","phrase":"Her audacious plan shocked the committee.","meaning":"大胆な","note":"【例文訳】彼女の大胆な計画は委員会を驚かせた。","etymology":"【語源イメージ】audacious：大胆に“踏み出す”","preposition":""},{"id":1873,"section":"Section 19 (1級)","word":"colloquial","phrase":"He prefers colloquial expressions when speaking.","meaning":"口語体の","note":"【例文訳】彼は話すとき口語的な表現を好む。","etymology":"【語源イメージ】colloquial：日常の“話し言葉”","preposition":""},{"id":1874,"section":"Section 19 (1級)","word":"concerted","phrase":"They made a concerted effort to solve the issue.","meaning":"協力しての","note":"【例文訳】彼らは問題解決に向けて一致した努力をした。","etymology":"【語源イメージ】concerted：共に“調和して行う ,"meaning":"飲み込む","note":"【例文訳】炎は建物を瞬く間に飲み込んだ。","etymology":"【語源イメージ】engulf：渦が“飲み込む”","preposition":""},{"id":2017,"section":"Section 21 (1級)","word":"waver","phrase":"His voice began to waver during the speech.","meaning":"（信念などの点で）心が揺らぐ 動揺する","note":"【例文訳】彼の声はスピーチ中に揺らぎ始めた。","etymology":"【語源イメージ】waver：揺れて“定まらない”","preposition":""},{"id":2018,"section":"Section 21 (1級)","word":"surmount","phrase":"They managed to surmount the difficult obstacle.","meaning":"打ち勝つ","note":"【例文訳】彼らはその困難な障害を克服した。","etymology":"【語源イメージ】surmount：上に“乗り越える”","preposition":""},{"id":2019,"section":"Section 21 (1級)","word":"mortify","phrase":"The mistake mortified him in front of everyone.","meaning":"恥をかかせる","note":"【例文訳】その失敗は彼を皆の前でひどく恥をかかせた。","etymology":"【語源イメージ】mortify：恥で“死ぬほどつらい”","preposition":""},{"id":2020,"section":"Section 21 (1級)","word":"poach","phrase":"They tried to poach eggs for breakfast.\nPoaching elephants for their ivory is illegal.\n象牙のために象を密猟することは違法です。","meaning":"密猟する 侵害する\n卵をゆでるタマゴ","note":"【例文訳】彼らは朝食のために卵をポーチドエッグにしようとした。","etymology":"【語源イメージ】poach：そっと“煮る”","preposition":""},{"id":2021,"section":"Section 21 (1級)","word":"guzzle","phrase":"He began to guzzle the drink after the long run.","meaning":"がぶがぶ飲む　がつがつ食べる","note":"【例文訳】彼は長距離走の後、その飲み物をがぶ飲みし始めた。","etymology":"【語源イメージ】guzzle：勢いよく“飲み干す”","preposition":""},{"id":2022,"section":"Section 21 (1級)","word":"dangle","phrase":"The keys dangled from his belt.","meaning":"（～の前に）ぶら下げる","note":"【例文訳】鍵は彼のベルトからぶら下がっていた。","etymology":"【語源イメージ】dangle：ぶらりと“垂れる”","preposition":""},{"id":2023,"section":"Section 21 (1級)","word":"incapacitate","phrase":"The injury incapacitated him for several weeks.","meaning":"無力化する","note":"【例文訳】そのけがで彼は数週間行動不能になった。","etymology":"【語源イメージ】incapacitate：能力を“奪う”","preposition":""},{"id":2024,"section":"Section 21 (1級)","word":"denote","phrase":"A red sign usually denotes danger.","meaning":"（記号などが）を示す","note":"【例文訳】赤い標識は通常、危険を示す。","etymology":"【語源イメージ】denote：印で“示す”","preposition":""},{"id":2025,"section":"Section 21 (1級)","word":"evoke","phrase":"The music evoked memories of childhood.","meaning":"呼び起こす","note":"【例文訳】その音楽は子どもの頃の記憶を呼び起こした。","etymology":"【語源イメージ】evoke：外へ“呼び出す”","preposition":""},{"id":2026,"section":"Section 21 (1級)","word":"grapple","phrase":"They continued to grapple with the complex issue.","meaning":"真剣に取り組む","note":"【例文訳】彼らはその複雑な問題に取り組み続けた。","etymology":"【語源イメージ】grapple：つかんで“格闘する”","preposition":""},{"id":2027,"section":"Section 21 (1級)","word":"antagonize","phrase":"His rude behavior antagonized everyone around him.","meaning":"反感を買う","note":"【例文訳】彼の無礼な態度は周囲の人々を敵に回した。","etymology":"【語源イメージ】antagonize：相手を“敵にする”","preposition":""},{"id":2028,"section":"Section 21 (1級)","word":"deduce","phrase":"From the evidence, we can deduce what happened.","meaning":"推測する","note":"【例文訳】証拠から何が起きたか推論できる。","etymology":"【語源イメージ】deduce：下へ“導き出す”","preposition":""},{"id":2029,"section":"Section 21 (1級)","word":"levitate","phrase":"The magician made the object appear to levitate.","meaning":"空中を浮遊する","note":"【例文訳】手品師は物体が宙に浮いているように見せた。","etymology":"【語源イメージ】levitate：軽く“浮く”","preposition":""},{"id":2030,"section":"Section 21 (1級)","word":"adjudicate","phrase":"The court will adjudicate the dispute next month.","meaning":"（事件を）裁く （人に）判決を下す","note":"【例文訳】裁判所は来月その争いを裁定する。","etymology":"【語源イメージ】adjudicate：裁判で“判断する”","preposition":""},{"id":2031,"section":"Section 21 (1級)","word":"litigate","phrase":"They decided to litigate the matter in civil court.","meaning":"訴訟を起こす","note":"【例文訳】彼らはその件を民事裁判で争うことにした。","etymology":"【語源イメージ】litigate：法廷で“争う”","preposition":""},{"id":2032,"section":"Section 21 (1級)","word":"infiltrate","phrase":"The spy managed to infiltrate the organization.","meaning":"潜入する","note":"【例文訳】スパイは組織に潜入することに成功した。","etymology":"【語源イメージ】infiltrate：中へ“染み込む”","preposition":""},{"id":2033,"section":"Section 21 (1級)","word":"rationale","phrase":"We need a clear rationale for the decision.","meaning":"理論的根拠","note":"【例文訳】その決定には明確な根拠が必要だ。","etymology":"【語源イメージ】rationale：理由を“説明する基盤”","preposition":""},{"id":2034,"section":"Section 21 (1級)","word":"gorge","phrase":"He began to gorge himself on sweets.","meaning":"渓谷　小峡谷","note":"【例文訳】彼は甘いものをむさぼり食べ始めた。","etymology":"【語源イメージ】gorge：大量に“食べる”","preposition":""},{"id":2035,"section":"Section 21 (1級)","word":"paragon","phrase":"She is considered a paragon of kindness.","meaning":"模範","note":"【例文訳】彼女は優しさの模範と見なされている。","etymology":"【語源イメージ】paragon：完全な“模範”","preposition":""},{"id":2036,"section":"Section 21 (1級)","word":"platitude","phrase":"The speech was full of empty platitudes.","meaning":"ありきたりの決まり文句","note":"【例文訳】そのスピーチは空疎な決まり文句でいっぱいだった。","etymology":"【語源イメージ】platitude：平板で“つまらない言葉”","preposition":""},{"id":2037,"section":"Section 21 (1級)","word":"tinge","phrase":"The sky had a tinge of pink at sunset.","meaning":"かすかな意味合い","note":"【例文訳】夕暮れの空にはわずかにピンクの色合いがあった。","etymology":"【語源イメージ】tinge：色が“わずかにつく”","preposition":""},{"id":2038,"section":"Section 21 (1級)","word":"travesty","phrase":"The unfair verdict was a travesty of justice.","meaning":"まがい物","note":"【例文訳】その不公平な判決は正義への冒涜だった。","etymology":"【語源イメージ】travesty：本物を“ゆがめたもの”","preposition":""},{"id":2039,"section":"Section 21 (1級)","word":"infirmity","phrase":"His infirmity made walking difficult.","meaning":"病気 欠点","note":"【例文訳】彼の病弱さは歩行を困難にした。","etymology":"【語源イメージ】infirmity：力が“弱い状態”","preposition":""},{"id":2040,"section":"Section 21 (1級)","word":"graft","phrase":"The surgeon performed a skin graft.","meaning":"移植","note":"【例文訳】外科医は皮膚移植を行った。","etymology":"【語源イメージ】graft：組織を“つなぐ”","preposition":""},{"id":2041,"section":"Section 21 (1級)","word":"delusion","phrase":"His belief in the rumor was a complete delusion.","meaning":"妄想 錯覚","note":"【例文訳】その噂を信じた彼の考えは完全な妄想だった。","etymology":"【語源イメージ】delusion：心を“だまして迷わせる”","preposition":""},{"id":2042,"section":"Section 21 (1級)","word":"dissertation","phrase":"She is writing her dissertation on environmental policy.","meaning":"論文","note":"【例文訳】彼女は環境政策についての学位論文を書いている。","etymology":"【語源イメージ】dissertation：学術的 ":"真実性","note":"【例文訳】記者はその報告の真実性を疑った。","etymology":"【語源イメージ】veracity：真実を“語る性質”","preposition":""},{"id":2052,"section":"Section 21 (1級)","word":"deity","phrase":"Ancient cultures worshipped multiple deities.","meaning":"神","note":"【例文訳】古代文化は複数の神々を崇拝していた。","etymology":"【語源イメージ】deity：神として“崇められる存在”","preposition":""},{"id":2053,"section":"Section 21 (1級)","word":"plagiarism","phrase":"The student was punished for plagiarism.","meaning":"盗用 盗作","note":"【例文訳】その学生は盗作で処罰された。","etymology":"【語源イメージ】plagiarism：他人の作品を“盗む”","preposition":""},{"id":2054,"section":"Section 21 (1級)","word":"semblance","phrase":"The painting retained a semblance of realism.","meaning":"ふり 外観","note":"【例文訳】その絵は写実性の面影を保っていた。","etymology":"【語源イメージ】semblance：外見が“似ている”","preposition":""},{"id":2055,"section":"Section 21 (1級)","word":"protrusion","phrase":"The protrusion on the wall was caused by moisture.","meaning":"突出","note":"【例文訳】壁の突起は湿気が原因だった。","etymology":"【語源イメージ】protrusion：前に“突き出る”","preposition":""},{"id":2056,"section":"Section 21 (1級)","word":"valiant","phrase":"The valiant soldier received a medal.","meaning":"勇敢な","note":"【例文訳】その勇敢な兵士は勲章を授与された。","etymology":"【語源イメージ】valiant：強く“勇敢”","preposition":""},{"id":2057,"section":"Section 21 (1級)","word":"reclusive","phrase":"The author lived a reclusive life in the mountains.","meaning":"隠遁している","note":"【例文訳】その作家は山中で隠遁生活を送った。","etymology":"【語源イメージ】reclusive：外界から“閉じこもる”","preposition":""},{"id":2058,"section":"Section 21 (1級)","word":"flimsy","phrase":"The table was too flimsy to hold heavy objects.","meaning":"見え透いた","note":"【例文訳】そのテーブルは重い物を載せるには華奢すぎた。","etymology":"【語源イメージ】flimsy：薄く“弱い”","preposition":""},{"id":2059,"section":"Section 21 (1級)","word":"obsequious","phrase":"His obsequious behavior annoyed his colleagues.","meaning":"こびへつらうような","note":"【例文訳】彼のへつらうような態度は同僚を苛立たせた。","etymology":"【語源イメージ】obsequious：後ろに“従いすぎる”","preposition":""},{"id":2060,"section":"Section 21 (1級)","word":"lackluster","phrase":"The performance was lackluster and failed to impress.","meaning":"精細を欠いた パッとしない","note":"【例文訳】その演技は精彩を欠き、観客を感動させられなかった。","etymology":"【語源イメージ】lackluster：光沢が“欠ける”","preposition":""},{"id":2061,"section":"Section 21 (1級)","word":"lurid","phrase":"The article included lurid details about the incident.","meaning":"ぞっとするような 燃えるように真っ赤な","note":"【例文訳】その記事には事件の生々しい詳細が含まれていた。","etymology":"【語源イメージ】lurid：青白く“不気味に光る”","preposition":""},{"id":2062,"section":"Section 21 (1級)","word":"shrewd","phrase":"She made a shrewd investment that paid off.","meaning":"鋭い 抜け目のない","note":"【例文訳】彼女は利益を生む抜け目ない投資をした。","etymology":"【語源イメージ】shrewd：鋭く“見抜く”","preposition":""},{"id":2063,"section":"Section 21 (1級)","word":"inclement","phrase":"The flight was delayed due to inclement weather.","meaning":"(天候が）荒れ模様の 厳しい","note":"【例文訳】悪天候のため飛行機は遅延した。","etymology":"【語源イメージ】inclement：優しくない＝“荒れた”","preposition":""},{"id":2064,"section":"Section 21 (1級)","word":"facetious","phrase":"He made a facetious remark during the serious meeting.","meaning":"滑稽な　ひょうきんな","note":"【例文訳】彼は真面目な会議中にふざけた発言をした。","etymology":"【語源イメージ】facetious：場違いに“ふざける”","preposition":""},{"id":2065,"section":"Section 21 (1級)","word":"implicit","phrase":"Her approval was implicit in her smile.","meaning":"暗に示された","note":"【例文訳】彼女の笑顔には暗黙の承認が含まれていた。","etymology":"【語源イメージ】implicit：内側に“折り込まれた”","preposition":""},{"id":2066,"section":"Section 21 (1級)","word":"garbled","phrase":"The message became garbled during transmission.","meaning":"文字化けした","note":"【例文訳】そのメッセージは送信中に乱れてしまった。","etymology":"【語源イメージ】garbled：混ざって“乱れた”","preposition":""},{"id":2067,"section":"Section 21 (1級)","word":"vicarious","phrase":"He felt vicarious excitement watching his friend win.","meaning":"代わりの","note":"【例文訳】彼は友人の勝利を見て代理的な興奮を感じた。","etymology":"【語源イメージ】vicarious：他者を“通して経験する”","preposition":""},{"id":2068,"section":"Section 21 (1級)","word":"tentative","phrase":"Their agreement is still tentative.","meaning":"仮の","note":"【例文訳】彼らの合意はまだ暫定的だ。","etymology":"【語源イメージ】tentative：試しに“触れる＝仮の”","preposition":""},{"id":2069,"section":"Section 21 (1級)","word":"dormant","phrase":"The volcano has been dormant for decades.","meaning":"（火山などが）活動していない 休眠中の","note":"【例文訳】その火山は数十年間休止状態にある。","etymology":"【語源イメージ】dormant：眠って“動かない”","preposition":""},{"id":2070,"section":"Section 21 (1級)","word":"emphatic","phrase":"She gave an emphatic answer to the question.","meaning":"（～ということを）強調する 語気が強い 強調的な","note":"【例文訳】彼女はその質問に断固とした答えを返した。","etymology":"【語源イメージ】emphatic：強く“押し出す”","preposition":""},{"id":2071,"section":"Section 21 (1級)","word":"irresolute","phrase":"He remained irresolute despite the pressure.","meaning":"優柔不断な","note":"【例文訳】彼は圧力にもかかわらず優柔不断のままだった。","etymology":"【語源イメージ】irresolute：決意が“固まらない”","preposition":""},{"id":2072,"section":"Section 21 (1級)","word":"irate","phrase":"The customer became irate over the long wait.","meaning":"怒った","note":"【例文訳】客は長い待ち時間に激怒した。","etymology":"【語源イメージ】irate：怒りが“燃える”","preposition":""},{"id":2073,"section":"Section 21 (1級)","word":"personable","phrase":"She is personable and easy to talk to.","meaning":"好感の持てる 魅力的な","note":"【例文訳】彼女は親しみやすく話しやすい。","etymology":"【語源イメージ】personable：人に“好かれる”","preposition":""},{"id":2074,"section":"Section 21 (1級)","word":"efficacious","phrase":"The new treatment proved highly efficacious.","meaning":"効果のある","note":"【例文訳】新しい治療法は非常に効果的であることが証明された。","etymology":"【語源イメージ】efficacious：効果を“生む”","preposition":""},{"id":2075,"section":"Section 21 (1級)","word":"urbane","phrase":"He spoke in an urbane and polished manner.","meaning":"あか抜けた","note":"【例文訳】彼は洗練された都会的な話し方をした。","etymology":"【語源イメージ】urbane：都市の“洗練”","preposition":""},{"id":2076,"section":"Section 21 (1級)","word":"submissive","phrase":"The dog is gentle and submissive.","meaning":"従順な","note":"【例文訳】その犬は従順で優しい。","etymology":"【語源イメージ】submissive：下に“身を置く”","preposition":""},{"id":2077,"section":"Section 21 (1級)","word":"jubilant","phrase":"The team was jubilant after the victory.","meaning":"大喜びの","note":"【例文訳】チームは勝利後、歓喜に満ちていた。","etymology":"【語源イメージ】jubilant：歓喜が“あふれる”","preposition":""},{"id":2078,"section":"Section 21 (1級)","word":"devout","phrase":"He is a devout follower of his faith.","meaning":"敬虔な 熱心な","note":"【例文訳】彼は信仰に篤い人物だ。","etymology":"【語源イメージ】devout：深く“信じる”","preposition":""},{"id":2079,"section":"Section 21 (1級)","word":"optimum","phrase":"They chose the optimum solution for the problem.","meaning":"最高の 最適の","note":"【例文訳】彼らは問題に対して最適な解決策を選んだ。","etymology":"【語源イメージ】optimum：最も“良い”","preposition":""},{"id":2080,"section":"Section 21 (1級)","word":"ingenious","phrase":"Her ingenious idea saved the project.","meaning":"巧妙な 器用な（独創的な）","note":"【例文訳】彼女の独創的なアイデアがプロジェクトを救った。","etymology":"【語源イメージ】ingenious：内から“生まれる才能”","preposition":""},{"id":2081,"section":"Section 21 (1級)","word":"unruly","phrase":"The unruly crowd became difficult to control.","meaning":"手に負えない","note":"【例文訳】その手に負えない群衆は制御が難しくなった。","etymology":"【語源イメージ】unruly：規則に“従わない”","preposition":""},{"id":2082,"section":"Section 21 (1級)","word":"malevolent","phrase":"His malevolent intentions were finally revealed.","meaning":"悪意のある","note":"【例文訳】彼の悪意ある意図がついに明らかになった。","etymology":"【語源イメージ】malevolent：悪を“望む”","preposition":""},{"id":2083,"section":"Section 21 (1級)","word":"haughty","phrase":"She gave him a haughty look and walked away.","meaning":"傲慢な","note":"【例文訳】彼女は彼に高慢な視線を向けて立ち去った。","etymology":"【語源イメージ】haughty：高く“そびえる＝高慢”","preposition":""},{"id":2084,"section":"Section 21 (1級)","word":"arcane","phrase":"The text contains arcane references few understand.","meaning":"秘密の 難解な","note":"【例文訳】その文章にはほとんど理解されない秘教的な引用が含まれていた。","etymology":"【語源イメージ】arcane：箱の中に“隠された”","preposition":""},{"id":2085,"section":"Section 21 (1級)","word":"fallible","phrase":"Humans are fallible and prone to mistakes.","meaning":"誤りやすい　当てにならない","note":"【例文訳】人間は誤りやすく、ミスを犯しがちだ。","etymology":"【語源イメージ】fallible：落ちる可能性が“ある＝誤りやすい”","preposition":""},{"id":2086,"section":"Section 21 (1級)","word":"trite","phrase":"The speech was filled with trite clichés.","meaning":"陳腐な","note":"【例文訳】そのスピーチは陳腐な決まり文句で満ちていた。","etymology":"【語源イメージ】trite：すり減って“古くさい”","preposition":""},{"id":2087,"section":"Section 21 (1級)","word":"devoid","phrase":"The room was devoid of any decoration.","meaning":"（～を）欠いている","note":"【例文訳】その部屋には装飾がまったくなかった。","etymology":"【語源イメージ】devoid：中身が“空っぽ”","preposition":""},{"id":2088,"section":"Section 21 (1級)","word":"dreary","phrase":"The weather was dreary all week.","meaning":"陰うつな わびしい もの寂しい 退屈な","note":"【例文訳】天気は一週間ずっと陰鬱だった。","etymology":"【語源イメージ】dreary：心が“沈む”","preposition":""},{"id":2089,"section":"Section 21 (1級)","word":"lax","phrase":"Security at the event was surprisingly lax.","meaning":"しまりのない だらしない","note":"【例文訳】そのイベントの警備は驚くほど緩かった。","etymology":"【語源イメージ】lax：ゆるく“締まらない”","preposition":""},{"id":2090,"section":"Section 21 (1級)","word":"disheveled","phrase":"His hair looked disheveled after the long trip.","meaning":"身なりのだらしない （髪・服が）乱れた","note":"【例文訳】長旅の後、彼の髪は乱れていた。","etymology":"【語源イメージ】disheveled：髪が“乱れた”","preposition":""},{"id":2091,"section":"Section 21 (1級)","word":"rudimentary","phrase":"They built a rudimentary shelter from branches.","meaning":"基礎的な 原始的な","note":"【例文訳】彼らは枝で簡易的な避難所を作った。","etymology":"【語源イメージ】rudimentary：最初の“基本だけ”","preposition":""},{"id":2092,"section":"Section 21 (1級)","word":"impulsive","phrase":"He made an impulsive decision without thinking.","meaning":"直感的な 衝動的な","note":"【例文訳】彼は考えずに衝動的な決断をした。","etymology":"【語源イメージ】impulsive：衝動が“押し出す”","preposition":""},{"id":2093,"section":"Section 21 (1級)","word":"reticent","phrase":"She remained reticent during the discussion.","meaning":"無口な","note":"【例文訳】彼女は議論の間ずっと控えめだった。","etymology":"【語源イメージ】reticent：静かに“閉じる”","preposition":""},{"id":2094,"section":"Section 21 (1級)","word":"lanky","phrase":"The lanky teenager towered over his classmates.","meaning":"背が高くて細い","note":"【例文訳】そのひょろ長い少年は同級生より背が高かった。","etymology":"【語源イメージ】lanky：細く“長い”","preposition":""},{"id":2095,"section":"Section 21 (1級)","word":"succulent","phrase":"The dish was made with succulent pieces of meat.","meaning":"多汁質の","note":"【例文訳】その料理はジューシーな肉を使って作られていた。","etymology":"【語源イメージ】succulent：汁が“あふれる”","preposition":""},{"id":2096,"section":"Section 21 (1級)","word":"paltry","phrase":"They offered only a paltry amount of compensation.","meaning":"ごくわずかな 価値のない 卑劣な","note":"【例文訳】彼らはごくわずかな補償しか提示しなかった。","etymology":"【語源イメージ】paltry：価値が“乏しい”","preposition":""},{"id":2097,"section":"Section 21 (1級)","word":"bucolic","phrase":"The village had a peaceful, bucolic charm.","meaning":"牧歌的な 田舎の","note":"【例文訳】その村には牧歌的で穏やかな魅力があった。","etymology":"【語源イメージ】bucolic：牧場の“のどかさ”","preposition":""},{"id":2098,"section":"Section 21 (1級)","word":"lavish","phrase":"She wore a lavish gown to the ceremony.","meaning":"ぜいたくな","note":"【例文訳】彼女は式典に豪華なガウンを着て出席した。","etymology":"【語源イメージ】lavish：豊かに“注ぐ”","preposition":""},{"id":2099,"section":"Section 21 (1級)","word":"exponential","phrase":"The company saw exponential growth last year.","meaning":"急激な 幾何級数的な","note":"【例文訳】その会社は昨年、指数関数的な成長を遂げた。","etymology":"【語源イメージ】exponential：指数が“跳ね上がる”","preposition":""},{"id":2100,"section":"Section 21 (1級)","word":"irreparably","phrase":"The damage to the device was irreparably severe.","meaning":"修復できないほど","note":"【例文訳】その装置の損傷は修復不可能なほど深刻だった。","etymology":"【語源イメージ】irreparably：修復が“できない”","preposition":""},{"id":2101,"section":"Section 22 (1級)","word":"abide by","phrase":"Everyone must abide by the rules.","meaning":"規則などに従う","note":"【例文訳】誰もが規則を守らなければならない。","etymology":"【語源イメージ】abide by：規則の“そばに留まる”","preposition":"by は『そば』から『手段・行為者・期限』へ広がる。"},{"id":2102,"section":"Section 22 (1級)","word":"act up","phrase":"The kids began to act up during the long trip.","meaning":"興奮して暴れる,機械などが異常に作動する","note":"【例文訳】子どもたちは長旅の間に騒ぎ始めた。","etymology":"【語源イメージ】act up：行動が“上に跳ねる＝騒ぐ”","preposition":"up は『上へ』から『増加・完成・出現』へ広がる。"},{"id":2103,"section":"Section 22 (1級)","word":"add up to","phrase":"All the expenses added up to a huge amount.","meaning":"結局〜になる、〜につながる","note":"【例文訳】すべての費用が合計して莫大な額になった。","etymology":"【語源イメージ】add up to：数字が“積み上がる”","preposition":"to は『到達点へ向かう』。方向だけでなく、結果・相手への到達も表す。 / up は『上へ』から『増加・完成・出現』へ広がる。"},{"id":2104,"section":"Section 22 (1級)","word":"adhere to","phrase":"We must adhere to the schedule.","meaning":"〜に従う、〜に固執する","note":"【例文訳】私たちはその予定に従わなければならない。","etymology":"【語源イメージ】adhere to：表面に“くっつく”","preposition":"to は『到達点へ向かう』。方向だけでなく、結果・相手への到達も表す。"},{"id":2105,"section":"Section 22 (1級)","word":"atone for","phrase":"He tried to atone for his mistake.","meaning":"償う","note":"【例文訳】彼は自分の過ちを償おうとした。","etymology":"【語源イメージ】atone for：罪を“1つにまとめて償う”","preposition":"for は『向かう先・目的・交換』。何のために向いているかを見る。"},{"id":2106,"section":"Section 22 (1級)","word":"attribute A to B","phrase":"They attribute the success to her leadership.","meaning":"AはBに起因すると考える","note":"【例文訳】彼らは成功を彼女のリーダーシップのおかげだとしている。","etymology":"【語源イメージ】attribute A to B：原因を“Bに向ける”","preposition":"熟語は『動詞の核』＋『前置詞/副詞の空間イメージ』で覚えると、丸暗記より崩れにくい。"},{"id":2107,"section":"Section 22 (1級)","word":"bail out","phrase":"The government decided to bail out the failing company.","meaning":"企業などを救済する,保釈する","note":"【例文訳】政府はその破綻寸前の会社を救済することにした。","etymology":"【語源イメージ】bail out：水を“かき出して救う”","preposition":"out は『外へ』。隠れたものが外に出て見える/尽きる/実行される。"},{"id":2108,"section":"Section 22 (1級)","word":"bank on","phrase":"You can bank on his support.","meaning":"当てにする","note":"【例文訳】彼の支援は当てにできる。","etymology":"【語源イメージ】bank on：銀行のように“信頼して預ける”","preposition":"on は『上』より『くっついている/接触/継続』。依存・継続・作動中の感覚に広がる。"},{"id":2109,"section":"Section 22 (1級)","word":"barge into","phrase":"He suddenly barged into the meeting room.","meaning":"どかどか入り込む,会話などに割り込む","note":"【例文訳】彼は突然会議室に乱入した。","etymology":"【語源イメージ】barge into：重い船が“突っ込む”","preposition":"into は『中へ入り込む/変化して〜になる』。"},{"id":2110,"section":"Section 22 (1級)","word":"bawl out","phrase":"The coach bawled out the players for being late.","meaning":"厳しく叱りとばす","note":"【例文訳】コーチは遅刻した選手たちを怒鳴りつけた。","etymology":"【語源イメージ】bawl out：大声で“叫んで叱る”","preposition":"out は『外へ』。隠れたものが外に出て見える/尽きる/実行される。"},{"id":2111,"section":"Section 22 (1級)","word":"be bogged down in","phrase":"We are bogged down in paperwork.","meaning":"
