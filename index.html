<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>⚡ 英単語ハックマスター 1級⚡</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background-color: #0f172a;
            color: #f8fafc;
            -webkit-tap-highlight-color: transparent;
            user-select: none;
        }
        .progress-bar {
            transition: width 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .glass-card {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }
        .fade-in {
            animation: fadeIn 0.2s ease-out forwards;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(4px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body class="min-h-screen flex flex-col justify-between antialiased selection:bg-blue-500/30">

    <header class="w-full glass-card border-b border-slate-800 px-4 py-3 sticky top-0 z-50 flex items-center justify-between">
        <div class="flex items-center space-x-2">
            <span class="text-xl">⚡</span>
            <h1 class="text-base font-bold tracking-wider text-blue-400">WORD HACKER</h1>
        </div>
        <div id="header-combo" class="hidden bg-gradient-to-r from-amber-500 to-orange-500 text-slate-950 font-black px-2.5 py-0.5 rounded-full text-xs tracking-wider">
            🔥 <span id="header-combo-count">0</span> COMBO
        </div>
    </header>

    <main class="flex-1 w-full max-w-md mx-auto p-4 flex flex-col justify-start">

        <div id="screen-home" class="space-y-5 w-full fade-in">
            <div class="text-center py-2">
                <p class="text-xs text-slate-400 uppercase tracking-widest">Target Acquired</p>
                <h2 id="home-title" class="text-xl font-black text-slate-100 mt-1">英単語ハックマスター</h2>
                <p class="text-xs text-emerald-400 mt-1">🎯 隙間時間ハック ＆ コンプリート仕様</p>
            </div>

            <div class="glass-card rounded-2xl p-4 border border-blue-500/20 bg-gradient-to-br from-blue-950/30 to-slate-900/50">
                <div class="flex justify-between text-xs text-slate-400 mb-1">
                    <span>👑 総コンプリート率（覚えた単語）</span>
                    <span id="total-progress-percent" class="font-bold text-blue-400">0%</span>
                </div>
                <div class="w-full bg-slate-800 h-3 rounded-full overflow-hidden p-[1px]">
                    <div id="total-progress-bar" class="progress-bar bg-gradient-to-r from-emerald-400 via-teal-500 to-blue-500 h-full w-0 rounded-full"></div>
                </div>
                <div class="flex justify-between text-[10px] text-slate-500 mt-1.5 font-mono">
                    <span id="total-progress-count">マスター: 0 / 0 語</span>
                    <button id="btn-reset-all" class="text-rose-400/70 hover:text-rose-400 transition-colors">データ全消去</button>
                </div>
            </div>

            <div id="section-list" class="space-y-3 max-h-[55vh] overflow-y-auto pr-1">
                </div>
        </div>

        <div id="screen-quiz" class="hidden space-y-4 w-full flex-1 flex flex-col justify-between fade-in">
            
            <div class="flex items-center justify-between">
                <button id="btn-back" class="text-xs font-bold text-slate-400 hover:text-slate-200 flex items-center space-x-1 py-1 px-2.5 rounded-lg bg-slate-800/60 transition-colors">
                    <span>↩ ホームへ戻る</span>
                </button>
                <div class="text-xs font-mono tracking-wider bg-slate-800/80 px-3 py-1 rounded-md text-slate-300 border border-slate-700/50">
                    現在の残り: <span id="quiz-count" class="font-bold text-amber-400 text-sm">0</span> 問
                </div>
            </div>

            <div class="space-y-1">
                <div class="w-full bg-slate-800 h-1.5 rounded-full overflow-hidden">
                    <div id="quiz-progress-bar" class="progress-bar bg-gradient-to-r from-blue-500 to-indigo-500 h-full w-0"></div>
                </div>
                <div class="flex justify-between items-center px-0.5">
                    <span id="quiz-combo-badge" class="opacity-0 text-[10px] font-bold bg-amber-500/20 text-amber-400 px-2 py-0.5 rounded border border-amber-500/30 transition-all">
                        🔥 <span id="quiz-combo-count">0</span> COMBO
                    </span>
                    <span id="quiz-section-title" class="text-[10px] text-slate-500 uppercase tracking-wider font-bold"></span>
                </div>
            </div>

            <div class="glass-card rounded-2xl p-5 border border-slate-700/60 bg-gradient-to-b from-slate-800/40 to-slate-900/60 flex-1 flex flex-col justify-between shadow-xl min-h-[360px]">
                
                <div class="space-y-3">
                    <div class="space-y-1">
                        <span class="text-[10px] uppercase font-bold tracking-widest text-slate-500 block">日本語訳・ヒント</span>
                        <div class="text-slate-100 font-bold text-base leading-snug" id="quiz-hint-meaning"></div>
                    </div>

                    <div id="quiz-memory-booster" class="grid grid-cols-2 gap-2 pt-2 border-t border-slate-800/80 text-[11px]">
                        <div class="bg-slate-950/40 p-2 rounded-lg border border-slate-800/30">
                            <span class="text-[9px] font-bold text-blue-400 block">💡 語源・単語イメージ</span>
                            <span id="quiz-boost-etymology" class="text-slate-300 font-medium"></span>
                        </div>
                        <div class="bg-slate-950/40 p-2 rounded-lg border border-slate-800/30">
                            <span class="text-[9px] font-bold text-indigo-400 block">🔗 補足・コロケーション</span>
                            <span id="quiz-boost-preposition" class="text-slate-300 font-medium"></span>
                        </div>
                    </div>
                </div>

                <div class="py-4 my-auto text-center">
                    <p class="text-[10px] uppercase font-bold tracking-widest text-slate-500 mb-1.5">ENGLISH PHRASE</p>
                    <div id="quiz-phrase" class="text-lg md:text-xl font-bold text-slate-100 leading-relaxed tracking-wide transition-all"></div>
                </div>

                <div id="quiz-answer-zone" class="invisible py-3 text-center border-t border-slate-800/60 bg-slate-950/30 rounded-xl space-y-2">
                    <p class="text-[10px] uppercase font-bold tracking-widest text-emerald-400">CORRECT WORD</p>
                    <div id="quiz-correct-word" class="text-2xl font-black tracking-wider text-emerald-400 select-all"></div>
                    
                    <div class="flex justify-center space-x-2 pt-1">
                        <button id="btn-speak-word" class="bg-slate-800 hover:bg-slate-700 text-slate-200 text-xs px-3 py-1 rounded-lg border border-slate-700 flex items-center space-x-1 active:scale-95 transition-transform">
                            <span>🔊 単語</span>
                        </button>
                        <button id="btn-speak-phrase" class="bg-slate-800 hover:bg-slate-700 text-slate-200 text-xs px-3 py-1 rounded-lg border border-slate-700 flex items-center space-x-1 active:scale-95 transition-transform">
                            <span>🔊 フレーズ</span>
                        </button>
                    </div>
                </div>
            </div>

            <div class="w-full pt-2">
                <button id="btn-reveal" class="w-full bg-gradient-to-r from-blue-600 to-indigo-600 hover:from-blue-500 hover:to-indigo-500 text-white font-bold py-4 rounded-xl shadow-lg shadow-blue-500/20 active:scale-[0.99] transition-transform text-sm tracking-widest">
                    👁 答えを見る (TAP TO REVEAL)
                </button>

                <div id="quiz-choice-pad" class="hidden grid grid-cols-2 gap-3.5">
                    <button id="btn-wrong" class="bg-gradient-to-b from-rose-600 to-rose-700 hover:from-rose-500 hover:to-rose-600 text-white font-bold py-4 rounded-xl shadow-md active:scale-[0.97] transition-all flex flex-col items-center justify-center">
                        <span class="text-base flex items-center space-x-1">❌ <span>もう一度（復習）</span></span>
                        <span class="text-[9px] opacity-75 font-normal mt-0.5">列の最後尾へ自動ローテーション</span>
                    </button>
                    <button id="btn-correct" class="bg-gradient-to-b from-emerald-600 to-emerald-700 hover:from-emerald-500 hover:to-emerald-600 text-white font-bold py-4 rounded-xl shadow-md active:scale-[0.97] transition-all flex flex-col items-center justify-center">
                        <span class="text-base flex items-center space-x-1">⭕ <span>覚えた（クリア）</span></span>
                        <span class="text-[9px] opacity-75 font-normal mt-0.5">マスターリストへ完全保存 ✨</span>
                    </button>
                </div>
            </div>
        </div>
    </main>

    <footer class="w-full text-center py-2 text-[9px] text-slate-600 border-t border-slate-900 bg-slate-950/40">
        &copy; 2026 Word Hacker System. Optimized for Capricorn Gamers.
    </footer>

        const MASTER_DATA = [{"id": 1, "section": "Section 1 (1級)", "word": "claim", "phrase": "The scientist did not claim that the treatment was perfect, but she said the results were promising.", "meaning": "主張する；要求する；奪う", "note": "主張するだけでなく、権利として要求する、災害・事故が命を奪うという意味もある。\n\n【例文訳】\nその科学者はその治療法が完璧だと主張したわけではないが、結果は有望だと述べた。", "etymology": "ラテン語 L.clamare「叫ぶ、呼ぶ」\n【補足】clamare「叫ぶ」から。強く声に出して要求・主張するイメージ。", "preposition": ""}, {"id": 2, "section": "Section 1 (1級)", "word": "project", "phrase": "Analysts project that demand for renewable energy will continue to rise over the next decade.", "meaning": "見積もる 提示する", "note": "企画・計画だけでなく、予測する、映し出す、突き出るという意味もある。\n\n【例文訳】\nアナリストは、再生可能エネルギーへの需要が今後10年間増え続けると見積もっている。", "etymology": "pro（前に）+ ject（投げる）", "preposition": ""}, {"id": 3, "section": "Section 1 (1級)", "word": "expand", "phrase": "The university plans to expand its scholarship program for students from rural areas.", "meaning": "拡大する", "note": "【例文訳】\nその大学は地方出身の学生向け奨学金制度を拡大する予定だ。", "etymology": "ex-（～の外へ）＋pando（広げる）", "preposition": ""}, {"id": 4, "section": "Section 1 (1級)", "word": "address", "phrase": "The mayor promised to address the housing shortage before the end of the year.", "meaning": "(問題を）取り上げる 対処する 話しかける", "note": "住所だけでなく、問題に取り組む、演説する、人に呼びかける意味が頻出。\n\n【例文訳】\n市長は年末までに住宅不足に対処すると約束した。", "etymology": "a-（～へ）＋drecier（真っすぐにする）\n【補足】ad-「〜へ」+ directus「まっすぐにされた」系。相手や問題へまっすぐ向かう感覚。", "preposition": ""}, {"id": 5, "section": "Section 1 (1級)", "word": "detect", "phrase": "The new sensor can detect tiny changes in air quality within seconds.", "meaning": "感知する 発見する", "note": "【例文訳】\nその新しいセンサーは空気の質のわずかな変化を数秒で感知できる。", "etymology": "de「否定」tect「覆う」\n【補足】de-はここでは「外へ／離れて」の感覚。detect＝覆いを外して見つける（de- + tegere「覆う」）。", "preposition": ""}, {"id": 6, "section": "Section 1 (1級)", "word": "evolve", "phrase": "Languages evolve as societies change and new technologies appear.", "meaning": "（～から）進化する", "note": "【例文訳】\n言語は社会が変化し新しい技術が現れるにつれて進化する。", "etymology": "e「外へ」volve「回転する」", "preposition": ""}, {"id": 7, "section": "Section 1 (1級)", "word": "guarantee", "phrase": "No policy can guarantee success, but careful planning reduces the risk of failure.", "meaning": "確約する", "note": "【例文訳】\n成功を保証できる政策はないが、慎重な計画は失敗のリスクを減らす。", "etymology": "garant（保護）→㋫㋗warjan（攻撃をかわす）\n→㋘warjana（守る）→㋑wer-（覆う）\n【補足】guarantee は保証・保護の語系。warranty と同系統の歴史を持つ。", "preposition": ""}, {"id": 8, "section": "Section 1 (1級)", "word": "implement", "phrase": "The school will implement a new curriculum focused on critical thinking.", "meaning": "実施する", "note": "【例文訳】\nその学校は批判的思考に重点を置いた新しいカリキュラムを実施する。", "etymology": "im「中へ」ple「満たす」", "preposition": ""}, {"id": 9, "section": "Section 1 (1級)", "word": "weather", "phrase": "Small businesses struggled to weather the sharp rise in energy prices.", "meaning": "切り抜ける", "note": "名詞は天気。動詞では嵐や困難を『耐えて切り抜ける』意味。\n\n【例文訳】\n小企業はエネルギー価格の急上昇を切り抜けるのに苦労した。", "etymology": "weder（空気、空、そよ風）\n【補足】動詞では「嵐・困難を耐えて切り抜ける」という比喩に発展。", "preposition": ""}, {"id": 10, "section": "Section 1 (1級)", "word": "justify", "phrase": "The company must justify the price increase to its customers.", "meaning": "正当化する 正当性を示す", "note": "【例文訳】\nその会社は顧客に対して値上げを正当化しなければならない。", "etymology": "just(正しい）+fy", "preposition": ""}, {"id": 11, "section": "Section 1 (1級)", "word": "convict", "phrase": "The jury refused to convict the defendant without clear evidence.", "meaning": "（～で）有罪判決を下す", "note": "【例文訳】\n陪審は明確な証拠なしに被告に有罪判決を下すことを拒んだ。", "etymology": "com(強調)とvincere(征服する)", "preposition": ""}, {"id": 12, "section": "Section 1 (1級)", "word": "prioritize", "phrase": "Hospitals must prioritize patients who need urgent care.", "meaning": "優先する", "note": "【例文訳】\n病院は緊急治療を必要とする患者を優先しなければならない。", "etymology": "pri-（前の）＋-ior（もっと）＋ize(化）", "preposition": ""}, {"id": 13, "section": "Section 1 (1級)", "word": "rebel", "phrase": "Some citizens began to rebel against the unfair tax system.", "meaning": "反逆する", "note": "【例文訳】\n一部の市民は不公平な税制に反逆し始めた。", "etymology": "「re-」と「戦争を行なう」を意味する「bellō」", "preposition": ""}, {"id": 14, "section": "Section 1 (1級)", "word": "fuel", "phrase": "Rumors on social media can fuel public anxiety during a crisis.", "meaning": "あおる 燃料を補給する", "note": "【例文訳】\n危機の際、SNS上の噂は人々の不安をあおることがある。", "etymology": "feu（火）", "preposition": ""}, {"id": 15, "section": "Section 1 (1級)", "word": "sustain", "phrase": "A small charity cannot sustain its activities without stable funding.", "meaning": "維持する 耐える", "note": "【例文訳】\n小さな慈善団体は安定した資金なしには活動を維持できない。", "etymology": "sus「下に」tain「つかんで離さない」", "preposition": ""}, {"id": 16, "section": "Section 1 (1級)", "word": "portray", "phrase": "The documentary portrays the artist as both brilliant and deeply vulnerable.", "meaning": "描写する", "note": "【例文訳】\nそのドキュメンタリーはその芸術家を、優秀であると同時に非常に傷つきやすい人物として描写している。", "etymology": "por-（～を通って）＋traire（描く）\n→㋶traho（引く）", "preposition": ""}, {"id": 17, "section": "Section 1 (1級)", "word": "manipulate", "phrase": "Politicians sometimes manipulate statistics to support their arguments.", "meaning": "操作する", "note": "【例文訳】\n政治家は自分たちの主張を支えるために統計を操作することがある。", "etymology": "mani「手」pul「満たす」ate「する」", "preposition": ""}, {"id": 18, "section": "Section 1 (1級)", "word": "stimulate", "phrase": "The tax cut was designed to stimulate consumer spending.", "meaning": "刺激する", "note": "【例文訳】\nその減税は消費支出を刺激するために設計された。", "etymology": "stimulus（刺すこと）→sti(先端　突き刺す)", "preposition": ""}, {"id": 19, "section": "Section 1 (1級)", "word": "integrate", "phrase": "The program helps immigrants integrate into the local community.", "meaning": "（～に）溶け込む （～に）統合する", "note": "【例文訳】\nそのプログラムは移民が地域社会に溶け込むのを助ける。", "etymology": "integer（完全な）＋-o（動詞）→㋶in-（否定）＋tango（触れる.\n【補足】integer「完全な・損なわれていない」から。in-は否定ではなく「完全性」の語史に関係。", "preposition": ""}, {"id": 20, "section": "Section 1 (1級)", "word": "undergo", "phrase": "The old railway station will undergo major repairs next spring.", "meaning": "経験する", "note": "【例文訳】\nその古い駅は来春、大規模な修繕を受ける。", "etymology": "under-（～の下に）＋go（行く）", "preposition": ""}, {"id": 21, "section": "Section 1 (1級)", "word": "diagnose", "phrase": "Doctors used several tests to diagnose the cause of the patient's symptoms.", "meaning": "診断する 原因を究明する", "note": "【例文訳】\n医師たちは患者の症状の原因を診断する 原因を究明するためにいくつかの検査を用いた。", "etymology": "dia「横切って」gno「知る」", "preposition": ""}, {"id": 22, "section": "Section 1 (1級)", "word": "enforce", "phrase": "The city finally began to enforce the parking rules near the station.", "meaning": "執行する", "note": "【例文訳】\n市はついに駅周辺の駐車規則を施行し始めた。", "etymology": "en「その状態にする」fort「強い、かたい」", "preposition": ""}, {"id": 23, "section": "Section 1 (1級)", "word": "abuse", "phrase": "The manager was accused of trying to abuse his authority to silence complaints.", "meaning": "悪用する 濫用する", "note": "【例文訳】\nその管理職は、苦情を黙らせるために権限を濫用しようとしたとして非難された。", "etymology": "ab「離れた」use「使う」", "preposition": ""}, {"id": 24, "section": "Section 1 (1級)", "word": "dismiss", "phrase": "The judge refused to dismiss the case because new evidence had come to light.", "meaning": "却下する 解雇する", "note": "【例文訳】\n新たな証拠が明らかになったため、裁判官はその訴訟を却下することを拒んだ。", "etymology": "dis「離れて」miss「送る」が語源で、「いまの場から離れたところへ送る」", "preposition": ""}, {"id": 25, "section": "Section 1 (1級)", "word": "migrate", "phrase": "Many young people migrate to big cities in search of better jobs.", "meaning": "（鳥・魚などが）渡る；人が移住する；データ・システムが移行する", "note": "「鳥・魚が渡る」だけでなく、人が移住する、データ・制度が別環境へ移行する意味も重要。\n\n【例文訳】\n多くの若者はより良い仕事を求めて大都市へ移住する。", "etymology": "migro（移住する）→mey-（変える）", "preposition": ""}, {"id": 26, "section": "Section 1 (1級)", "word": "contradict", "phrase": "The witness gave details that seemed to contradict her earlier statement.", "meaning": "反論する 矛盾する", "note": "【例文訳】\nその証人は、以前の供述と矛盾するように見える詳細を述べた。", "etymology": "contra「反対に」dict「話す」", "preposition": ""}, {"id": 27, "section": "Section 1 (1級)", "word": "plague", "phrase": "A shortage of nurses continues to plague rural hospitals.", "meaning": "～を絶えず苦しめる・疫病", "note": "【例文訳】\n看護師不足が地方の病院を悩ませ続けている。", "etymology": "大打撃（plaga）", "preposition": ""}, {"id": 28, "section": "Section 1 (1級)", "word": "complex", "phrase": "The child developed a complex about speaking in public after being laughed at in class.", "meaning": "集合体 強迫観念", "note": "【例文訳】\nその子は授業中に笑われて以来、人前で話すことにコンプレックスを抱くようになった。", "etymology": "com「共に」plex「折る」\n【補足】complex は com-「共に」+ plectere「編む・折り重ねる」。複数要素が絡み合うイメージ。", "preposition": ""}, {"id": 29, "section": "Section 1 (1級)", "word": "congress", "phrase": "Congress passed the bill after weeks of heated debate.", "meaning": "米国議会", "note": "【例文訳】\n数週間にわたる激しい討論の末、米国議会はその法案を可決した。", "etymology": "「con: 共に」+「gress: 進む」", "preposition": ""}, {"id": 30, "section": "Section 1 (1級)", "word": "antibiotic", "phrase": "The doctor prescribed an antibiotic only after confirming that the infection was bacterial.", "meaning": "抗生物質", "note": "【例文訳】\n医師はその感染が細菌性だと確認してから初めて抗生物質を処方した。", "etymology": "anti「反する」bio「命」ic「性質」＝「生物に対抗する性質」", "preposition": ""}, {"id": 31, "section": "Section 1 (1級)", "word": "amendment", "phrase": "The senator proposed an amendment to protect workers from sudden layoffs.", "meaning": "修正 改正", "note": "【例文訳】\nその上院議員は、労働者を突然の解雇から守るための修正案を提案した。", "etymology": "ex-（～の外へ）＋menda（傷）", "preposition": ""}, {"id": 32, "section": "Section 1 (1級)", "word": "diversity", "phrase": "The company says diversity has helped its design team come up with better ideas.", "meaning": "多様性", "note": "【例文訳】\nその会社は、多様性のおかげで設計チームがより良いアイデアを生み出せるようになったと述べている。", "etymology": "異なる別々の（dis-）方向を向いた（versus）", "preposition": ""}, {"id": 33, "section": "Section 1 (1級)", "word": "plot", "phrase": "The detective noticed a small detail that changed the entire plot of the case.", "meaning": "陰謀 構想 平面図", "note": "【例文訳】\nその刑事は、事件全体の筋書きを変える小さな手がかりに気づいた。", "etymology": "？", "preposition": ""}, {"id": 34, "section": "Section 1 (1級)", "word": "advocate", "phrase": "She became an advocate for children who had no one else to speak for them.", "meaning": "支持者 擁護者", "note": "【例文訳】\n彼女は、他に代弁してくれる人のいない子どもたちの擁護者になった。", "etymology": "ad「その方向へ」voc「呼ぶ」ate「する」=「弁護のために呼ばれる」", "preposition": ""}, {"id": 35, "section": "Section 1 (1級)", "word": "trait", "phrase": "Patience is a useful trait when you work with nervous customers.", "meaning": "資質", "note": "【例文訳】\n不安を抱えた顧客に対応する時、忍耐力は役立つ資質である。", "etymology": "㋠㋫trait（一筆の動き）", "preposition": ""}, {"id": 36, "section": "Section 1 (1級)", "word": "perspective", "phrase": "Living abroad gave him a new perspective on his own country.", "meaning": "観点 遠近法 展望", "note": "【例文訳】\n海外で暮らしたことで、彼は自国に対する新しい見方を得た。", "etymology": "見（specio）通し（per-）ている（-ivus）こと、空間や全体を見通すこと", "preposition": ""}, {"id": 37, "section": "Section 1 (1級)", "word": "stem", "phrase": "The disease can stem from poor nutrition as well as genetic factors.", "meaning": "茎　幹　船首", "note": "【例文訳】\nその病気は遺伝的要因だけでなく栄養不良に由来することもある。", "etymology": "stamniz（木の幹）→sta-（立つ）", "preposition": ""}, {"id": 38, "section": "Section 1 (1級)", "word": "component", "phrase": "Trust is a key component of any successful partnership.", "meaning": "構成部品　構成要素", "note": "【例文訳】\n信頼は、どのような成功する協力関係においても重要な構成要素である。", "etymology": "com「ともに」pone「置く」ent「人、もの」", "preposition": ""}, {"id": 39, "section": "Section 1 (1級)", "word": "balance", "phrase": "I checked my bank balance before booking the hotel.", "meaning": "残高", "note": "均衡だけでなく、残高、天秤にかける、両立させる。\n\n【例文訳】\nホテルを予約する前に銀行口座の残高を確認した。", "etymology": "㋶bis（二つ/二度）＋lanx（てんびん皿）が語源。「天秤の二つの（bis）皿（lanx）の平衡状態」", "preposition": ""}, {"id": 40, "section": "Section 1 (1級)", "word": "inmate", "phrase": "The program teaches inmates practical skills before they return to society.", "meaning": "（病院・老人ホーム・刑務所などの）収容者", "note": "【例文訳】\nそのプログラムは、収容者が社会に戻る前に実用的な技能を教える。", "etymology": "in (内側) + mate (仲間)", "preposition": ""}, {"id": 41, "section": "Section 1 (1級)", "word": "extinction", "phrase": "Conservationists warned that the species was close to extinction.", "meaning": "絶滅", "note": "【例文訳】\n自然保護活動家たちは、その種が絶滅に近づいていると警告した。", "etymology": "ex-（外へ）＋stinguo（火を消す）「生命の火をもみ消すこと」", "preposition": ""}, {"id": 42, "section": "Section 1 (1級)", "word": "proponent", "phrase": "He is a strong proponent of renewable energy in rural communities.", "meaning": "支持者 提唱者", "note": "【例文訳】\n彼は地方地域における再生可能エネルギーの熱心な提唱者である。", "etymology": "pro（前）とponere（置く）", "preposition": ""}, {"id": 43, "section": "Section 1 (1級)", "word": "uprising", "phrase": "The uprising began after years of corruption and food shortages.", "meaning": "反乱　暴動", "note": "【例文訳】\nその反乱は、何年にもわたる汚職と食料不足の後に始まった。", "etymology": "up (上に) + rising (昇る・立ち上がる)", "preposition": ""}, {"id": 44, "section": "Section 1 (1級)", "word": "perception", "phrase": "Her perception of the city changed after she started working with local residents.", "meaning": "認識 知覚", "note": "【例文訳】\n地元住民と働き始めてから、彼女のその都市に対する認識は変わった。", "etymology": "per「徹底的に」cept「つかみ取る」ion「こと、もの」", "preposition": ""}, {"id": 45, "section": "Section 1 (1級)", "word": "habitat", "phrase": "The new road could destroy the habitat of several endangered birds.", "meaning": "生息環境 居住地", "note": "【例文訳】\nその新しい道路は、数種類の絶滅危惧種の鳥の生息地を破壊するおそれがある。", "etymology": "habito（住む）→㋶habeo（持つ）＋-to（反復動詞）", "preposition": ""}, {"id": 46, "section": "Section 1 (1級)", "word": "bias", "phrase": "The hiring process was reviewed to remove any hidden bias.", "meaning": "えこひいき 先入観 傾向", "note": "【例文訳】\n採用過程は、隠れた偏見を取り除くために見直された。", "etymology": "㋔㋗biais（傾斜）", "preposition": ""}, {"id": 47, "section": "Section 1 (1級)", "word": "microbe", "phrase": "A single drop of pond water can contain thousands of microbes.", "meaning": "病原菌 微生物", "note": "【例文訳】\n池の水一滴にも何千もの微生物が含まれていることがある。", "etymology": "㋙㋖mikros（小さい）＋bios（生命体）", "preposition": ""}, {"id": 48, "section": "Section 1 (1級)", "word": "archaeologist", "phrase": "The archaeologist found pottery fragments beneath the old temple floor.", "meaning": "考古学者", "note": "【例文訳】\nその考古学者は古い寺院の床下で陶器の破片を発見した。", "etymology": "arkhaios（古代の）＋logos（話し）→arkhē（始まり・起源）", "preposition": ""}, {"id": 49, "section": "Section 1 (1級)", "word": "mutation", "phrase": "A small mutation allowed the virus to spread more easily.", "meaning": "変異型", "note": "【例文訳】\n小さな変異によって、そのウイルスはより広がりやすくなった。", "etymology": "㋶muto（かえる）→㋶moveo（動かす）", "preposition": ""}, {"id": 50, "section": "Section 1 (1級)", "word": "attribute", "phrase": "Honesty is the attribute I value most in a business partner.", "meaning": "特質 属性", "note": "【例文訳】\n誠実さは、私が仕事上のパートナーに最も重視する特質である。", "etymology": "ad-（方へ）＋tribuo（与える）が語源。 \n「それに理由を与えること」", "preposition": ""}, {"id": 51, "section": "Section 1 (1級)", "word": "nanoparticle", "phrase": "Researchers used a nanoparticle to deliver the drug directly to cancer cells.", "meaning": "ナノ粒子", "note": "【例文訳】\n研究者たちは、薬をがん細胞へ直接届けるためにナノ粒子を使用した。", "etymology": "nano(ドワーフ→小さい→極小）+particle(pars（部分）\n＋-cula（小さい）)", "preposition": ""}, {"id": 52, "section": "Section 1 (1級)", "word": "regime", "phrase": "The regime tightened its control over newspapers and universities.", "meaning": "政権 政体", "note": "【例文訳】\nその政権は新聞と大学への統制を強めた。", "etymology": "regere(支配する) reg(直線上を移動する→導く・支配する）", "preposition": ""}, {"id": 53, "section": "Section 1 (1級)", "word": "algorithm", "phrase": "The algorithm recommends videos based on what users watch late at night.", "meaning": "アルゴリズム", "note": "【例文訳】\nそのアルゴリズムは、利用者が夜遅くに何を視聴するかに基づいて動画を推薦する。", "etymology": "al-kuwarizmiyy（高度な数学を西洋に紹介したペルシャ人数学者の名字", "preposition": ""}, {"id": 54, "section": "Section 1 (1級)", "word": "vet", "phrase": "We took the dog to the vet after he stopped eating.", "meaning": "獣医", "note": "【例文訳】\n犬が食べなくなったので、私たちはその犬を獣医に連れて行った。", "etymology": "〈人・ものを〉綿密に調べる", "preposition": ""}, {"id": 55, "section": "Section 1 (1級)", "word": "dispute", "phrase": "The two companies settled the dispute before it went to court.", "meaning": "論争", "note": "【例文訳】\nその二社は、裁判になる前に論争を解決した。", "etymology": "dis(離れて)とputate(考える)", "preposition": ""}, {"id": 56, "section": "Section 1 (1級)", "word": "migration", "phrase": "Climate change is expected to increase migration from coastal areas.", "meaning": "移住", "note": "【例文訳】\n気候変動により、沿岸部からの移住が増えると予想されている。", "etymology": "migr「動く」-ation「すること」", "preposition": ""}, {"id": 57, "section": "Section 1 (1級)", "word": "laborer", "phrase": "The laborer carried bricks all day under the summer sun.", "meaning": "（肉体）労働者", "note": "【例文訳】\nその肉体労働者は夏の日差しの下で一日中レンガを運んだ。", "etymology": "lab(働く）", "preposition": ""}, {"id": 58, "section": "Section 1 (1級)", "word": "prohibition", "phrase": "Prohibition created a black market for alcohol in the United States.", "meaning": "（米国の）禁酒法時代　禁止", "note": "【例文訳】\n禁酒法はアメリカで酒の闇市場を生み出した。", "etymology": "pro「前に」hibit「持つ」", "preposition": ""}, {"id": 59, "section": "Section 1 (1級)", "word": "reservoir", "phrase": "The reservoir supplies drinking water to three nearby towns.", "meaning": "貯水池", "note": "【例文訳】\nその貯水池は近隣の三つの町に飲料水を供給している。", "etymology": "re- \"後方\" + servare \"保つ、保存する　保護する\"", "preposition": ""}, {"id": 60, "section": "Section 1 (1級)", "word": "founder", "phrase": "The founder still answers customer emails every morning.", "meaning": "創設者", "note": "【例文訳】\nその創設者は今でも毎朝、顧客からのメールに返信している。", "etymology": "found「基礎を置く」er「人、もの」", "preposition": ""}, {"id": 61, "section": "Section 1 (1級)", "word": "inhabitant", "phrase": "Every inhabitant of the island knows how quickly the weather can change.", "meaning": "住民", "note": "【例文訳】\nその島の住民は皆、天気がいかに急に変わるかを知っている。", "etymology": "㋶in-（～の中に）＋habito（住む）", "preposition": ""}, {"id": 62, "section": "Section 1 (1級)", "word": "commitment", "phrase": "Her commitment to the project kept the team motivated through difficult months.", "meaning": "責任 献身", "note": "【例文訳】\nそのプロジェクトへの彼女の献身が、困難な数か月の間チームの意欲を保った。", "etymology": "㋶com-（一緒に）＋mitto（送る）", "preposition": ""}, {"id": 63, "section": "Section 1 (1級)", "word": "rebellion", "phrase": "The rebellion spread after soldiers refused to fire on civilians.", "meaning": "反乱", "note": "【例文訳】\n兵士たちが民間人への発砲を拒んだ後、その反乱は広がった。", "etymology": "re（反対）とbellum（戦い）", "preposition": ""}, {"id": 64, "section": "Section 1 (1級)", "word": "capitalism", "phrase": "The documentary explores how capitalism changed small farming communities.", "meaning": "資本主義", "note": "【例文訳】\nそのドキュメンタリーは、資本主義が小さな農村共同体をどのように変えたかを探っている。", "etymology": "capital(資本)とism(学説) caput \"頭\"", "preposition": ""}, {"id": 65, "section": "Section 1 (1級)", "word": "crack", "phrase": "A thin crack appeared in the wall after the earthquake.", "meaning": "割れ目", "note": "【例文訳】\n地震の後、壁に細いひび割れが現れた。", "etymology": "krakona（割れた音を立てる）", "preposition": ""}, {"id": 66, "section": "Section 1 (1級)", "word": "hydrogen", "phrase": "Hydrogen can be used as a clean fuel if it is produced with renewable energy.", "meaning": "水素", "note": "【例文訳】\n水素は再生可能エネルギーで作られれば、クリーンな燃料として利用できる。", "etymology": "hydro「水の」gen「生む」", "preposition": ""}, {"id": 67, "section": "Section 1 (1級)", "word": "slavery", "phrase": "The museum shows how slavery shaped the region's economy for generations.", "meaning": "奴隷制度", "note": "【例文訳】\nその博物館は、奴隷制度が何世代にもわたってその地域の経済をどのように形作ったかを示している。", "etymology": "slave「奴隷」ery「こと、もの」 Slav(スラブ人）", "preposition": ""}, {"id": 68, "section": "Section 1 (1級)", "word": "warfare", "phrase": "Drone technology has changed the nature of modern warfare.", "meaning": "交戦状態", "note": "【例文訳】\nドローン技術は現代の戦争の性質を変えた。", "etymology": "war（戦争）＋fare（行く）wers- \"混乱させる　混ぜ合わせる\"", "preposition": ""}, {"id": 69, "section": "Section 1 (1級)", "word": "criterion", "phrase": "Price should not be the only criterion when choosing a school.", "meaning": "基準 標準", "note": "【例文訳】\n学校を選ぶ際、価格だけを基準にするべきではない。", "etymology": "古代ギリシャ語 kriterion（判決の方法）→krino（判決する）", "preposition": ""}, {"id": 70, "section": "Section 1 (1級)", "word": "asset", "phrase": "Her ability to stay calm under pressure is a real asset.", "meaning": "資産 長所", "note": "【例文訳】\nプレッシャーの下でも冷静でいられる彼女の能力は、本当に大きな長所である。", "etymology": "ad（～に）＋satis（十分な）", "preposition": ""}, {"id": 71, "section": "Section 1 (1級)", "word": "conviction", "phrase": "His conviction that the plan would work never weakened.", "meaning": "確信 有罪の判決", "note": "【例文訳】\nその計画はうまくいくという彼の確信は決して揺らがなかった。", "etymology": "con-（強調）＋vinco（勝ち取る）", "preposition": ""}, {"id": 72, "section": "Section 1 (1級)", "word": "corruption", "phrase": "The investigation exposed corruption at the highest levels of government.", "meaning": "腐敗　", "note": "【例文訳】\nその調査は政府の最高層における汚職を暴いた。", "etymology": "完全に（com-）壊れた（ruptus）", "preposition": ""}, {"id": 73, "section": "Section 1 (1級)", "word": "legacy", "phrase": "The coach left a legacy of discipline and quiet confidence.", "meaning": "遺産", "note": "【例文訳】\nそのコーチは規律と静かな自信という遺産を残した。", "etymology": "legatus \"大使、代理人\"", "preposition": ""}, {"id": 74, "section": "Section 1 (1級)", "word": "offender", "phrase": "First-time offenders are sometimes given community service instead of prison.", "meaning": "犯罪者", "note": "【例文訳】\n初犯の犯罪者には、刑務所の代わりに社会奉仕が命じられることがある。", "etymology": "ob-（～に対して）＋fendo（打つ）+er(人）", "preposition": ""}, {"id": 75, "section": "Section 1 (1級)", "word": "propaganda", "phrase": "The regime used propaganda to make the war seem necessary.", "meaning": "宣伝（活動）", "note": "【例文訳】\nその政権は、戦争が必要であるかのように見せるために宣伝活動を利用した。", "etymology": "propagate（挿し木、接ぎ木で増やす）= pro (前)+pag(固定する)+ ate(動詞)", "preposition": ""}, {"id": 76, "section": "Section 1 (1級)", "word": "republic", "phrase": "The small republic depends heavily on tourism and fishing.", "meaning": "共和国", "note": "【例文訳】\nその小さな共和国は観光と漁業に大きく依存している。", "etymology": "res（こと、もの）＋publica（人々の）", "preposition": ""}, {"id": 77, "section": "Section 1 (1級)", "word": "telescope", "phrase": "Through the telescope, we could see the rings of Saturn.", "meaning": "望遠鏡", "note": "【例文訳】\n望遠鏡を通して、私たちは土星の輪を見ることができた。", "etymology": "tele「遠く」scope「見るもの」spek-, 見ること", "preposition": ""}, {"id": 78, "section": "Section 1 (1級)", "word": "humanity", "phrase": "The professor believes that studying the humanities makes engineers better listeners.", "meaning": "人文科学", "note": "【例文訳】\nその教授は、人文科学を学ぶことで技術者はより聞き上手になると考えている。", "etymology": "hum homo(土(earth) 人間）+ity(こと）", "preposition": ""}, {"id": 79, "section": "Section 1 (1級)", "word": "immunization", "phrase": "The clinic offers free immunization for children under five.", "meaning": "予防接種", "note": "【例文訳】\nその診療所は5歳未満の子どもに無料の予防接種を提供している。", "etymology": "in- \"反対\" + munis \"サービスの執行\"+ation(すること）", "preposition": ""}, {"id": 80, "section": "Section 1 (1級)", "word": "islander", "phrase": "The islanders prepared for the storm long before tourists became worried.", "meaning": "島民", "note": "【例文訳】\n観光客が心配し始めるずっと前から、島民たちは嵐に備えていた。", "etymology": "ieg「水に囲まれたもの」land「土地」", "preposition": ""}, {"id": 81, "section": "Section 1 (1級)", "word": "vent", "phrase": "Steam escaped through a small vent above the oven.", "meaning": "通気孔", "note": "【例文訳】\n蒸気がオーブンの上にある小さな通気孔から漏れた。", "etymology": "venire「来る」", "preposition": ""}, {"id": 82, "section": "Section 1 (1級)", "word": "incentive", "phrase": "The city offered a tax incentive to companies that hired local workers.", "meaning": "刺激 動機 報奨金", "note": "【例文訳】\n市は地元の労働者を雇用した企業に税制上の優遇措置を提供した。", "etymology": "incino（歌う）＋-ivus（こと）→in-（中に）＋cano（歌う）「歌で鼓舞すること」", "preposition": ""}, {"id": 83, "section": "Section 1 (1級)", "word": "prosecutor", "phrase": "The prosecutor argued that the emails proved the defendant's intent.", "meaning": "検察官", "note": "【例文訳】\n検察官は、そのメールが被告の意図を証明していると主張した。", "etymology": "pro(前)とsequi(続ける) 原義はラテン語のprosequi(付け狙う)", "preposition": ""}, {"id": 84, "section": "Section 1 (1級)", "word": "potential", "phrase": "The old warehouse has the potential to become a lively arts center.", "meaning": "潜在的な", "note": "【例文訳】\nその古い倉庫には、活気ある芸術センターになる潜在力がある。", "etymology": "pot「できる/主」ent「性質」al「性質」", "preposition": ""}, {"id": 85, "section": "Section 1 (1級)", "word": "indigenous", "phrase": "The school invited indigenous leaders to speak about land and language.", "meaning": "土着の （その土地に）固有の", "note": "【例文訳】\n学校は、土地と言語について話してもらうために先住民の指導者たちを招いた。", "etymology": "indi-（中に）＋gigno（産む）「原産の」", "preposition": ""}, {"id": 86, "section": "Section 1 (1級)", "word": "enormous", "phrase": "The project required an enormous amount of patience and money.", "meaning": "巨大な", "note": "【例文訳】\nその計画には膨大な忍耐と資金が必要だった。", "etymology": "enormis（膨大な）＋-ous（多い）→ex-（外へ）＋norma（標準）", "preposition": ""}, {"id": 87, "section": "Section 1 (1級)", "word": "widespread", "phrase": "There was widespread concern about the safety of the new drug.", "meaning": "広範な、広く知られた", "note": "【例文訳】\nその新薬の安全性について広範な懸念があった。", "etymology": "wide（幅の広い）＋spread（広がる）", "preposition": ""}, {"id": 88, "section": "Section 1 (1級)", "word": "inevitable", "phrase": "After months of losses, the store's closure seemed inevitable.", "meaning": "避けられない", "note": "【例文訳】\n何か月もの赤字の後、その店の閉鎖は避けられないように思えた。", "etymology": "in-（否定）＋e-（外へ）＋vito（避ける）＋-abilis（可能な）", "preposition": ""}, {"id": 89, "section": "Section 1 (1級)", "word": "extinct", "phrase": "The bird has been extinct on the island for more than a century.", "meaning": "絶滅した 死に絶えた", "note": "【例文訳】\nその鳥はその島では一世紀以上前から絶滅している。", "etymology": "ex-（外へ）＋stinguo（火を消す）", "preposition": ""}, {"id": 90, "section": "Section 1 (1級)", "word": "electoral", "phrase": "The scandal damaged the party's electoral chances.", "meaning": "選挙の", "note": "【例文訳】\nそのスキャンダルはその政党の選挙での勝算を損なった。", "etymology": "ex \"外\"+ legere \"選ぶ\"", "preposition": ""}, {"id": 91, "section": "Section 1 (1級)", "word": "subsequent", "phrase": "The first decision shaped all subsequent negotiations.", "meaning": "その後の", "note": "【例文訳】\n最初の決定がその後のすべての交渉を方向づけた。", "etymology": "下に（sub-）続い（sequor）ている（-ens）こと", "preposition": ""}, {"id": 92, "section": "Section 1 (1級)", "word": "controversial", "phrase": "The mayor defended the controversial plan at a packed town meeting.", "meaning": "問題の 物議を醸す", "note": "【例文訳】\n市長は満員の住民集会で、その物議を醸す計画を擁護した。", "etymology": "contro「反対に」verse「向きを変える」al「性質」", "preposition": ""}, {"id": 93, "section": "Section 1 (1級)", "word": "disruptive", "phrase": "The new app proved disruptive because it changed how taxis were booked.", "meaning": "固定観念を壊す", "note": "【例文訳】\nその新しいアプリはタクシーの予約方法を変えたため、破壊的な影響を持つものとなった。", "etymology": "dis(分離)とrumpere(壊す)", "preposition": ""}, {"id": 94, "section": "Section 1 (1級)", "word": "robotic", "phrase": "The factory replaced the most dangerous tasks with robotic arms.", "meaning": "ロボットの", "note": "【例文訳】\nその工場は最も危険な作業をロボットアームに置き換えた。", "etymology": "robota（強制労働）rabu \"奴隷\"", "preposition": ""}, {"id": 95, "section": "Section 1 (1級)", "word": "toxic", "phrase": "The factory released toxic chemicals into the river.", "meaning": "有毒な", "note": "【例文訳】\nその工場は有毒な化学物質を川に流出させた。", "etymology": "toxikos（毒矢に使う毒物）→toxon（弓）＋-ikos（～の）", "preposition": ""}, {"id": 96, "section": "Section 1 (1級)", "word": "domesticated", "phrase": "Domesticated animals often depend on humans for food and protection.", "meaning": "家畜化された", "note": "【例文訳】\n家畜化された動物は、食料や保護を人間に頼ることが多い。", "etymology": "domus \"house\"＝家に住む", "preposition": ""}, {"id": 97, "section": "Section 1 (1級)", "word": "left-wing", "phrase": "A left-wing newspaper criticized the tax cuts as a gift to the wealthy.", "meaning": "左翼の", "note": "【例文訳】\n左派系の新聞は、その減税を富裕層への贈り物だと批判した。", "etymology": "left（左）+wing（翼）", "preposition": ""}, {"id": 98, "section": "Section 1 (1級)", "word": "ultimately", "phrase": "She struggled for years but ultimately built a company of her own.", "meaning": "最終的には", "note": "【例文訳】\n彼女は何年も苦労したが、最終的には自分の会社を築いた。", "etymology": "ulter（遠く彼方の）＋-imus（最上級）", "preposition": ""}, {"id": 99, "section": "Section 1 (1級)", "word": "initially", "phrase": "I initially rejected the idea, but it started to make sense after a few days.", "meaning": "最初は", "note": "【例文訳】\n私は最初その考えを拒んだが、数日後には筋が通っているように思え始めた。", "etymology": "in「中へ」it「行く」al「性質」＝「物事の中へ首をつっこんで始める」", "preposition": ""}, {"id": 100, "section": "Section 1 (1級)", "word": "genetically", "phrase": "The disease can be passed down genetically from parent to child.", "meaning": "遺伝的に", "note": "【例文訳】\nその病気は親から子へ遺伝的に受け継がれることがある。", "etymology": "genesis(起源)　gene(生み出す)", "preposition": ""}, {"id": 101, "section": "Section 2 (1級)", "word": "cast", "phrase": "The scandal cast doubt on the minister's promise to reform the system.", "meaning": "（疑惑などを）投げかける", "note": "【例文訳】\nそのスキャンダルは、制度を改革するという大臣の約束に疑念を投げかけた。", "etymology": "kasta \"投げる\"", "preposition": ""}, {"id": 102, "section": "Section 2 (1級)", "word": "supplement", "phrase": "She took a second job to supplement her income during graduate school.", "meaning": "補う 付録を付ける", "note": "【例文訳】\n彼女は大学院時代、収入を補うために副業をした。", "etymology": "sup「下に」ple「満たす」ment「こと」＝下（ベース）から満たしていくもの", "preposition": ""}, {"id": 103, "section": "Section 2 (1級)", "word": "outweigh", "phrase": "For many parents, the benefits of the vaccine outweigh the small risks.", "meaning": "より価値がある", "note": "【例文訳】\n多くの親にとって、そのワクチンの利益は小さなリスクを上回る。", "etymology": "out-（～の外へ）＋weigh（重さがある）", "preposition": ""}, {"id": 104, "section": "Section 2 (1級)", "word": "implant", "phrase": "The surgeon will implant a small device to control the patient's heartbeat.", "meaning": "埋め込む", "note": "【例文訳】\n外科医は患者の心拍を制御するために小さな装置を埋め込む予定だ。", "etymology": "im=中 plant=植物", "preposition": ""}, {"id": 105, "section": "Section 2 (1級)", "word": "enhance", "phrase": "Good lighting can enhance the atmosphere of a small restaurant.", "meaning": "高める（質を高める）", "note": "【例文訳】\n良い照明は小さなレストランの雰囲気を高めることができる。", "etymology": "en=にする hance = high (高い)", "preposition": ""}, {"id": 106, "section": "Section 2 (1級)", "word": "revise", "phrase": "The organization tried to revise its procedures to meet international standards.", "meaning": "改訂する 改正する", "note": "【例文訳】\nその組織は国際基準を満たすために手続きを改訂する 改正するしようとした。", "etymology": "re-（再び）＋viso（見る）", "preposition": ""}, {"id": 107, "section": "Section 2 (1級)", "word": "contend", "phrase": "Several teams will contend for the championship this season.", "meaning": "競う", "note": "【例文訳】\n今シーズンは複数のチームが優勝を争うだろう。", "etymology": "con「強意」tend「伸ばす」", "preposition": ""}, {"id": 108, "section": "Section 2 (1級)", "word": "execute", "phrase": "The team failed to execute its plan under pressure.", "meaning": "実行する 死刑にする", "note": "【例文訳】\nそのチームはプレッシャーの中で計画を実行できなかった。", "etymology": "ex（外に、最後まで)+seq hrase": "The decision seemed rudimentary at first, but the reasons became clear later.", "meaning": "基礎的な 原始的な", "note": "【例文訳】\nその決定は最初は基礎的な 原始的なように見えたが、後になって理由が明らかになった。", "etymology": "rudis（粗い）+ment(状態？）", "preposition": ""}, {"id": 2092, "section": "Section 21 (1級)", "word": "impulsive", "phrase": "The decision seemed impulsive at first, but the reasons became clear later.", "meaning": "直感的な 衝動的な", "note": "【例文訳】\nその決定は最初は直感的な 衝動的なように見えたが、後になって理由が明らかになった。", "etymology": "im-（中に）＋pello（駆り立てる）", "preposition": ""}, {"id": 2093, "section": "Section 21 (1級)", "word": "reticent", "phrase": "The decision seemed reticent at first, but the reasons became clear later.", "meaning": "無口な", "note": "【例文訳】\nその決定は最初は無口なように見えたが、後になって理由が明らかになった。", "etymology": "re- (後ろ、再び) + tacere （沈黙した）", "preposition": ""}, {"id": 2094, "section": "Section 21 (1級)", "word": "lanky", "phrase": "The story gave readers a clear example of lanky without turning it into a dry explanation.", "meaning": "背が高くて細い", "note": "【例文訳】\nその物語は、背が高くて細いを退屈な説明にせず、読者にはっきり伝わる形で示した。", "etymology": "hlanka（曲げる）", "preposition": ""}, {"id": 2095, "section": "Section 21 (1級)", "word": "succulent", "phrase": "The story gave readers a clear example of succulent without turning it into a dry explanation.", "meaning": "多汁質の", "note": "【例文訳】\nその物語は、多汁質のを退屈な説明にせず、読者にはっきり伝わる形で示した。", "etymology": "succus（ジュース・樹液）+ulentus（豊富な）", "preposition": ""}, {"id": 2096, "section": "Section 21 (1級)", "word": "paltry", "phrase": "The decision seemed paltry at first, but the reasons became clear later.", "meaning": "ごくわずかな 価値のない 卑劣な", "note": "【例文訳】\nその決定は最初はごくわずかな 価値のない 卑劣なように見えたが、後になって理由が明らかになった。", "etymology": "方言のpalt, pelt \"ゴミ\"と関連", "preposition": ""}, {"id": 2097, "section": "Section 21 (1級)", "word": "bucolic", "phrase": "The decision seemed bucolic at first, but the reasons became clear later.", "meaning": "牧歌的な 田舎の", "note": "【例文訳】\nその決定は最初は牧歌的な 田舎のように見えたが、後になって理由が明らかになった。", "etymology": "βουκóλος「牛飼い」(βου（牛)+κóλος(紳士/美しい人）)", "preposition": ""}, {"id": 2098, "section": "Section 21 (1級)", "word": "lavish", "phrase": "The decision seemed lavish at first, but the reasons became clear later.", "meaning": "ぜいたくな", "note": "【例文訳】\nその決定は最初はぜいたくなように見えたが、後になって理由が明らかになった。", "etymology": "おそらく古フランス語 lavasse (“土砂降り”)\n又は中英語 laven (“溢れ出す”)より", "preposition": ""}, {"id": 2099, "section": "Section 21 (1級)", "word": "exponential", "phrase": "The decision seemed exponential at first, but the reasons became clear later.", "meaning": "急激な 幾何級数的な", "note": "【例文訳】\nその決定は最初は急激な 幾何級数的なように見えたが、後になって理由が明らかになった。", "etymology": "基数の外側に（ex-）置い（pono）てある（-ens）", "preposition": ""}, {"id": 2100, "section": "Section 21 (1級)", "word": "irreparably", "phrase": "She irreparably agreed to help, but later realized the task was far more complicated.", "meaning": "修復できないほど", "note": "【例文訳】\n彼女は修復できないほど手伝うことに同意したが、後になってその作業がはるかに複雑だと気づいた。", "etymology": "in=否定 repair=修理する able=できる repair（ re再びparare準備する）", "preposition": ""}, {"id": 2101, "section": "Section 22 (1級)", "word": "abide by", "phrase": "When the meeting got tense, she used the phrase abide by in a way that everyone immediately understood.", "meaning": "規則などに従う", "note": "【例文訳】\n会議が緊迫した時、彼女は「abide by」という表現を誰もがすぐ理解できる形で使った。", "etymology": "【語源補足】熟語・句動詞。中心動詞と前置詞・副詞のイメージを組み合わせて覚える。", "preposition": "by は『そば』から『手段・行為者・期限』へ広がる。"}, {"id": 2102, "section": "Section 22 (1級)", "word": "act up", "phrase": "My old laptop always starts to act up whenever I have an important deadline.", "meaning": "興奮して暴れる,機械などが異常に作動する", "note": "【例文訳】\n大事な締め切りがある時に限って、私の古いノートパソコンはいつも調子が悪くなり始める。", "etymology": "【語源補足】熟語・句動詞。中心動詞と前置詞・副詞のイメージを組み合わせて覚える。", "preposition": "up は『上へ』から『増加・完成・出現』へ広がる。"}, {"id": 2103, "section": "Section 22 (1級)", "word": "add up to", "phrase": "When the meeting got tense, she used the phrase add up to in a way that everyone immediately understood.", "meaning": "結局〜になる、〜につながる", "note": "【例文訳】\n会議が緊迫した時、彼女は「add up to」という表現を誰もがすぐ理解できる形で使った。", "etymology": "【語源補足】熟語・句動詞。中         // --- タイトルの自動動的セット設定 ---
        const pageTitle = document.title || "英単語ハックマスター";

        // --- ホーム画面の描画 ---
        function renderHome() {
            domScreenQuiz.classList.add('hidden');
            domScreenHome.classList.remove('hidden');

            const totalWords = MASTER_DATA.length;
            const clearedWords = clearedList.filter(id => MASTER_DATA.some(m => m.id === id)).length;
            const totalPercent = totalWords > 0 ? Math.round((clearedWords / totalWords) * 100) : 0;
            
            domTotalProgressPercent.textContent = `${totalPercent}%`;
            domTotalProgressBar.style.width = `${totalPercent}%`;
            domTotalProgressCount.textContent = `完遂済み: ${clearedWords} / ${totalWords} 語`;

            const sections = [...new Set(MASTER_DATA.map(item => item.section))];
            domSectionList.innerHTML = '';

            sections.forEach(secName => {
                const secItems = MASTER_DATA.filter(item => item.section === secName);
                const secCleared = secItems.filter(item => clearedList.includes(item.id)).length;
                const secPercent = Math.round((secCleared / secItems.length) * 100);
                const isCompleted = secCleared === secItems.length;

                const div = document.createElement('div');
                div.className = `glass-card p-3.5 rounded-xl border flex flex-col justify-between items-stretch space-y-2 transition-all ${isCompleted ? 'border-emerald-500/30 bg-emerald-950/10' : 'border-slate-800 hover:border-slate-700'}`;

        // --- クイズセッションの開始 ---
        function startSession(sectionName) {
            let targetItems = MASTER_DATA.filter(item => item.section === sectionName);
            currentDeck = targetItems.filter(item => !clearedList.includes(item.id));

            if (currentDeck.length === 0) {
                currentDeck = [...targetItems];
            }

            // ランダムシャッフル
            currentDeck.sort(() => Math.random() - 0.5);

            initialUniqueCount = currentDeck.length; 
            currentIndex = 0;
            comboCount = 0;

            updateComboUI();
            
            domScreenHome.classList.add('hidden');
            domScreenQuiz.classList.remove('hidden');
            
            showQuestion();
        }

        // --- 問題の提示 ---

        // --- 穴あき表示ヘルパー（熟語・be動詞・過去形/三単現にも対応） ---
        function escapeRegExp(str) {
            return str.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
        }

        function escapeHtml(str) {
            return String(str)
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;')
                .replace(/'/g, '&#39;');
        }

        function normalizeTargetExpression(targetWord) {
            return String(targetWord || "")
                .replace(/[~〜]/g, " ")
                .replace(/…/g, " ")
                .replace(/[（）]/g, " ")
                .replace(/\([^)]*\)/g, " ")
                .replace(/\[[^\]]*\]/g, " ")
                .replace(/[･・]/g, " ")
                .replace(/\s+/g, " ")
                .trim();
        }

                "break": ["break", "breaks", "broke", "broken", "breaking"],
                "bring": ["bring", "brings", "brought", "bringing"],
                "buy": ["buy", "buys", "bought", "buying"],
                "catch": ["catch", "catches", "caught", "catching"],
                "choose": ["choose", "chooses", "chose", "chosen", "choosing"],
                "feel": ["feel", "feels", "felt", "feeling"],
                "find": ["find", "finds", "found", "finding"],
                "keep": ["keep", "keeps", "kept", "keeping"],
                "know": ["know", "knows", "knew", "known", "knowing"],
                "leave": ["leave", "leaves", "left", "leaving"],
                "lose": ["lose", "loses", "lost", "losing"],
                "pay": ["pay", "pays", "paid", "paying"],
                "put": ["put", "puts", "putting"],
                "read": ["read", "reads", "reading"],
                "see": ["see", "sees", "saw", "seen", "seeing"],
                "send": ["send", "sends", "sent", "sending"],
                "set": ["set", "sets", "setting"],
                "sit": ["sit", "sits", "sat", "sitting"],
                "stand": ["stand", "stands", "stood", "standing"],
                "teach": ["teach", "teaches", "taught", "teaching"],
                "tell": ["tell", "tells", "told", "telling"],
                "think": ["think", "thinks", "thought", "thinking"],
                "understand": ["understand", "understands", "understood", "understanding"]
            };

            const b = String(base || "").toLowerCase();
            if (irregulars[b]) return irregulars[b];

            const forms = new Set([b]);
            if (b.endsWith("e")) {
                forms.add(b + "s");
                forms.add(b.slice(0, -1) + "ed");
                forms.add(b.slice(0, -1) + "ing");
            } else if (b.endsWith("y") && !/[aeiou]y$/.test(b)) {
                forms.add(b.slice(0, -1) + "ies");
                forms.add(b.slice(0, -1) + "ied");
                forms.add(b + "ing");
            } else {
                forms.add(b + "s");
                forms.add(b + "ed");
                forms.add(b + "ing");
            }
            return Array.from(forms);
        }

        function buildTargetRegex(targetWord) {
            const normalized = normalizeTargetExpression(targetWord);
            if (!normalized) return null;

            const candidates = new Set([normalized]);

            if (/^be\s+/i.test(normalized)) {
                candidates.add(normalized.replace(/^be\s+/i, ""));
            }

            const cleaned = normalized
                .replace(/\b[A-Z]\b/g, " ")
                .replace(/\s+/g, " ")
                .trim();
            if (cleaned) candidates.add(cleaned);

            const patterns = [];

            candidates.forEach(candidate => {
                const words = candidate.split(/\s+/).filter(Boolean);
                if (words.length === 0) return;

                const first = words[0].toLowerCase();

                if (first === "be" && words.length >= 2) {
                    const rest = words.slice(1).map(escapeRegExp).join("\\s+");
                    patterns.push(`\\b(?:${getVerbForms("be").map(escapeRegExp).join("|")})\\s+${rest}\\b`);
                    return;
                }

                const firstPattern = `(?:${getVerbForms(first).map(escapeRegExp).join("|")})`;
                const restPattern = words.slice(1).map(escapeRegExp).join("\\s+");

                if (words.length >= 2) {
                    patterns.push(`\\b${firstPattern}\\s+${restPattern}\\b`);
                    patterns.push(`\\b${words.map(escapeRegExp).join("\\s+")}\\b`);
                } else {
                    patterns.push(`\\b${firstPattern}\\b`);
                    patterns.push(`\\b${escapeRegExp(words[0])}[a-z]*\\b`);
                }
            });

            const uniquePatterns = Array.from(new Set(patterns)).sort((a, b) => b.length - a.length);
            if (uniquePatterns.length === 0) return null;
            return new RegExp(uniquePatterns.join("|"), "gi");
        }

        function renderMaskedPhrase(rawPhrase, targetWord, reveal = false) {
            const regex = buildTargetRegex(targetWord);
            const safePhrase = escapeHtml(rawPhrase);

            if (!regex) return safePhrase;

            let matched = false;
            const rendered = safePhrase.replace(regex, (match) => {
                matched = true;
                if (reveal) {
                    return `<span class="text-rose-500 underline font-black font-mono">${match}</span>`;
                }
                return "_____";
            });

            if (!matched) {
                const simpleTarget = normalizeTargetExpression(targetWord);
                if (simpleTarget) {
                    const simpleRegex = new RegExp(escapeRegExp(simpleTarget), "gi");
                    return safePhrase.replace(simpleRegex, reveal
                        ? (match) => `<span class="text-rose-500 underline font-black font-mono">${match}</span>`
                        : "_____");
                }
            }

            return rendered;
        }


        function showQuestion() {
            if (currentDeck.length === 0 || currentIndex >= currentDeck.length) {
                alert("🎉 セクション内のすべての問題をクリアしました！完璧なコンプリートです！");
                exitQuiz();
                return;
            }

            domQuizAnswerZone.classList.add('invisible');
            domQuizChoicePad.classList.add('hidden');
            domBtnReveal.classList.remove('hidden');

            const currentQuestion = currentDeck[currentIndex];

            // 画面上の残り問題数カウンターをリアルタイム動的表示
            domQuizCount.textContent = currentDeck.length - currentIndex;
            
            const progressPercent = initialUniqueCount > 0 ? (currentIndex / currentDeck.length) * 100 : 0;
            domQuizProgressBar.style.width = `${progressPercent}%`;
            domQuizSectionTitle.textContent = currentQuestion.section;

            domQuizHintMeaning.textContent = currentQuestion.meaning;
            domQuizBoostEtymology.textContent = currentQuestion.etymology || "語源データ最適化済";
            domQuizBoostPreposition.textContent = currentQuestion.note || "（補足なし）";
            domQuizCorrectWord.textContent = currentQuestion.word;

            // ターゲット単語・熟語を隠して「_____」に変える
            // take up ~ → take/takes/took/taken/taking up、be tired of → is/was/are tired of などにも対応
            domQuizPhrase.innerHTML = renderMaskedPhrase(currentQuestion.phrase, currentQuestion.word, false);
        }

        // --- 答えを見る ---
        function revealAnswer() {
            domBtnReveal.classList.add('hidden');
            domQuizChoicePad.classList.remove('hidden');
            domQuizAnswerZone.classList.remove('invisible');

            const currentQuestion = currentDeck[currentIndex];
            domQuizPhrase.innerHTML = renderMaskedPhrase(currentQuestion.phrase, currentQuestion.word, true);

            // ネイティブ発音を即座に自動再生
            speak(currentQuestion.word, 1.0);
        }

        // --- 仕分けシステム（ゲーム作成プロのオートローテーション） ---
        function handleUserJudgment(isCorrect) {
            const currentQuestion = currentDeck[currentIndex];

            if (isCorrect) {
                // 覚えた（クリア）なら保存してリストから除外していく
                if (!clearedList.includes(currentQuestion.id)) {
                    clearedList.push(currentQuestion.id);
                    localStorage.setItem(storageKey, JSON.stringify(clearedList));
                }
                comboCount++;
                updateComboUI();
                currentIndex++;
            } else {
                // もう一度（復習）なら、現在のデッキの最後尾にガサッと回す（無限ローテーション）
                comboCount = 0; 
                updateComboUI();

                currentDeck.push(currentQuestion);
                currentIndex++;
            }

            showQuestion();
        }

        function updateComboUI() {
            if (comboCount >= 3) {
                domQuizComboBadge.classList.remove('opacity-0');
                domQuizComboCount.textContent = comboCount;
                domHeaderCombo.classList.remove('hidden');
                domHeaderComboCount.textContent = comboCount;
            } else {
                domQuizComboBadge.classList.add('opacity-0');
                domHeaderCombo.classList.add('hidden');
            }
        }

        function exitQuiz() {
            renderHome();
        }

        function resetSectionProgress(sectionName) {
            if (confirm(`${sectionName} のクリア記録をリセットして未着手に戻しますか？`)) {
                const targetIds = MASTER_DATA.filter(item => item.section === sectionName).map(item => item.id);
                clearedList = clearedList.filter(id => !targetIds.includes(id));
                localStorage.setItem(storageKey, JSON.stringify(clearedList));
                renderHome();
            }
        }

        domBtnResetAll.addEventListener('click', () => {
            if (confirm("すべての進捗データを完全に消去し、初期状態に戻しますか？")) {
                clearedList = [];
                localStorage.removeItem(storageKey);
                renderHome();
            }
        });

        function speak(text, speed = 1.0) {
            if ('speechSynthesis' in window) {
                window.speechSynthesis.cancel();
                let cleanText = text.replace(/_____/g, "blank");
                const utterance = new SpeechSynthesisUtterance(cleanText);
                utterance.lang = 'en-US';
                utterance.rate = speed;
                window.speechSynthesis.speak(utterance);
            }
        }

        // イベントリスナー
        domBtnReveal.addEventListener('click', revealAnswer);
        domBtnCorrect.addEventListener('click', () => handleUserJudgment(true));
        domBtnWrong.addEventListener('click', () => handleUserJudgment(false));
        domBtnBack.addEventListener('click', () => {
            if (confirm("ホームに戻りますか？現在のセッション状態は一度リセットされます。")) { exitQuiz(); }
        });
        domBtnSpeakWord.addEventListener('click', () => { speak(currentDeck[currentIndex - 1]?.word || currentDeck[currentIndex].word, 1.0); });
        domBtnSpeakPhrase.addEventListener('click', () => { speak(currentDeck[currentIndex - 1]?.phrase || currentDeck[currentIndex].phrase, 0.95); });

        // 初期実行
        renderHome();
    </script>
</body>
