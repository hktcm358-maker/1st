":2209,"section":"Section 23 (1級)","word":"gain on","phrase":"The runner began to gain on the leader.","meaning":"追いつく","note":"【例文訳】そのランナーは先頭に追いつき始めた。","etymology":"【語源イメージ】gain on：距離を“縮めて追いつく”","preposition":"on は『上』より『くっついている/接触/継続』。依存・継続・作動中の感覚に広がる。"},{"id":2210,"section":"Section 23 (1級)","word":"gang up on","phrase":"The kids ganged up on their classmate.","meaning":"集団で攻撃する","note":"【例文訳】子どもたちは同級生に集団で攻撃した。","etymology":"【語源イメージ】gang up on：集団が“1人に向かう”","preposition":"on は『上』より『くっついている/接触/継続』。依存・継続・作動中の感覚に広がる。 / up は『上へ』から『増加・完成・出現』へ広がる。"},{"id":2211,"section":"Section 23 (1級)","word":"get A across to B","phrase":"I tried to get my idea across to the team.","meaning":"AをBに理解させる","note":"【例文訳】私は自分の考えをチームに伝えようとした。","etymology":"【語源イメージ】get across：橋を“渡す＝伝える”","preposition":"across は『横切って向こう側へ』。"},{"id":2212,"section":"Section 23 (1級)","word":"glance off","phrase":"The ball glanced off the wall and changed direction.","meaning":"かすめる","note":"【例文訳】ボールは壁に当たって方向を変えた。","etymology":"【語源イメージ】glance off：軽く“当たってそれる”","preposition":"off は『離れる』。接触・予定・作動状態から離す。"},{"id":2213,"section":"Section 23 (1級)","word":"gloss over","phrase":"The report glossed over important details.","meaning":"取り繕う","note":"【例文訳】その報告書は重要な詳細を曖昧にした。","etymology":"【語源イメージ】gloss over：光沢で“表面をなめらかにして隠す”","preposition":"over は『上を覆う/越える』。支配・終了・過剰にもつながる。"},{"id":2214,"section":"Section 23 (1級)","word":"grope for","phrase":"She groped for the right words to say.","meaning":"手探りで捜す","note":"【例文訳】彼女は言うべき適切な言葉を探した。","etymology":"【語源イメージ】grope for：暗闇で“手探りする”","preposition":"for は『向かう先・目的・交換』。何のために向いているかを見る。"},{"id":2215,"section":"Section 23 (1級)","word":"hail A as B","phrase":"They hailed her as a hero after the rescue.","meaning":"AをBとして迎え入れる","note":"【例文訳】救助後、彼らは彼女を英雄として称えた。","etymology":"【語源イメージ】hail as：歓声で“迎える”","preposition":"熟語は『動詞の核』＋『前置詞/副詞の空間イメージ』で覚えると、丸暗記より崩れにくい。"},{"id":2216,"section":"Section 23 (1級)","word":"hammer out","phrase":"The two sides hammered out an agreement.","meaning":"案出する","note":"【例文訳】両者は協定を苦労してまとめ上げた。","etymology":"【語源イメージ】hammer out：ハンマーで“叩いて形にする”","preposition":"out は『外へ』。隠れたものが外に出て見える/尽きる/実行される。"},{"id":2217,"section":"Section 23 (1級)","word":"hang out in","phrase":"We used to hang out in that café after school.","meaning":"ぶらぶらして時を過ごす","note":"【例文訳】私たちは放課後よくあのカフェで時間を過ごした。","etymology":"【語源イメージ】hang out：ぶらりと“時間を過ごす”","preposition":"in は『広い』ではなく『中に入っている/範囲内』。時間・状態・言語も容器のように捉える。 / out は『外へ』。隠れたものが外に出て見える/尽きる/実行される。"},{"id":2218,"section":"Section 23 (1級)","word":"harp on","phrase":"He kept harping on the same complaint.","meaning":"繰り返し話す","note":"【例文訳】彼は同じ不満をしつこく繰り返した。","etymology":"【語源イメージ】harp on：同じ弦を“何度も弾く＝しつこく言う”","preposition":"on は『上』より『くっついている/接触/継続』。依存・継続・作動中の感覚に広がる。"},{"id":2219,"section":"Section 23 (1級)","word":"have it out with","phrase":"She finally had it out with her coworker.","meaning":"議論して決着をつける","note":"【例文訳】彼女はついに同僚と話し合いで決着をつけた。","etymology":"【語源イメージ】have it out：問題を“外へ出して決着”","preposition":"out は『外へ』。隠れたものが外に出て見える/尽きる/実行される。 / with は『一緒に/伴って』。道具・相手・付帯状況を表す。"},{"id":2220,"section":"Section 23 (1級)","word":"head off","phrase":"We need to head off the problem before it grows.","meaning":"食い止める","note":"【例文訳】問題が大きくなる前に食い止める必要がある。","etymology":"【語源イメージ】head off：頭で“進路を塞ぐ＝阻止”","preposition":"off は『離れる』。接触・予定・作動状態から離す。"},{"id":2221,"section":"Section 23 (1級)","word":"hem in","phrase":"Tall buildings hem in the small park.","meaning":"囲む","note":"【例文訳】高い建物がその小さな公園を囲い込んでいた。","etymology":"【語源イメージ】hem in：布の“縁で囲む”","preposition":"in は『広い』ではなく『中に入っている/範囲内』。時間・状態・言語も容器のように捉える。"},{"id":2222,"section":"Section 23 (1級)","word":"hike up","phrase":"They hiked up the prices last month.","meaning":"引き上げる","note":"【例文訳】彼らは先月、価格を引き上げた。","etymology":"【語源イメージ】hike up：ぐっと“引き上げる”","preposition":"up は『上へ』から『増加・完成・出現』へ広がる。"},{"id":2223,"section":"Section 23 (1級)","word":"hinge on","phrase":"The success of the plan hinges on funding.","meaning":"次第である","note":"【例文訳】その計画の成功は資金にかかっている。","etymology":"【語源イメージ】hinge on：蝶番が“支点になる”","preposition":"on は『上』より『くっついている/接触/継続』。依存・継続・作動中の感覚に広がる。"},{"id":2224,"section":"Section 23 (1級)","word":"hit it off with","phrase":"She hit it off with her new coworkers immediately.","meaning":"馬が合う","note":"【例文訳】彼女は新しい同僚たちとすぐに打ち解けた。","etymology":"【語源イメージ】hit it off：気が“当たって合う”","preposition":"off は『離れる』。接触・予定・作動状態から離す。 / with は『一緒に/伴って』。道具・相手・付帯状況を表す。"},{"id":2225,"section":"Section 23 (1級)","word":"hit the roof","phrase":"He hit the roof when he heard the news.","meaning":"激怒する","note":"【例文訳】彼はその知らせを聞いて激怒した。","etymology":"【語源イメージ】hit the roof：怒りが“屋根まで跳ね上がる”","preposition":"熟語は『動詞の核』＋『前置詞/副詞の空間イメージ』で覚えると、丸暗記より崩れにくい。"},{"id":2226,"section":"Section 23 (1級)","word":"hold down","phrase":"She managed to hold down two jobs at once.","meaning":"食、地位などに就いている","note":"【例文訳】彼女は同時に2つの仕事をこなした。","etymology":"【語源イメージ】hold down：押さえて“維持する”","preposition":"down は『下へ』から『低下・記録・鎮静・故障』へ広がる。"},{"id":2227,"section":"Section 23 (1級)","word":"hold out for","phrase":"They decided to hold out for a better offer.","meaning":"要求して譲らない","note":"【例文訳】彼らはより良い提案を求めて妥協しなかった。","etymology":"【語源イメージ】hold out for：手を“伸ばして要求する”","preposition":"for は『向かう先・目的・交換』。何のために向いているかを見る。 / out は『外へ』。隠れたものが外に出て見える/尽きる/実行される。"},{"id":2228,"section":"Section 23 (1級)","word":"hold over","phrase":"The meeting was held over until next week.","meaning":"延期する","note":"【例文訳】会議は来週まで延期された。","etymology":"【語源イメージ】hold over：予定を“持ち越す”","preposition":"over は『上を覆う/越える』。支配・終了・過剰にもつながる。"},{"id":2229,"section":"Section 23 (1級)","word":"hole up","phrase":"They holed up in a cabin during the storm.","meaning":"隠れる","note":"【例文訳】彼らは嵐の間、小屋に閉じこもった。","etymology":"【語源イメージ】hole up：穴に“隠れる”","preposition":"up は『上へ』から『増加・完成・出現』へ広がる。"},{"id":2230,"section":"Section 23 (1級)","word":"horse around","phrase":"The kids were horsing around in the yard.","meaning":"ばか騒ぎをする","note":"【例文訳】子どもたちは庭でふざけ回っていた。","etymology":"【語源イメージ】horse around：馬のように“騒ぐ”","preposition":"around は『周辺をぐるり』。"},{"id":2231,"section":"Section 23 (1級)","word":"huddle with","phrase":"She huddled with her team to discuss the strategy.","meaning":"相談する、密談する","note":"【例文訳】彼女は戦略を話し合うためチームと寄り集まった。","etymology":"【語源イメージ】huddle：体を“寄せ合う”","preposition":"with は『一緒に/伴って』。道具・相手・付帯状況を表す。"},{"id":2232,"section":"Section 23 (1級)","word":"hunker down","phrase":"We need to hunker down and finish this work.","meaning":"身を潜める","note":"【例文訳】私たちは腰を据えてこの仕事を終わらせる必要がある。","etymology":"【語源イメージ】hunker down：体を“低くして構える”","preposition":"down は『下へ』から『低下・記録・鎮静・故障』へ広がる。"},{"id":2233,"section":"Section 23 (1級)","word":"identify with","phrase":"He identifies with characters who struggle.","meaning":"共感する","note":"【例文訳】彼は苦労する登場人物に共感する。","etymology":"【語源イメージ】identify with：自分を“同一視する”","preposition":"with は『一緒に/伴って』。道具・相手・付帯状況を表す。"},{"id":2234,"section":"Section 23 (1級)","word":"impose on","phrase":"I don’t want to impose on your kindness.","meaning":"押しかける、つけ込む","note":"【例文訳】あなたの親切に甘えたくない。","etymology":"【語源イメージ】impose on：負担を“上に置く”","preposition":"on は『上』より『くっついている/接触/継続』。依存・継続・作動中の感覚に広がる。"},{"id":2235,"section":"Section 23 (1級)","word":"intercede with","phrase":"She interceded with the manager on his behalf.","meaning":"とり成す","note":"【例文訳】彼女は彼のためにマネージャーに仲裁を頼んだ。","etymology":"【語源イメージ】intercede：間に“入って頼む”","preposition":"with は『一緒に/伴って』。道具・相手・付帯状況を表す。"},{"id":2236,"section":"Section 23 (1級)","word":"interfere with","phrase":"Noise from outside interfered with my concentration.","meaning":"〜を妨げる、〜に干渉する","note":"【例文訳】外の騒音が私の集中を妨げた。","etymology":"【語源イメージ】interfere：間に“入って邪魔する”","preposition":"with は『一緒に/伴って』。道具・相手・付帯状況を表す。"},{"id":2237,"section":"Section 23 (1級)","word":"iron out","phrase":"They tried to iron out the remaining issues.","meaning":"解決する","note":"【例文訳】彼らは残りの問題を解決しようとした。","etymology":"【語源イメージ】iron out：アイロンで“しわを伸ばす”","preposition":"out は『外へ』。隠れたものが外に出て見える/尽きる/実行される。"},{"id":2238,"section":"Section 23 (1級)","word":"jack up","phrase":"The store jacked up the price of the product.","meaning":"価格を引き上げる","note":"【例文訳】店はその商品の価格を大幅に引き上げた。","etymology":"【語源イメージ】jack up：ジャッキで“持ち上げる”","preposition":"up は『上へ』から『増加・完成・出現』へ広がる。"},{"id":2239,"section":"Section 23 (1級)","word":"keep after","phrase":"She kept after him to finish his homework.","meaning":"催促し続ける","note":"【例文訳】彼女は彼に宿題を終わらせるようしつこく言い続けた。","etymology":"【語源イメージ】keep after：後ろから“追い続ける”","preposition":"after は『後を追う』。時間だけでなく追跡・世話にもつながる。"},{"id":2240,"section":"Section 23 (1級)","word":"kick up","phrase":"Dust began to kick up as the wind blew.","meaning":"騒ぎなどを引き起こす、ほこりなどをけ立てる","note":"【例文訳】風が吹くとほこりが舞い上がり始めた。","etymology":"【語源イメージ】kick up：蹴って“舞い上げる”","preposition":"up は『上へ』から『増加・完成・出現』へ広がる。"},{"id":2241,"section":"Section 23 (1級)","word":"knuckle down","phrase":"We need to knuckle down and finish the assignment.","meaning":"真剣に取り組む","note":"【例文訳】私たちは本腰を入れて課題を終わらせる必要がある。","etymology":"【語源イメージ】knuckle down：拳を“机につけて取り組む”","preposition":"down は『下へ』から『低下・記録・鎮静・故障』へ広がる。"},{"id":2242,"section":"Section 23 (1級)","word":"knuckle under","phrase":"He finally knuckled under to the pressure.","meaning":"屈服する","note":"【例文訳】彼はついにその圧力に屈した。","etymology":"【語源イメージ】knuckle under：拳を“下げて屈する”","preposition":"under は『下に/支配下』。"},{"id":2243,"section":"Section 23 (1級)","word":"lag behind","phrase":"The slower students lagged behind the rest of the class.","meaning":"後れを取る","note":"【例文訳】遅い生徒たちはクラスの他の人より遅れた。","etymology":"【語源イメージ】lag behind：後ろに“垂れ下がる＝遅れる”","preposition":"熟語は『動詞の核』＋『前置詞/副詞の空間イメージ』で覚えると、丸暗記より崩れにくい。"},{"id":2244,"section":"Section 23 (1級)","word":"lash out at","phrase":"She suddenly lashed out at him in anger.","meaning":"痛烈に非難する","note":"【例文訳】彼女は怒って突然彼に食ってかかった。","etymology":"【語源イメージ】lash out：むちが“しなる＝攻撃する”","preposition":"at は『点』。場所・時刻・狙いを一点として見る。 / out は『外へ』。隠れたものが外に出て見える/尽きる/実行される。"},{"id":2245,"section":"Section 23 (1級)","word":"launch into","phrase":"He launched into a long explanation.","meaning":"〜を始める","note":"【例文訳】彼は長い説明を始めた。","etymology":"【語源イメージ】launch into：船を“出す＝始める”","preposition":"into は『中へ入り込む/変化して〜になる』。"},{"id":2246,"section":"Section 23 (1級)","word":"lay it on thick","phrase":"She really laid it on thick when praising him.","meaning":"大げさに言う","note":"【例文訳】彼女は彼を褒めるとき本当に大げさだった。","etymology":"【語源イメージ】lay it on thick：厚く“塗る＝大げさに言う”","preposition":"on は『上』より『くっついている/接触/継続』。依存・継続・作動中の感覚に広がる。"},{"id":2247,"section":"Section 23 (1級)","word":"leaf through","phrase":"He leafed through the magazine while waiting.","meaning":"ぱらぱらめくって目を通す","note":"【例文訳】彼は待ちながら雑誌をぱらぱらとめくった。","etymology":"【語源イメージ】leaf through：葉を“めくるように読む”","preposition":"through は『通り抜ける』。過程を最後まで抜ける感覚。"},{"id":2248,"section":"Section 23 (1級)","word":"lean on","phrase":"You can lean on me if you need help.","meaning":"圧力をかける","note":"【例文訳】助けが必要なら私を頼っていい。","etymology":"【語源イメージ】lean on：体重を“預ける＝頼る”","preposition":"on は『上』より『くっついている/接触/継続』。依存・継続・作動中の感覚に広がる。"},{"id":2249,"section":"Section 23 (1級)","word":"let down","phrase":"I didn’t mean to let you down.","meaning":"失望させる","note":"【例文訳】あなたを失望させるつもりはなかった。","etymology":"【語源イメージ】let down：下に“落とす＝失望させる”","preposition":"down は『下へ』から『低下・記録・鎮静・故障』へ広がる。"},{"id":2250,"section":"Section 23 (1級)","word":"level off","phrase":"Sales began to level off after the holiday season.","meaning":"横ばいになる","note":"【例文訳】売上は休暇シーズン後に横ばいになり始めた。","etymology":"【語源イメージ】level off：水平に“整う”","preposition":"off は『離れる』。接触・予定・作動状態から離す。"},{"id":2251,"section":"Section 23 (1級)","word":"level with","phrase":"Let me level with you about the situation.","meaning":"率直に言う","note":"【例文訳】状況について正直に話すね。","etymology":"【語源イメージ】level with：同じ“高さで話す＝正直に言う”","preposition":"with は『一緒に/伴って』。道具・相手・付帯状況を表す。"},{"id":2252,"section":"Section 23 (1級)","word":"live down","phrase":"He could never live down the embarrassing incident.","meaning":"失敗を人に忘れさせる、悲しみなどを忘れ去る","note":"【例文訳】彼はその恥ずかしい出来事を一生忘れられなかった。","etymology":"【語源イメージ】live down：時間が“下へ沈める＝忘れさせる”","preposition":"down は『下へ』から『低下・記録・鎮静・故障』へ広がる。"},{"id":2253,"section":"Section 23 (1級)","word":"lop off","phrase":"They lopped off the dead branches.","meaning":"切り取る","note":"【例文訳】彼らは枯れた枝を切り落とした。","etymology":"【語源イメージ】lop off：枝を“切り落とす”","preposition":"off は『離れる』。接触・予定・作動状態から離す。"},{"id":2254,"secti er plan.","meaning":"選ぶ","note":"【例文訳】彼らはより安いプランを選んだ。","etymology":"【語源イメージ】opt for：選択肢を“選ぶ”","preposition":"for は『向かう先・目的・交換』。何のために向いているかを見る。"},{"id":2270,"section":"Section 23 (1級)","word":"own up to","phrase":"He finally owned up to his mistake.","meaning":"白状する","note":"【例文訳】彼はついに自分の過ちを認めた。","etymology":"【語源イメージ】own up：自分のものとして“認める”","preposition":"to は『到達点へ向かう』。方向だけでなく、結果・相手への到達も表す。 / up は『上へ』から『増加・完成・出現』へ広がる。"},{"id":2271,"section":"Section 23 (1級)","word":"pack off","phrase":"They packed him off to boarding school.","meaning":"送り出す","note":"【例文訳】彼らは彼を寄宿学校へ送り出した。","etymology":"【語源イメージ】pack off：荷物のように“送り出す”","preposition":"off は『離れる』。接触・予定・作動状態から離す。"},{"id":2272,"section":"Section 23 (1級)","word":"palm A off on B","phrase":"She palmed the broken device off on her coworker.","meaning":"AをBにだまして押し付ける","note":"【例文訳】彼女は壊れた機器を同僚に押しつけた。","etymology":"【語源イメージ】palm off：手のひらで“押しつける”","preposition":"on は『上』より『くっついている/接触/継続』。依存・継続・作動中の感覚に広がる。 / off は『離れる』。接触・予定・作動状態から離す。"},{"id":2273,"section":"Section 23 (1級)","word":"pan out","phrase":"Things didn’t pan out as expected.","meaning":"成功する","note":"【例文訳】物事は期待どおりには進まなかった。","etymology":"【語源イメージ】pan out：金を“ふるいにかける＝結果が出る”","preposition":"out は『外へ』。隠れたものが外に出て見える/尽きる/実行される。"},{"id":2274,"section":"Section 23 (1級)","word":"paper over","phrase":"They tried to paper over the disagreement.","meaning":"取り繕う","note":"【例文訳】彼らはその対立を表面上取り繕おうとした。","etymology":"【語源イメージ】paper over：紙で“覆って隠す”","preposition":"over は『上を覆う/越える』。支配・終了・過剰にもつながる。"},{"id":2275,"section":"Section 23 (1級)","word":"parcel out","phrase":"The land was parceled out among the family.","meaning":"分配する、分け与える","note":"【例文訳】その土地は家族の間で分配された。","etymology":"【語源イメージ】parcel out：小包のように“分ける”","preposition":"out は『外へ』。隠れたものが外に出て見える/尽きる/実行される。"},{"id":2276,"section":"Section 23 (1級)","word":"pass down","phrase":"The tradition was passed down for generations.","meaning":"後世に伝える","note":"【例文訳】その伝統は何世代にもわたり受け継がれた。","etymology":"【語源イメージ】pass down：下へ“受け継ぐ”","preposition":"down は『下へ』から『低下・記録 tion":"Section 24 (1級)","word":"soak up","phrase":"The plants soaked up the sunlight.","meaning":"雰囲気などを楽しむ、知識などを没収する","note":"【例文訳】植物は太陽の光を吸収した。","etymology":"【語源イメージ】soak up：吸って“満たす”","preposition":"up は『上へ』から『増加・完成・出現』へ広がる。"},{"id":2339,"section":"Section 24 (1級)","word":"sort out","phrase":"We need to sort out these documents.","meaning":"整理する","note":"【例文訳】これらの書類を整理する必要がある。","etymology":"【語源イメージ】sort out：種類ごとに“仕分ける”","preposition":"out は『外へ』。隠れたものが外に出て見える/尽きる/実行される。"},{"id":2340,"section":"Section 24 (1級)","word":"sound A out on B","phrase":"I want to sound him out on his opinion.","meaning":"BについてAの意向を打診する","note":"【例文訳】彼の意見を探りたい。","etymology":"【語源イメージ】sound out：音を“出して探る＝意見を探る”","preposition":"on は『上』より『くっついている/接触/継続』。依存・継続・作動中の感覚に広がる。 / out は『外へ』。隠れたものが外に出て見える/尽きる/実行される。"},{"id":2341,"section":"Section 24 (1級)","word":"sound off","phrase":"He sounded off about the unfair rules.","meaning":"まくし立てる","note":"【例文訳】彼は不公平な規則について大声で不満を述べた。","etymology":"【語源イメージ】sound off：音を“鳴らす＝大声で言う”","preposition":"off は『離れる』。接触・予定・作動状態から離す。"},{"id":2342,"section":"Section 24 (1級)","word":"spin off","phrase":"The company plans to spin off its tech division.","meaning":"副産物として生み出す、会社、資産などを分離独立させる","note":"【例文訳】会社は技術部門を分離して新会社にする予定だ。","etymology":"【語源イメージ】spin off：回転して“分離する”","preposition":"off は『離れる』。接触・予定・作動状態から離す。"},{"id":2343,"section":"Section 24 (1級)","word":"spoil for","phrase":"She was spoiling for a fight.","meaning":"しきりに求める","note":"【例文訳】彼女は喧嘩したくてうずうずしていた。","etymology":"【語源イメージ】spoil for：戦いを“求めてうずうず”","preposition":"for は『向かう先・目的・交換』。何のために向いているかを見る。"},{"id":2344,"section":"Section 24 (1級)","word":"sponge off","phrase":"He kept sponging off his generous friends.","meaning":"親のすねをかじる、スポンジでふき取る","note":"【例文訳】彼は寛大な友人たちにたかり続けた。","etymology":"【語源イメージ】sponge off：スポンジのように“吸い取る＝たかる”","preposition":"off は『離れる』。接触・予定・作動状態から離す。"},{"id":2345,"section":"Section 24 (1級)","word":"spring up","phrase":"New shops began to spring up around the station.","meaning":"急に起こる、表れる","note":"【例文訳】駅周辺に新しい店が次々と現れ始めた。","etymology":"【語源イメージ】spring up：バネのように“突然現れる”","preposition":"up＝下からぱっと出る。急に現れる・生じる。"},{"id":2346,"section":"Section 24 (1級)","word":"spur on","phrase":"Her words spurred him on to continue.","meaning":"奮い立たせる","note":"【例文訳】彼女の言葉は彼を奮い立たせた。","etymology":"【語源イメージ】spur on：拍車で“刺激して進ませる”","preposition":"on は『上』より『くっついている/接触/継続』。依存・継続・作動中の感覚に広がる。"},{"id":2347,"section":"Section 24 (1級)","word":"square up","phrase":"They squared up to face the challenge.","meaning":"支払いを済ませる","note":"【例文訳】彼らは挑戦に立ち向かうため構えた。","etymology":"【語源イメージ】square up：体を“正面に向ける＝構える”","preposition":"up は『上へ』から『増加・完成・出現』へ広がる。"},{"id":2348,"section":"Section 24 (1級)","word":"squeeze in","phrase":"We managed to squeeze in one more meeting.","meaning":"スケジュールに割り込ませる","note":"【例文訳】私たちはもう一つ会議をなんとか詰め込んだ。","etymology":"【語源イメージ】squeeze in：隙間に“押し込む”","preposition":"in は『広い』ではなく『中に入っている/範囲内』。時間・状態・言語も容器のように捉える。"},{"id":2349,"section":"Section 24 (1級)","word":"stamp out","phrase":"The government tried to stamp out corruption.","meaning":"撲滅する","note":"【例文訳】政府は汚職を根絶しようとした。","etymology":"【語源イメージ】stamp out：足で“踏み消す＝根絶”","preposition":"out は『外へ』。隠れたものが外に出て見える/尽きる/実行される。"},{"id":2350,"section":"Section 24 (1級)","word":"stand in for","phrase":"She stood in for her colleague during the meeting.","meaning":"代役を務める","note":"【例文訳】彼女は会議で同僚の代役を務めた。","etymology":"【語源イメージ】stand in for：代わりに“立つ”","preposition":"in は『広い』ではなく『中に入っている/範囲内』。時間・状態・言語も容器のように捉える。 / for は『向かう先・目的・交換』。何のために向いているかを見る。"},{"id":2351,"section":"Section 24 (1級)","word":"stand out","phrase":"His bright jacket made him stand out in the crowd.","meaning":"目立つ","note":"【例文訳】彼の明るいジャケットは人混みの中で目立った。","etymology":"【語源イメージ】stand out：外へ“立つ＝目立つ”","preposition":"out は『外へ』。隠れたものが外に出て見える/尽きる/実行される。"},{"id":2352,"section":"Section 24 (1級)","word":"stand up for","phrase":"We must stand up for our rights.","meaning":"〜を守る、〜を支持する","note":"【例文訳】私たちは自分たちの権利を守らなければならない。","etymology":"【語源イメージ】stand up for：立って“守る”","preposition":"for は『向かう先・目的・交換』。何のために向いているかを見る。 / up は 』。方向だけでなく、結果・相手への到達も表す。"},{"id":2368,"section":"Section 24 (1級)","word":"talk down","phrase":"She talked him down from quitting.","meaning":"言い負かす、論破する","note":"【例文訳】彼女は彼が辞めるのを思いとどまらせた。","etymology":"【語源イメージ】talk down：言葉で“落ち着かせる”","preposition":"down は『下へ』から『低下・記録・鎮静・故障』へ広がる。"},{"id":2369,"section":"Section 24 (1級)","word":"tap into","phrase":"We need to tap into new markets.","meaning":"進出する、利用する","note":"【例文訳】私たちは新しい市場を活用する必要がある。","etymology":"【語源イメージ】tap into：資源に“触れて利用する”","preposition":"into は『中へ入り込む/変化して〜になる』。"},{"id":2370,"section":"Section 24 (1級)","word":"taper off","phrase":"Sales began to taper off after summer.","meaning":"先細りになる","note":"【例文訳】売上は夏の後に徐々に減少し始めた。","etymology":"【語源イメージ】taper off：先が“細くなる＝減る”","preposition":"off は『離れる』。接触・予定・作動状態から離す。"},{"id":2371,"section":"Section 24 (1級)","word":"tear down","phrase":"They tore down the old building.","meaning":"建物などを取り壊す","note":"【例文訳】彼らは古い建物を取り壊した。","etymology":"【語源イメージ】tear down：引き裂いて“壊す”","preposition":"down は『下へ』から『低下・記録・鎮静・故障』へ広がる。"},{"id":2372,"section":"Section 24 (1級)","word":"thin out","phrase":"The crowd thinned out after midnight.","meaning":"減らす","note":"【例文訳】群衆は深夜になるとまばらになった。","etymology":"【語源イメージ】thin out：薄く“なる＝まばら”","preposition":"out は『外へ』。隠れたものが外に出て見える/尽きる/実行される。"},{"id":2373,"section":"Section 24 (1級)","word":"thrash out","phrase":"They thrashed out the details in a long meeting.","meaning":"徹底的に議論する","note":"【例文訳】彼らは長い会議で詳細を徹底的に話し合った。","etymology":"【語源イメージ】thrash out：徹底的に“叩き出す＝議論”","preposition":"out は『外へ』。隠れたものが外に出て見える/尽きる/実行される。"},{"id":2374,"section":"Section 24 (1級)","word":"throw in","phrase":"He threw in a few jokes during the speech.","meaning":"差し挟む","note":"【例文訳】彼はスピーチの中にいくつか冗談を挟んだ。","etymology":"【語源イメージ】throw in：投げ入れて“付け加える”","preposition":"in は『広い』ではなく『中に入っている/範囲内』。時間・状態・言語も容器のように捉える。"},{"id":2375,"section":"Section 24 (1級)","word":"tide ~ over","phrase":"This money should tide you over until payday.","meaning":"人に困難を乗り切らせる","note":"【例文訳】このお金で給料日までなんとかなるはずだ。","etymology":"【語源イメージ】tide over：潮が“支える＝しのぐ”","preposition":"over は『上を覆う/越える』。支配・終了・過剰にもつながる。"},{"id":2376,"section":"Section 24 (1級)","word":"tie A in with B","phrase":"The report ties the data in with previous studies.","meaning":"AとBを結びつける","note":"【例文訳】その報告書はデータを以前の研究と結びつけている。","etymology":"【語源イメージ】tie in with：結びつける","preposition":"in は『広い』ではなく『中に入っている/範囲内』。時間・状態・言語も容器のように捉える。 / with は『一緒に/伴って』。道具・相手・付帯状況を表す。"},{"id":2377,"section":"Section 24 (1級)","word":"tip off","phrase":"She tipped him off about the upcoming inspection.","meaning":"密告する","note":"【例文訳】彼女は彼に近々行われる検査について密かに知らせた。","etymology":"【語源イメージ】tip off：そっと“知らせる”","preposition":"off は『離れる』。接触・予定・作動状態から離す。"},{"id":2378,"section":"Section 24 (1級)","word":"tower over","phrase":"The skyscraper towered over the surrounding houses.","meaning":"はるかに超える","note":"【例文訳】その高層ビルは周囲の家々を見下ろすようにそびえていた。","etymology":"【語源イメージ】tower over：塔のように“そびえる”","preposition":"over は『上を覆う/越える』。支配・終了・過剰にもつながる。"},{"id":2379,"section":"Section 24 (1級)","word":"toy with","phrase":"He toyed with the idea of moving abroad.","meaning":"考えなどをいい加減に扱う","note":"【例文訳】彼は海外移住の考えをなんとなく思案していた。","etymology":"【語源イメージ】toy with：おもちゃのように“いじる＝軽く考える”","preposition":"with は『一緒に/伴って』。道具・相手・付帯状況を表す。"},{"id":2380,"section":"Section 24 (1級)","word":"trail off","phrase":"His voice trailed off as he grew tired.","meaning":"次第に小さくなる","note":"【例文訳】彼の声は疲れるにつれて次第に弱まった。","etymology":"【語源イメージ】trail off：跡が“細くなる＝声が弱まる”","preposition":"off は『離れる』。接触・予定・作動状態から離す。"},{"id":2381,"section":"Section 24 (1級)","word":"trim down","phrase":"He decided to trim down before summer.","meaning":"削減する","note":"【例文訳】彼は夏までに体を引き締めることにした。","etymology":"【語源イメージ】trim down：余分を“切って細くする”","preposition":"down は『下へ』から『低下・記録・鎮静・故障』へ広がる。"},{"id":2382,"section":"Section 24 (1級)","word":"trip over","phrase":"She tripped over a cable on the floor.","meaning":"転ぶ","note":"【例文訳】彼女は床のケーブルにつまずいた。","etymology":"【語源イメージ】trip over：足が“引っかかる”","preposition":"over は『上を覆う/越える』。支配・終了・過剰にもつながる。"},{"id":2383,"section":"Section 24 (1級)","word":"trump up","phrase":"They trumped up charges against him.","meaning":"捏造する","note":"【例文訳】彼らは彼に対してでっち上げの容疑をかけた。","etymology":"【語源イメージ】trump up：カードを“誇張して作る＝でっち上げる”","preposition":"up は『上へ』から『増加・完成・出現』へ広がる。"},{"id":2384,"section":"Section 24 (1級)","word":"turn over a new leaf","phrase":"He turned over a new leaf after the incident.","meaning":"心を入れ替える","note":"【例文訳】彼はその出来事をきっかけに心を入れ替えた。","etymology":"【語源イメージ】turn over a new leaf：本の“新しいページをめくる＝心を入れ替える”","preposition":"over は『上を覆う/越える』。支配・終了・過剰にもつながる。"},{"id":2385,"section":"Section 24 (1級)","word":"vouch for","phrase":"I can vouch for his honesty.","meaning":"保証する","note":"【例文訳】私は彼の誠実さを保証できる。","etymology":"【語源イメージ】vouch for：声を“出して保証する”","preposition":"for は『向かう先・目的・交換』。何のために向いているかを見る。"},{"id":2386,"section":"Section 24 (1級)","word":"walk out on","phrase":"She walked out on her family.","meaning":"人のもとを去る","note":"【例文訳】彼女は家族を置いて出て行った。","etymology":"【語源イメージ】walk out on：歩いて“去る”","preposition":"on は『上』より『くっついている/接触/継続』。依存・継続・作動中の感覚に広がる。 / out は『外へ』。隠れたものが外に出て見える/尽きる/実行される。"},{"id":2387,"section":"Section 24 (1級)","word":"wash out","phrase":"The picnic was washed out by the rain.","meaning":"試合などを雨で中止させる、疲れさせる","note":"【例文訳】ピクニックは雨で中止になった。","etymology":"【語源イメージ】wash out：水で“流して中止”","preposition":"out は『外へ』。隠れたものが外に出て見える/尽きる/実行される。"},{"id":2388,"section":"Section 24 (1級)","word":"weed out","phrase":"They tried to weed out unqualified applicants.","meaning":"排除する","note":"【例文訳】彼らは不適格な応募者をふるい落とそうとした。","etymology":"【語源イメージ】weed out：雑草を“抜いて除く”","preposition":"out は『外へ』。隠れたものが外に出て見える/尽きる/実行される。"},{"id":2389,"section":"Section 24 (1級)","word":"weigh in","phrase":"Experts will weigh in on the issue tomorrow.","meaning":"仲裁する、割り込む","note":"【例文訳】専門家たちは明日その問題について意見を述べる予定だ。","etymology":"【語源イメージ】weigh in：重さを“量って意見を述べる”","preposition":"in は『広い』ではなく『中に入っている/範囲内』。時間・状態・言語も容器のように捉える。"},{"id":2390,"section":"Section 24 (1級)","word":"whip up","phrase":"She whipped up a quick dinner.","meaning":"感情をかき立てる、手早くこしらえる","note":"【例文訳】彼女は手早く夕食を作った tymology":"【語源イメージ】wriggle out of：体を“くねらせて抜ける”","preposition":"of は『切り離して取り出す/所属』。全体から一部を取り出す感覚。 / out は『外へ』。隠れたものが外に出て見える/尽きる/実行される。"},{"id":2399,"section":"Section 24 (1級)","word":"wring A out of B","phrase":"They wrung a confession out of him.","meaning":"AをBから絞り出す","note":"【例文訳】彼らは彼から自白を絞り出した。","etymology":"【語源イメージ】wring out：ねじって“絞り出す”","preposition":"of は『切り離して取り出す/所属』。全体から一部を取り出す感覚。 / out は『外へ』。隠れたものが外に出て見える/尽きる/実行される。"},{"id":2400,"section":"Section 24 (1級)","word":"zero in on","phrase":"The police zeroed in on the suspect’s location.","meaning":"照準を合わせる","note":"【例文訳】警察は容疑者の居場所を正確に突き止めた。","etymology":"【語源イメージ】zero in on：ゼロ距離まで“狙いを定める”","preposition":"on は『上』より『くっついている/接触/継続』。依存・継続・作動中の感覚に広がる。"}];

        // --- タイトルの自動動的セット設定 ---
        const pageTitle = document.title || "英単語ハックマスター";
        document.getElementById('home-title').textContent = pageTitle.replace(/⚡/g, "").trim();

        // --- ストレージ & ステート管理 ---
        const storageKey = "HACK_MASTER_" + encodeURIComponent(pageTitle) + "_CLEARED_IDS";
        let clearedList = JSON.parse(localStorage.getItem(storageKey)) || [];

        let currentDeck = [];      
        let initialUniqueCount = 0;
        let currentIndex = 0;      
        let comboCount = 0;

        // DOMの取得
        const domScreenHome = document.getElementById('screen-home');
        const domScreenQuiz = document.getElementById('screen-quiz');
        const domSectionList = document.getElementById('section-list');
        const domTotalProgressPercent = document.getElementById('total-progress-percent');
        const domTotalProgressBar = document.getElementById('total-progress-bar');
        const domTotalProgressCount = document.getElementById('total-progress-count');
        const domQuizCount = document.getElementById('quiz-count');
        const domQuizProgressBar = document.getElementById('quiz-progress-bar');
        const domQuizComboBadge = document.getElementById('quiz-combo-badge');
        const domQuizComboCount = document.getElementById('quiz-combo-count');
        const domHeaderCombo = document.getElementById('header-combo');
        const domHeaderComboCount = document.getElementById('header-combo-count');
        const domQuizSectionTitle = document.getElementById('quiz-section-title');
        const domQuizHintMeaning = document.getElementById('quiz-hint-meaning');
        const domQuizBoostEtymology = document.getElementById('quiz-boost-etymology');
        const domQuizBoostPreposition = document.getElementById('quiz-boost-preposition');
        const domQuizPhrase = document.getElementById('quiz-phrase');
        const domQuizAnswerZone = document.getElementById('quiz-answer-zone');
        const domQuizCorrectWord = document.getElementById('quiz-correct-word');
        const domBtnReveal = document.getElementById('btn-reveal');
        const domQuizChoicePad = document.getElementById('quiz-choice-pad');
        const domBtnCorrect = document.getElementById('btn-correct');
        const domBtnWrong = document.getElementById('btn-wrong');
        const domBtnBack = document.getElementById('btn-back');
        const domBtnResetAll = document.getElementById('btn-reset-all');
        const domBtnSpeakWord = document.getElementById('btn-speak-word');
        const domBtnSpeakPhrase = document.getElementById('btn-speak-phrase');

        // --- ホーム画面の描画 ---
        function renderHome() {
            domScreenQuiz.classList.add('hidden');
            domScreenHome.classList.remove('hidden');

            const totalWords = MASTER_DATA.length;
            const clearedWords = clearedList.filter(id => MASTER_DATA.some(m => m.id === id)).length;
            const totalPercent = totalWords > 0 ? Math.round((clearedWords / totalWords) * 100) : 0;
            
            domTotalProgressPercent.textContent = `${totalPercent}%`;
            domTotalProgressBar.style.width = `${totalPercent}%`;
            domTotalProgressCount.textContent = `完遂済み: ${clearedWords} / ${totalWords} 語`;

            const sections = [...new Set(MASTER_DATA.map(item => item.section))];
            domSectionList.innerHTML = '';

            sections.forEach(secName => {
                const secItems = MASTER_DATA.filter(item => item.section === secName);
                const secCleared = secItems.filter(item => clearedList.includes(item.id)).length;
                const secPercent = Math.round((secCleared / secItems.length) * 100);
                const isCompleted = secCleared === secItems.length;

                const div = document.createElement('div');
                div.className = `glass-card p-3.5 rounded-xl border flex flex-col justify-between items-stretch space-y-2 transition-all ${isCompleted ? 'border-emerald-500/30 bg-emerald-950/10' : 'border-slate-800 hover:border-slate-700'}`;
                
                div.innerHTML = `
                    <div class="flex justify-between items-center">
                        <div>
                            <h3 class="text-sm font-bold text-slate-200">${secName}</h3>
                            <p class="text-[11px] text-slate-400 font-mono mt-0.5">進捗: ${secCleared} / ${secItems.length} 語</p>
                        </div>
                        <div class="text-right">
                            <span class="text-xs font-black ${isCompleted ? 'text-emerald-400' : 'text-blue-400'} font-mono">${secPercent}%</span>
                        </div>
                    </div>
                    <div class="w-full bg-slate-900 h-1.5 rounded-full overflow-hidden">
                        <div class="progress-bar ${isCompleted ? 'bg-emerald-500' : 'bg-blue-500'} h-full" style="width: ${secPercent}%"></div>
                    </div>
                    <div class="flex space-x-2 pt-1">
                        <button onclick="startSession('${secName}')" class="flex-1 bg-slate-800 hover:bg-slate-700 text-xs font-bold py-2 rounded-lg transition-colors border border-slate-700/50">
                            ${isCompleted ? '🔄 復習スタート' : '⚡ 攻略開始'}
                        </button>
                        ${secCleared > 0 ? `
                            <button onclick="resetSectionProgress('${secName}')" class="text-[10px] text-slate-500 hover:text-rose-400 px-2 transition-colors">
                                ↺ リセット
                            </button>
                        ` : ''}
                    </div>
                `;
                domSectionList.appendChild(div);
            });
        }

        // --- クイズセッションの開始 ---
        function startSession(sectionName) {
            let targetItems = MASTER_DATA.filter(item => item.section === sectionName);
            currentDeck = targetItems.filter(item => !clearedList.includes(item.id));

            if (currentDeck.length === 0) {
                currentDeck = [...targetItems];
            }

            // ランダムシャッフル
            currentDeck.sort(() => Math.random() - 0.5);

            initialUniqueCount = currentDeck.length; 
            currentIndex = 0;
            comboCount = 0;

            updateComboUI();
            
            domScreenHome.classList.add('hidden');
            domScreenQuiz.classList.remove('hidden');
            
            showQuestion();
        }

        // --- 問題の提示 ---

        // --- 穴あき表示ヘルパー（熟語・be動詞・過去形・doing/～などの可変部分にも対応） ---
        function escapeRegExp(str) {
            return String(str).replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
        }

        function escapeHtml(str) {
            return String(str)
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;')
                .replace(/'/g, '&#39;');
        }

        function normalizeTargetExpression(targetWord) {
            return String(targetWord || "")
                .replace(/[（）]/g, " ")
                .replace(/\([^)]*\)/g, " ")
                .replace(/\[[^\]]*\]/g, " ")
                .replace(/[･・]/g, " ")
                .replace(/[〜]/g, "~")
                .replace(/…/g, " ")
                .replace(/\s+/g, " ")
                .trim();
        }

        function getVerbForms(base) {
            const irregulars = {
                "be": ["be", "am", "are", "is", "was", "were", "been", "being"],
                "take": ["take", "takes", "took", "taken", "taking"],
                "make": ["make", "makes", "made", "making"],
                "come": ["come", "comes", "came", "coming"],
                "go": ["go", "goes", "went", "gone", "going"],
                "get": ["get", "gets", "got", "gotten", "getting"],
                "give": ["give", "gives", "gave", "given", "giving"],
                "do": ["do", "does", "did", "done", "doing"],
                "have": ["have", "has", "had", "having"],
                "run": ["run", "runs", "ran", "running"],
                "write": ["write", "writes", "wrote", "written", "writing"],
                "speak": ["speak", "speaks", "spoke", "spoken", "speaking"],
                "break": ["break", "breaks", "broke", "broken", "breaking"],
                "bring": ["bring", "brings", "brought", "bringing"],
                "buy": ["buy", "buys", "bought", "buying"],
                "catch": ["catch", "catches", "caught", "catching"],
                "choose": ["choose", "chooses", "chose", "chosen", "choosing"],
                "feel": ["feel", "feels", "felt", "feeling"],
                "find": ["find", "finds", "found", "finding"],
                "keep": ["keep", "keeps", "kept", "keeping"],
                "know": ["know", "knows", "knew", "known", "knowing"],
                "leave": ["leave", "leaves", "left", "leaving"],
                "lose": ["lose", "loses", "lost", "losing"],
                "pay": ["pay", "pays", "paid", "paying"],
                "put": ["put", "puts", "putting"],
                "read": ["read", "reads", "reading"],
                "see": ["see", "sees", "saw", "seen", "seeing"],
                "send": ["send", "sends", "sent", "sending"],
                "set": ["set", "sets", "setting"],
                "sit": ["sit", "sits", "sat", "sitting"],
                "stand": ["stand", "stands", "stood", "standing"],
                "teach": ["teach", "teaches", "taught", "teaching"],
                "tell": ["tell", "tells", "told", "telling"],
                "think": ["think", "thinks", "thought", "thinking"],
                "understand": ["understand", "understands", "understood", "understanding"]
            };

            const b = String(base || "").toLowerCase();
            if (irregulars[b]) return irregulars[b];

            const forms = new Set([b]);
            if (b.endsWith("e")) {
                forms.add(b + "s");
                forms.add(b.slice(0, -1) + "ed");
                forms.add(b.slice(0, -1) + "ing");
            } else if (b.endsWith("y") && !/[aeiou]y$/.test(b)) {
                forms.add(b.slice(0, -1) + "ies");
                forms.add(b.slice(0, -1) + "ied");
                forms.add(b + "ing");
            } else {
                forms.add(b + "s");
                forms.add(b + "ed");
                forms.add(b + "ing");
            }
            return Array.from(forms);
        }

        function variableNounPhrasePattern(maxWords = 4) {
            // 前置詞や接続詞の手前で止める。例: wash away the problem during... → wash away the problem
            const stop = "in|inside|on|at|by|for|with|during|before|after|to|from|of|as|if|when|while|because|since|until|unless|under|over|through|into|onto|about|within|without|than|that|which|who|where";
            return `(?:[A-Za-z][A-Za-z'’.-]*(?:\\s+(?!${stop}\\b)[A-Za-z][A-Za-z'’.-]*){0,${maxWords - 1}})`;
        }

        function gerundPhrasePattern() {
            // doing の部分を taking photos / solving the issue などに対応させる
            const stop = "in|inside|on|at|by|for|with|during|before|after|to|from|of|as|if|when|while|because|since|until|unless|under|over|through|into|onto|about|within|without|than|that|which|who|where";
            return `(?:[A-Za-z][A-Za-z'’.-]*ing(?:\\s+(?!${stop}\\b)[A-Za-z][A-Za-z'’.-]*){0,3})`;
        }

        function bareVerbPhrasePattern() {
            return `(?:[A-Za-z][A-Za-z'’.-]*(?:\\s+[A-Za-z][A-Za-z'’.-]*){0,3})`;
        }

        function tokenToPattern(token, index, tokens) {
            const t = String(token || "").toLowerCase();
            const prev = index > 0 ? String(tokens[index - 1]).toLowerCase() : "";

            if (["~", "...", "someone", "somebody", "something", "one", "one's", "ones", "oneself", "it"].includes(t)) {
                return variableNounPhrasePattern(4);
            }
            if (["a", "b", "o", "c"].includes(t)) {
                return variableNounPhrasePattern(3);
            }
            if (t === "doing") {
                return gerundPhrasePattern();
            }
            if (t === "do" && prev === "to") {
                return bareVerbPhrasePattern();
            }
            if (t === "be") {
                return `(?:${getVerbForms("be").map(escapeRegExp).join("|")})`;
            }

            const forms = getVerbForms(t).map(escapeRegExp).join("|");
            return `(?:${forms})`;
        }

        function buildPatternFromTokens(tokens) {
            const filtered = [];
            for (let i = 0; i < tokens.length; i++) {
                // doing ~ は doing 側で目的語まで吸収するので、直後の ~ は飛ばす
                if (tokens[i] === "~" && i > 0 && String(tokens[i - 1]).toLowerCase() === "doing") continue;
                filtered.push(tokens[i]);
            }
            if (filtered.length === 0) return null;

            const parts = filtered.map((tok, idx) => tokenToPattern(tok, idx, filtered));
            return `\\b${parts.join("\\s+")}\\b`;
        }

        function buildTargetRegex(targetWord) {
            const normalized = normalizeTargetExpression(targetWord);
            if (!normalized) return null;

            const candidates = new Set([normalized]);

            // be interested in ~ → interested in ~ でも拾えるようにする
            if (/^be\s+/i.test(normalized)) {
                candidates.add(normalized.replace(/^be\s+/i, ""));
            }

            // 「A to B」「A into B」等の記号を緩めるための掃除版
            const cleaned = normalized
                .replace(/[（）()[\]]/g, " ")
                .replace(/[･・]/g, " ")
                .replace(/\s+/g, " ")
                .trim();
            if (cleaned) candidates.add(cleaned);

            const patterns = [];

            candidates.forEach(candidate => {
                const tokens = candidate.split(/\s+/).filter(Boolean);
                const pattern = buildPatternFromTokens(tokens);
                if (pattern) patterns.push(pattern);

                // trailing ~ を持つ熟語は、~なし版でも拾う
                if (tokens[tokens.length - 1] === "~") {
                    const withoutTilde = tokens.slice(0, -1);
                    const p2 = buildPatternFromTokens(withoutTilde);
                    if (p2) patterns.push(p2);
                }
            });

            const uniquePatterns = Array.from(new Set(patterns)).sort((a, b) => b.length - a.length);
            if (uniquePatterns.length === 0) return null;
            return new RegExp(uniquePatterns.join("|"), "gi");
        }

        function renderMaskedPhrase(rawPhrase, targetWord, reveal = false) {
            const phrase = String(rawPhrase || "");
            const regex = buildTargetRegex(targetWord);
            if (!regex) return escapeHtml(phrase);

            let matched = false;
            let lastIndex = 0;
            let html = "";

            phrase.replace(regex, (match, ...args) => {
                const offset = args[args.length - 2];
                matched = true;
                html += escapeHtml(phrase.slice(lastIndex, offset));
                html += reveal
                    ? `<span class="text-rose-500 underline font-black font-mono">${escapeHtml(match)}</span>`
                    : "_____";
                lastIndex = offset + match.length;
                return match;
            });

            if (matched) {
                html += escapeHtml(phrase.slice(lastIndex));
                return html;
            }

            // 最終フォールバック：完全一致だけでも拾う
            const simpleTarget = normalizeTargetExpression(targetWord).replace(/\s*~\s*$/g, "");
            if (simpleTarget) {
                const simpleRegex = new RegExp(escapeRegExp(simpleTarget), "gi");
                lastIndex = 0;
                html = "";
                phrase.replace(simpleRegex, (match, ...args) => {
                    const offset = args[args.length - 2];
                    matched = true;
                    html += escapeHtml(phrase.slice(lastIndex, offset));
                    html += reveal
                        ? `<span class="text-rose-500 underline font-black font-mono">${escapeHtml(match)}</span>`
                        : "_____";
                    lastIndex = offset + match.length;
                    return match;
                });
                if (matched) {
                    html += escapeHtml(phrase.slice(lastIndex));
                    return html;
                }
            }

            return escapeHtml(phrase);
        }


        function showQuestion() {
            if (currentDeck.length === 0 || currentIndex >= currentDeck.length) {
                alert("🎉 セクション内のすべての問題をクリアしました！完璧なコンプリートです！");
                exitQuiz();
                return;
            }

            domQuizAnswerZone.classList.add('invisible');
            domQuizChoicePad.classList.add('hidden');
            domBtnReveal.classList.remove('hidden');

            const currentQuestion = currentDeck[currentIndex];

            // 画面上の残り問題数カウンターをリアルタイム動的表示
            domQuizCount.textContent = currentDeck.length - currentIndex;
            
            const progressPercent = initialUniqueCount > 0 ? (currentIndex / currentDeck.length) * 100 : 0;
            domQuizProgressBar.style.width = `${progressPercent}%`;
            domQuizSectionTitle.textContent = currentQuestion.section;

            domQuizHintMeaning.textContent = currentQuestion.meaning;
            domQuizBoostEtymology.textContent = currentQuestion.etymology || "語源データ最適化済";
            domQuizBoostPreposition.textContent = currentQuestion.note || "（補足なし）";
            domQuizCorrectWord.textContent = currentQuestion.word;

            // ターゲット単語・熟語を隠して「_____」に変える
            // take up ~ → take/takes/took/taken/taking up、be tired of → is/was/are tired of などにも対応
            domQuizPhrase.innerHTML = renderMaskedPhrase(currentQuestion.phrase, currentQuestion.word, false);
        }

        // --- 答えを見る ---
        function revealAnswer() {
            domBtnReveal.classList.add('hidden');
            domQuizChoicePad.classList.remove('hidden');
            domQuizAnswerZone.classList.remove('invisible');

            const currentQuestion = currentDeck[currentIndex];
            domQuizPhrase.innerHTML = renderMaskedPhrase(currentQuestion.phrase, currentQuestion.word, true);

            // ネイティブ発音を即座に自動再生
            speak(currentQuestion.word, 1.0);
        }

        // --- 仕分けシステム（ゲーム作成プロのオートローテーション） ---
        function handleUserJudgment(isCorrect) {
            const currentQuestion = currentDeck[currentIndex];

            if (isCorrect) {
                // 覚えた（クリア）なら保存してリストから除外していく
                if (!clearedList.includes(currentQuestion.id)) {
                    clearedList.push(currentQuestion.id);
                    localStorage.setItem(storageKey, JSON.stringify(clearedList));
                }
                comboCount++;
                updateComboUI();
                currentIndex++;
            } else {
                // もう一度（復習）なら、現在のデッキの最後尾にガサッと回す（無限ローテーション）
                comboCount = 0; 
                updateComboUI();

                currentDeck.push(currentQuestion);
                currentIndex++;
            }

            showQuestion();
        }

        function updateComboUI() {
            if (comboCount >= 3) {
                domQuizComboBadge.classList.remove('opacity-0');
                domQuizComboCount.textContent = comboCount;
                domHeaderCombo.classList.remove('hidden');
                domHeaderComboCount.textContent = comboCount;
            } else {
                domQuizComboBadge.classList.add('opacity-0');
                domHeaderCombo.classList.add('hidden');
            }
        }

        function exitQuiz() {
            renderHome();
        }

        function resetSectionProgress(sectionName) {
            if (confirm(`${sectionName} のクリア記録をリセットして未着手に戻しますか？`)) {
                const targetIds = MASTER_DATA.filter(item => item.section === sectionName).map(item => item.id);
                clearedList = clearedList.filter(id => !targetIds.includes(id));
                localStorage.setItem(storageKey, JSON.stringify(clearedList));
                renderHome();
            }
        }

        domBtnResetAll.addEventListener('click', () => {
            if (confirm("すべての進捗データを完全に消去し、初期状態に戻しますか？")) {
                clearedList = [];
                localStorage.removeItem(storageKey);
                renderHome();
            }
        });

        function speak(text, speed = 1.0) {
            if ('speechSynthesis' in window) {
                window.speechSynthesis.cancel();
                let cleanText = text.replace(/_____/g, "blank");
                const utterance = new SpeechSynthesisUtterance(cleanText);
                utterance.lang = 'en-US';
                utterance.rate = speed;
                window.speechSynthesis.speak(utterance);
            }
        }

        // イベントリスナー
        domBtnReveal.addEventListener('click', revealAnswer);
        domBtnCorrect.addEventListener('click', () => handleUserJudgment(true));
        domBtnWrong.addEventListener('click', () => handleUserJudgment(false));
        domBtnBack.addEventListener('click', () => {
            if (confirm("ホームに戻りますか？現在のセッション状態は一度リセットされます。")) { exitQuiz(); }
        });
        domBtnSpeakWord.addEventListener('click', () => { speak(currentDeck[currentIndex - 1]?.word || currentDeck[currentIndex].word, 1.0); });
        domBtnSpeakPhrase.addEventListener('click', () => { speak(currentDeck[currentIndex - 1]?.phrase || currentDeck[currentIndex].phrase, 0.95); });

        // 初期実行
        renderHome();
    </script>
</body>
</html>
